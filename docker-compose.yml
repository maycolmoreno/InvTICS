# ═══════════════════════════════════════════════════════
# Docker Compose — CRESIO (Gestión de Activos TI)
# ═══════════════════════════════════════════════════════
# Uso:
#   docker compose up -d              # Levantar todo
#   docker compose up -d --build      # Rebuild + levantar
#   docker compose logs -f api        # Ver logs del API
#   docker compose down               # Detener todo
#   docker compose down -v            # Detener + borrar volúmenes
#
# Primera vez: copiar .env.example → .env y completar valores.
# ═══════════════════════════════════════════════════════

services:

  # ──── PostgreSQL ────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cresio3}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD en .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Descomenta para seed inicial con el dump SQL:
      # - ./gestionactivosapi/cresio4.sql:/docker-entrypoint-initdb.d/01-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──── Backend API (Spring Boot - puerto 8083) ────
  api:
    build:
      context: ./gestionactivosapi
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8083}:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-cresio3}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MANTENIMIENTO_STORAGE_PATH: /app/data/mantenimientos
      ACTAS_BASE_PATH: /app/data/actas
    volumes:
      - api-data:/app/data

  # ──── Web App (Spring Boot + Thymeleaf - puerto 8081) ────
  web:
    build:
      context: ./consumogestionactivosapi
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      API_BASE_URL: http://api:8083/api
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?Definir JWT_SECRET en .env}
      ACTAS_STORAGE_PATH: /app/uploads/actas
    volumes:
      - web-uploads:/app/uploads

volumes:
  pgdata:
  api-data:
  web-uploads:
