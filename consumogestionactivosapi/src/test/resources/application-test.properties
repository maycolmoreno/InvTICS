# Configuración de tests para consumogestionactivosapi

# ============================================
# Base de Datos (H2 en memoria para tests)
# ============================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================
# Logging
# ============================================
logging.level.root=WARN
logging.level.com.uisrael.consumogestionactivosapi=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.test=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n

# ============================================
# Servidor
# ============================================
server.port=0
server.servlet.context-path=/
spring.test.mockmvc.print=true

# ============================================
# TimeOut
# ============================================
spring.mvc.async.request-timeout=5000

# ============================================
# Cache (deshabilitado para tests)
# ============================================
spring.cache.type=none

# ============================================
# H2 Console
# ============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
