<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{plantilla/plantillaui}">

<head>
<meta charset="utf-8">
<title>Nuevo Custodio</title>

</head>

<body>
    <div layout:fragment="contenidopaginas">

        <form id="formCustodio" th:action="@{/custodios}" th:object="${custodio}" method="post">

            <div class="page-header">
                <div class="page-header-left d-flex align-items-center">
                    <div class="page-header-title">
                        <h5 class="m-b-10">Custodios</h5>
                    </div>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/custodios}">Inicio</a></li>
                        <li class="breadcrumb-item">Crear</li>
                    </ul>
                </div>

                <div class="page-header-right ms-auto">
                    <div class="d-flex align-items-center gap-2 page-header-right-items-wrapper">
                        <button type="submit" class="btn btn-primary">
                            <i class="feather-save me-2"></i> <span>Guardar</span>
                        </button>
                        <a th:href="@{/custodios}" class="btn btn-light">
                            <i class="feather-arrow-left me-2"></i> <span>Volver</span>
                        </a>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div class="card stretch stretch-full">
                    <div class="card-body">

                        <input type="hidden" th:field="*{idCustodio}">

                        <p class="text-muted mb-4">Complete solo datos obligatorios. Telefono queda como opcional.</p>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Nombre <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" placeholder="Nombre completo" th:field="*{nombre}" maxlength="50">
                                <div class="text-danger small" th:if="${errorNombre}"><span th:text="${errorNombre}"></span></div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">Cedula <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" placeholder="Ej: 0912345675" th:field="*{cedula}" maxlength="10" minlength="10" inputmode="numeric" pattern="\d{10}" title="Ingrese una cédula ecuatoriana válida de 10 dígitos">
                                <div class="text-danger small" th:if="${errorCedula}"><span th:text="${errorCedula}"></span></div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">Correo <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" placeholder="correo@dominio.com" th:field="*{correo}">
                                <div class="text-danger small" th:if="${errorCorreo}"><span th:text="${errorCorreo}"></span></div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">Fecha ingreso <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" th:field="*{fechaIngreso}">
                                <div class="text-danger small" th:if="${errorFechaInicio}"><span th:text="${errorFechaInicio}"></span></div>
                            </div>

                            <!-- DEPARTAMENTO: autocomplete + crear -->
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Departamento <span class="text-danger">*</span></label>
                                <div class="ac-wrap">
                                    <input type="text" class="form-control" id="acDepartamentoInput"
                                           placeholder="Buscar o crear departamento..." autocomplete="off" />
                                    <input type="hidden" th:field="*{fkDepartamento.idDepartamento}" id="acDepartamentoHidden" />
                                    <button type="button" class="ac-clear" id="acDepartamentoClear">&times;</button>
                                    <div class="ac-drop" id="acDepartamentoDrop"></div>
                                </div>
                                <div class="text-danger small" th:if="${errorSeleccionDepartamento}"><span th:text="${errorSeleccionDepartamento}"></span></div>
                            </div>

                            <!-- CARGO: autocomplete + crear -->
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Cargo <span class="text-danger">*</span></label>
                                <div class="ac-wrap">
                                    <input type="text" class="form-control" id="acCargoInput"
                                           placeholder="Buscar o crear cargo..." autocomplete="off" />
                                    <input type="hidden" th:field="*{fkCargo.idCargo}" id="acCargoHidden" />
                                    <button type="button" class="ac-clear" id="acCargoClear">&times;</button>
                                    <div class="ac-drop" id="acCargoDrop"></div>
                                </div>
                                <div class="text-danger small" th:if="${errorSeleccionCargo}"><span th:text="${errorSeleccionCargo}"></span></div>
                            </div>

                            <!-- UBICACION: autocomplete + crear -->
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Sucursal / Ubicación</label>
                                <div class="ac-wrap">
                                    <input type="text" class="form-control" id="acUbicacionInput"
                                           placeholder="Buscar o crear ubicacion..." autocomplete="off" />
                                    <input type="hidden" th:field="*{fkUbicacion.idUbicacion}" id="acUbicacionHidden" />
                                    <button type="button" class="ac-clear" id="acUbicacionClear">&times;</button>
                                    <div class="ac-drop" id="acUbicacionDrop"></div>
                                </div>
                            </div>
                        </div>

                        <details>
                            <summary class="fw-semibold mb-3">Campo opcional</summary>
                            <div class="row mt-3">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label">Telefono</label>
                                    <input type="text" class="form-control" placeholder="Ej: 09xxxxxxxx" th:field="*{telefono}" maxlength="10">
                                    <div class="text-danger small" th:if="${errorTelefono}"><span th:text="${errorTelefono}"></span></div>
                                </div>
                            </div>
                        </details>

                    </div>
                </div>
            </div>

        </form>

        <!-- Modal Crear Departamento -->
        <div class="modal fade" id="modalCrearDepartamento" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-sm modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header"><h5 class="modal-title">Nuevo Departamento</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Nombre <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="modalDepNombre" maxlength="100" /></div>
                        <div class="text-danger small" id="modalDepError"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary btn-sm" id="btnCrearDep">Crear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Crear Cargo -->
        <div class="modal fade" id="modalCrearCargo" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-sm modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header"><h5 class="modal-title">Nuevo Cargo</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Nombre <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="modalCarNombre" maxlength="100" /></div>
                        <div class="text-danger small" id="modalCarError"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary btn-sm" id="btnCrearCar">Crear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Crear Ubicacion -->
        <div class="modal fade" id="modalCrearUbicacion" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header"><h5 class="modal-title">Nueva Ubicacion</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Nombre <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="modalUbiNombre" maxlength="100" /></div>
                        <div class="mb-3"><label class="form-label">Agencia <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="modalUbiAgencia" maxlength="100" /></div>
                        <div class="text-danger small" id="modalUbiError"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary btn-sm" id="btnCrearUbi">Crear</button>
                    </div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
        (function () {
            // Mover modales al body para evitar problemas de CSS containment
            document.querySelectorAll('.modal').forEach(function(m) { document.body.appendChild(m); });

            var dataDep = /*[[${listadepartamento}]]*/ [];
            var dataCar = /*[[${listacargo}]]*/ [];
            var dataUbi = /*[[${listaubicacion}]]*/ [];

            /* --- Autocomplete genérico --- */
            function initAC(cfg) {
                var inp = document.getElementById(cfg.inputId);
                var hid = document.getElementById(cfg.hiddenId);
                var drop = document.getElementById(cfg.dropId);
                var clr = document.getElementById(cfg.clearId);
                var items = cfg.items || [];

                function setVal(item) {
                    inp.value = cfg.label(item);
                    hid.value = cfg.id(item);
                    clr.classList.add("visible");
                    drop.classList.remove("show");
                    if (cfg.onSelected) cfg.onSelected(item);
                }
                function clear() {
                    inp.value = "";
                    hid.value = "0";
                    clr.classList.remove("visible");
                    if (cfg.onCleared) cfg.onCleared();
                }
                function render(list, term) {
                    drop.innerHTML = "";
                    list.forEach(function (it) {
                        var d = document.createElement("div");
                        d.className = "ac-item";
                        var lbl = cfg.label(it);
                        if (term) {
                            var i = lbl.toLowerCase().indexOf(term.toLowerCase());
                            if (i >= 0) lbl = lbl.substring(0, i) + "<strong>" + lbl.substring(i, i + term.length) + "</strong>" + lbl.substring(i + term.length);
                        }
                        d.innerHTML = lbl;
                        d.addEventListener("mousedown", function (e) { e.preventDefault(); setVal(it); });
                        drop.appendChild(d);
                    });
                    if (term && term.trim()) {
                        var cd = document.createElement("div");
                        cd.className = "ac-item ac-create";
                        cd.innerHTML = '<i class="feather-plus-circle"></i>Crear: "<strong>' + term.replace(/</g,"&lt;").replace(/>/g,"&gt;") + '</strong>"';
                        cd.addEventListener("mousedown", function (e) { e.preventDefault(); drop.classList.remove("show"); if (cfg.onCreate) cfg.onCreate(term.trim()); });
                        drop.appendChild(cd);
                    }
                    drop.classList.toggle("show", drop.children.length > 0);
                }
                inp.addEventListener("input", function () {
                    var t = inp.value.trim(); hid.value = "0";
                    clr.classList.toggle("visible", t.length > 0);
                    var f = t ? items.filter(function (x) { return cfg.label(x).toLowerCase().indexOf(t.toLowerCase()) >= 0; }) : items;
                    render(f.slice(0, 15), t);
                });
                inp.addEventListener("focus", function () {
                    var t = inp.value.trim();
                    var f = t ? items.filter(function (x) { return cfg.label(x).toLowerCase().indexOf(t.toLowerCase()) >= 0; }) : items;
                    render(f.slice(0, 15), t);
                });
                inp.addEventListener("blur", function () { setTimeout(function () { drop.classList.remove("show"); }, 200); });
                clr.addEventListener("click", function () { clear(); inp.focus(); });

                // Pre-seleccionar si hidden ya tiene valor
                var preId = parseInt(hid.value);
                if (preId > 0) {
                    var pre = items.find(function (x) { return cfg.id(x) === preId; });
                    if (pre) setVal(pre);
                }

                return {
                    setItems: function (n) { items = n; },
                    setVal: setVal,
                    clear: clear,
                    getItems: function () { return items; }
                };
            }

            /* --- Init 3 autocompletes --- */
            var acDep = initAC({
                inputId: "acDepartamentoInput", hiddenId: "acDepartamentoHidden",
                dropId: "acDepartamentoDrop", clearId: "acDepartamentoClear",
                items: dataDep.map(function (d) { return { id: d.idDepartamento, nombre: d.nombre }; }),
                label: function (x) { return x.nombre; },
                id: function (x) { return x.id; },
                onSelected: function (item) { if (acCar) applyCargoFilter(item.id); },
                onCleared: function () { if (acCar) applyCargoFilter(0); },
                onCreate: function (t) {
                    document.getElementById("modalDepNombre").value = t;
                    document.getElementById("modalDepError").textContent = "";
                    new bootstrap.Modal(document.getElementById("modalCrearDepartamento")).show();
                }
            });

            var allCargoItems = dataCar.map(function (c) {
                return {
                    id: c.idCargo,
                    nombre: c.nombre,
                    idDepartamento: c.fkDepartamento ? c.fkDepartamento.idDepartamento : 0
                };
            });

            var acCar = initAC({
                inputId: "acCargoInput", hiddenId: "acCargoHidden",
                dropId: "acCargoDrop", clearId: "acCargoClear",
                items: [],
                label: function (x) { return x.nombre; },
                id: function (x) { return x.id; },
                onCreate: function (t) {
                    document.getElementById("modalCarNombre").value = t;
                    document.getElementById("modalCarError").textContent = "";
                    new bootstrap.Modal(document.getElementById("modalCrearCargo")).show();
                }
            });

            function applyCargoFilter(idDepartamento) {
                var depId = parseInt(idDepartamento || 0);
                var filtered = depId > 0
                    ? allCargoItems.filter(function (c) { return c.idDepartamento === depId; })
                    : [];

                acCar.setItems(filtered);

                var selectedCargoId = parseInt(document.getElementById("acCargoHidden").value || "0");
                if (selectedCargoId > 0) {
                    var exists = filtered.some(function (c) { return c.id === selectedCargoId; });
                    if (!exists) acCar.clear();
                }
            }

            applyCargoFilter(parseInt(document.getElementById("acDepartamentoHidden").value || "0"));

            var acUbi = initAC({
                inputId: "acUbicacionInput", hiddenId: "acUbicacionHidden",
                dropId: "acUbicacionDrop", clearId: "acUbicacionClear",
                items: dataUbi.map(function (u) { return { id: u.idUbicacion, nombre: u.nombre + (u.agencia ? " - " + u.agencia : "") }; }),
                label: function (x) { return x.nombre; },
                id: function (x) { return x.id; },
                onCreate: function (t) {
                    document.getElementById("modalUbiNombre").value = t;
                    document.getElementById("modalUbiAgencia").value = "";
                    document.getElementById("modalUbiError").textContent = "";
                    new bootstrap.Modal(document.getElementById("modalCrearUbicacion")).show();
                }
            });

            /* --- Crear via AJAX --- */
            function ajaxCrear(url, body, errorElId, onOk, btnEl) {
                var errorEl = document.getElementById(errorElId);
                btnEl.disabled = true;
                fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) })
                .then(function (r) {
                    if (r.status === 409) return r.json().then(function (d) { throw new Error(d.error || "Ya existe"); });
                    if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || "Error"); });
                    return r.json();
                })
                .then(function (data) { onOk(data); })
                .catch(function (e) { errorEl.textContent = e.message; })
                .finally(function () { btnEl.disabled = false; });
            }

            document.getElementById("btnCrearDep").addEventListener("click", function () {
                var n = document.getElementById("modalDepNombre").value.trim();
                if (!n) { document.getElementById("modalDepError").textContent = "El nombre es obligatorio"; return; }
                var btn = this;
                ajaxCrear("/api/relaciones/departamentos", { nombre: n }, "modalDepError", function (data) {
                    var ni = { id: data.idDepartamento, nombre: data.nombre };
                    var its = acDep.getItems(); its.push(ni); acDep.setItems(its); acDep.setVal(ni);
                    bootstrap.Modal.getInstance(document.getElementById("modalCrearDepartamento")).hide();
                }, btn);
            });

            document.getElementById("btnCrearCar").addEventListener("click", function () {
                var n = document.getElementById("modalCarNombre").value.trim();
                var idDepartamento = parseInt(document.getElementById("acDepartamentoHidden").value || "0");
                if (!n) { document.getElementById("modalCarError").textContent = "El nombre es obligatorio"; return; }
                if (idDepartamento <= 0) {
                    document.getElementById("modalCarError").textContent = "Seleccione primero un departamento";
                    return;
                }
                var btn = this;
                ajaxCrear("/api/relaciones/cargos", { nombre: n, idDepartamento: String(idDepartamento) }, "modalCarError", function (data) {
                    var ni = {
                        id: data.idCargo,
                        nombre: data.nombre,
                        idDepartamento: data.fkDepartamento ? data.fkDepartamento.idDepartamento : idDepartamento
                    };
                    allCargoItems.push(ni);
                    applyCargoFilter(idDepartamento);
                    acCar.setVal(ni);
                    bootstrap.Modal.getInstance(document.getElementById("modalCrearCargo")).hide();
                }, btn);
            });

            document.getElementById("btnCrearUbi").addEventListener("click", function () {
                var n = document.getElementById("modalUbiNombre").value.trim();
                var a = document.getElementById("modalUbiAgencia").value.trim();
                var errEl = document.getElementById("modalUbiError");
                if (!n) { errEl.textContent = "El nombre es obligatorio"; return; }
                if (!a) { errEl.textContent = "La agencia es obligatoria"; return; }
                var btn = this;
                ajaxCrear("/api/relaciones/ubicaciones", { nombre: n, agencia: a }, "modalUbiError", function (data) {
                    var ni = { id: data.idUbicacion, nombre: data.nombre + (data.agencia ? " - " + data.agencia : "") };
                    var its = acUbi.getItems(); its.push(ni); acUbi.setItems(its); acUbi.setVal(ni);
                    bootstrap.Modal.getInstance(document.getElementById("modalCrearUbicacion")).hide();
                }, btn);
            });
        })();
        </script>

    </div>
</body>

</html>
