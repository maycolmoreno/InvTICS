<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{plantilla/plantillaui}">

<head>
<meta charset="utf-8">
<title>Nuevo Custodio</title>

</head>

<body>
    <div layout:fragment="contenidopaginas">

        <form id="formCustodio" th:action="@{/custodios}" th:object="${custodio}" method="post">

            <div class="page-header">
                <div class="page-header-left d-flex align-items-center">
                    <div class="page-header-title">
                        <h5 class="m-b-10">Custodios</h5>
                    </div>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/custodios}">Inicio</a></li>
                        <li class="breadcrumb-item">Crear</li>
                    </ul>
                </div>

                <div class="page-header-right ms-auto">
                    <div class="d-flex align-items-center gap-2 page-header-right-items-wrapper">
                        <button type="submit" class="btn btn-primary">
                            <i class="feather-save me-2"></i> <span>Guardar</span>
                        </button>
                        <a th:href="@{/custodios}" class="btn btn-light">
                            <i class="feather-arrow-left me-2"></i> <span>Volver</span>
                        </a>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div class="card stretch stretch-full">
                    <div class="card-body">

                        <input type="hidden" th:field="*{idCustodio}">

                        <p class="text-muted mb-4">Complete solo datos obligatorios. Telefono queda como opcional.</p>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Nombre <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" placeholder="Nombre completo" th:field="*{nombre}" maxlength="50">
                                <div class="text-danger small" th:if="${errorNombre}"><span th:text="${errorNombre}"></span></div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">Cedula <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" placeholder="Ej: 0912345675" th:field="*{cedula}" maxlength="10" minlength="10" inputmode="numeric" pattern="\d{10}" title="Ingrese una cédula ecuatoriana válida de 10 dígitos">
                                <div class="text-danger small" th:if="${errorCedula}"><span th:text="${errorCedula}"></span></div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">Correo <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" placeholder="correo@dominio.com" th:field="*{correo}">
                                <div class="text-danger small" th:if="${errorCorreo}"><span th:text="${errorCorreo}"></span></div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">Fecha ingreso <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" th:field="*{fechaIngreso}">
                                <div class="text-danger small" th:if="${errorFechaInicio}"><span th:text="${errorFechaInicio}"></span></div>
                            </div>

                            <!-- DEPARTAMENTO: select + crear -->
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Departamento <span class="text-danger">*</span></label>
                                <div class="d-flex gap-2">
                                    <select class="form-select" id="selDepartamento" th:field="*{fkDepartamento.idDepartamento}">
                                        <option value="0">Seleccione un departamento</option>
                                        <option th:each="d : ${listadepartamento}" th:value="${d.idDepartamento}" th:text="${d.nombre}" th:data-tipo="${d.tipo != null ? d.tipo : 'ADMINISTRATIVO'}"></option>
                                    </select>
                                    <button type="button" class="btn btn-outline-primary btn-sm" title="Crear departamento" data-bs-toggle="modal" data-bs-target="#modalCrearDepartamento"><i class="feather-plus"></i></button>
                                </div>
                                <div class="text-danger small" th:if="${errorSeleccionDepartamento}"><span th:text="${errorSeleccionDepartamento}"></span></div>
                            </div>

                            <!-- CARGO: select + crear (filtrado por departamento) -->
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Cargo <span class="text-danger">*</span></label>
                                <div class="d-flex gap-2">
                                    <select class="form-select" id="selCargo" th:field="*{fkCargo.idCargo}">
                                        <option value="0">Seleccione un cargo</option>
                                        <option th:each="c : ${listacargo}" th:value="${c.idCargo}"
                                                th:text="${c.nombre}" th:data-dep="${c.fkDepartamento != null ? c.fkDepartamento.idDepartamento : 0}"></option>
                                    </select>
                                    <button type="button" class="btn btn-outline-primary btn-sm" title="Crear cargo" data-bs-toggle="modal" data-bs-target="#modalCrearCargo"><i class="feather-plus"></i></button>
                                </div>
                                <div class="text-danger small" th:if="${errorSeleccionCargo}"><span th:text="${errorSeleccionCargo}"></span></div>
                            </div>

                            <!-- UBICACION: select + crear -->
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Sucursal / Ubicación</label>
                                <div class="d-flex gap-2">
                                    <select class="form-select" id="selUbicacion" th:field="*{fkUbicacion.idUbicacion}">
                                        <option value="0">Seleccione una ubicacion</option>
                                        <option th:each="u : ${listaubicacion}" th:value="${u.idUbicacion}" th:text="${u.nombre + ' - ' + u.agencia}"
                                                th:data-dep-tipo="${u.fkDepartamento != null and u.fkDepartamento.tipo != null ? u.fkDepartamento.tipo : 'ADMINISTRATIVO'}"></option>
                                    </select>
                                    <button type="button" class="btn btn-outline-primary btn-sm" title="Crear ubicacion" data-bs-toggle="modal" data-bs-target="#modalCrearUbicacion"><i class="feather-plus"></i></button>
                                </div>
                            </div>
                        </div>

                        <details>
                            <summary class="fw-semibold mb-3">Campo opcional</summary>
                            <div class="row mt-3">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label">Telefono</label>
                                    <input type="text" class="form-control" placeholder="Ej: 09xxxxxxxx" th:field="*{telefono}" maxlength="10">
                                    <div class="text-danger small" th:if="${errorTelefono}"><span th:text="${errorTelefono}"></span></div>
                                </div>
                            </div>
                        </details>

                    </div>
                </div>
            </div>

        </form>

        <!-- Modal Crear Departamento -->
        <div class="modal fade" id="modalCrearDepartamento" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-sm modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header"><h5 class="modal-title">Nuevo Departamento</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Nombre <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="modalDepNombre" maxlength="100" /></div>
                        <div class="text-danger small" id="modalDepError"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary btn-sm" id="btnCrearDep">Crear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Crear Cargo -->
        <div class="modal fade" id="modalCrearCargo" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-sm modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header"><h5 class="modal-title">Nuevo Cargo</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Nombre <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="modalCarNombre" maxlength="100" /></div>
                        <div class="text-danger small" id="modalCarError"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary btn-sm" id="btnCrearCar">Crear</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Crear Ubicacion -->
        <div class="modal fade" id="modalCrearUbicacion" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header"><h5 class="modal-title">Nueva Ubicacion</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <div class="mb-3"><label class="form-label">Nombre <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="modalUbiNombre" maxlength="100" /></div>
                        <div class="mb-3"><label class="form-label">Agencia <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="modalUbiAgencia" maxlength="100" /></div>
                        <div class="text-danger small" id="modalUbiError"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-primary btn-sm" id="btnCrearUbi">Crear</button>
                    </div>
                </div>
            </div>
        </div>

        <script>
        (function () {
            // Mover modales al body para evitar problemas de CSS containment
            document.querySelectorAll('.modal').forEach(function(m) { document.body.appendChild(m); });

            var selDep = document.getElementById('selDepartamento');
            var selCar = document.getElementById('selCargo');
            var selUbi = document.getElementById('selUbicacion');

            // Guardar todas las opciones de cargo para filtrar por departamento
            var allCargoOptions = [];
            Array.from(selCar.options).forEach(function (opt) {
                if (opt.value !== '0') {
                    allCargoOptions.push({ value: opt.value, text: opt.text, dep: opt.dataset.dep || '0' });
                }
            });

            // Guardar todas las opciones de ubicacion para filtrar por tipo de departamento
            var allUbiOptions = [];
            Array.from(selUbi.options).forEach(function (opt) {
                if (opt.value !== '0') {
                    allUbiOptions.push({ value: opt.value, text: opt.text, depTipo: opt.dataset.depTipo || 'ADMINISTRATIVO' });
                }
            });

            // Filtrar cargos cuando cambia departamento
            function filterCargos() {
                var depId = selDep.value;
                selCar.innerHTML = '<option value="0">Seleccione un cargo</option>';
                allCargoOptions.forEach(function (c) {
                    if (depId === '0' || c.dep === depId) {
                        var opt = document.createElement('option');
                        opt.value = c.value;
                        opt.textContent = c.text;
                        opt.dataset.dep = c.dep;
                        selCar.appendChild(opt);
                    }
                });
            }

            // Filtrar ubicaciones por tipo de departamento seleccionado
            function filterUbicaciones() {
                var selectedOpt = selDep.options[selDep.selectedIndex];
                var depTipo = (selectedOpt && selectedOpt.dataset.tipo) || '';
                selUbi.innerHTML = '<option value="0">Seleccione una ubicacion</option>';
                allUbiOptions.forEach(function (u) {
                    if (!depTipo || u.depTipo === depTipo) {
                        var opt = document.createElement('option');
                        opt.value = u.value;
                        opt.textContent = u.text;
                        opt.dataset.depTipo = u.depTipo;
                        selUbi.appendChild(opt);
                    }
                });
            }

            selDep.addEventListener('change', function () {
                filterCargos(); selCar.value = '0';
                filterUbicaciones(); selUbi.value = '0';
            });
            filterCargos();
            filterUbicaciones();

            /* --- Crear via AJAX --- */
            function ajaxCrear(url, body, errorElId, onOk, btnEl) {
                var errorEl = document.getElementById(errorElId);
                btnEl.disabled = true;
                fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
                .then(function (r) {
                    if (r.status === 409) return r.json().then(function (d) { throw new Error(d.error || 'Ya existe'); });
                    if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || 'Error'); });
                    return r.json();
                })
                .then(function (data) { onOk(data); })
                .catch(function (e) { errorEl.textContent = e.message; })
                .finally(function () { btnEl.disabled = false; });
            }

            document.getElementById('btnCrearDep').addEventListener('click', function () {
                var n = document.getElementById('modalDepNombre').value.trim();
                if (!n) { document.getElementById('modalDepError').textContent = 'El nombre es obligatorio'; return; }
                var btn = this;
                ajaxCrear('/api/relaciones/departamentos', { nombre: n }, 'modalDepError', function (data) {
                    var opt = document.createElement('option');
                    opt.value = data.idDepartamento;
                    opt.textContent = data.nombre;
                    selDep.appendChild(opt);
                    selDep.value = data.idDepartamento;
                    filterCargos();
                    bootstrap.Modal.getInstance(document.getElementById('modalCrearDepartamento')).hide();
                }, btn);
            });

            document.getElementById('btnCrearCar').addEventListener('click', function () {
                var n = document.getElementById('modalCarNombre').value.trim();
                var idDepartamento = selDep.value;
                if (!n) { document.getElementById('modalCarError').textContent = 'El nombre es obligatorio'; return; }
                if (!idDepartamento || idDepartamento === '0') {
                    document.getElementById('modalCarError').textContent = 'Seleccione primero un departamento';
                    return;
                }
                var btn = this;
                ajaxCrear('/api/relaciones/cargos', { nombre: n, idDepartamento: idDepartamento }, 'modalCarError', function (data) {
                    var depId = data.fkDepartamento ? String(data.fkDepartamento.idDepartamento) : idDepartamento;
                    allCargoOptions.push({ value: String(data.idCargo), text: data.nombre, dep: depId });
                    filterCargos();
                    selCar.value = data.idCargo;
                    bootstrap.Modal.getInstance(document.getElementById('modalCrearCargo')).hide();
                }, btn);
            });

            document.getElementById('btnCrearUbi').addEventListener('click', function () {
                var n = document.getElementById('modalUbiNombre').value.trim();
                var a = document.getElementById('modalUbiAgencia').value.trim();
                var errEl = document.getElementById('modalUbiError');
                if (!n) { errEl.textContent = 'El nombre es obligatorio'; return; }
                if (!a) { errEl.textContent = 'La agencia es obligatoria'; return; }
                var btn = this;
                ajaxCrear('/api/relaciones/ubicaciones', { nombre: n, agencia: a }, 'modalUbiError', function (data) {
                    var opt = document.createElement('option');
                    opt.value = data.idUbicacion;
                    opt.textContent = data.nombre + (data.agencia ? ' - ' + data.agencia : '');
                    selUbi.appendChild(opt);
                    selUbi.value = data.idUbicacion;
                    bootstrap.Modal.getInstance(document.getElementById('modalCrearUbicacion')).hide();
                }, btn);
            });
        })();
        </script>

    </div>
</body>

</html>
