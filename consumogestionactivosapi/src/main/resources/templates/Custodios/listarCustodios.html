<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Custodios</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Custodios', subtitle='Directorio operacional de custodios con acceso al expediente y activos asignados.')}"></div>

        <div class="cui-command-bar">
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <a th:href="@{/custodias}" class="cui-btn cui-btn-secondary">
                    <i class="feather-clipboard" aria-hidden="true"></i>
                    <span>Custodias</span>
                </a>
                <a th:href="@{/custodias/reporte}" class="cui-btn cui-btn-secondary">
                    <i class="feather-download" aria-hidden="true"></i>
                    <span>Reporte</span>
                </a>
            </div>
            <a th:href="@{/custodios/nuevo-custodio}" class="cui-btn cui-btn-primary">
                <i class="feather-plus" aria-hidden="true"></i>
                <span>Nuevo custodio</span>
            </a>
        </div>

        <section class="cui-data-grid" id="custodiansGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Gestion de personas</p>
                    <h2>Listado de custodios</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>

            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar por nombre, cedula, correo, departamento o cargo...', exportHref=@{/custodias/reporte/excel})}"></div>

            <div class="cui-grid-filters">
                <select class="form-select" data-cui-grid-filter data-filter-key="estado" data-cui-filter-persist>
                    <option value="">Todos los estados</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>

            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>Custodio</th>
                            <th>Cedula</th>
                            <th>Contacto</th>
                            <th>Departamento / Cargo</th>
                            <th>Sucursal</th>
                            <th>Ingreso</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${listarcustodios == null or #lists.isEmpty(listarcustodios)}">
                            <td colspan="8">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-users', title='Sin custodios', message='No hay custodios registrados.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="custodio : ${listarcustodios}"
                            data-cui-grid-row
                            th:with="departamento=${custodio.fkDepartamento != null ? custodio.fkDepartamento.nombre : '-'},
                                     cargo=${custodio.fkCargo != null ? custodio.fkCargo.nombre : '-'},
                                     ubicacion=${custodio.fkUbicacion != null ? custodio.fkUbicacion.nombre : 'Sin asignar'},
                                     estadoFiltro=${custodio.estado ? 'activo' : 'inactivo'},
                                     busqueda=${(custodio.nombre ?: '') + ' ' + (custodio.cedula ?: '') + ' ' + (custodio.correo ?: '') + ' ' + departamento + ' ' + cargo + ' ' + ubicacion}"
                            th:attr="data-search=${#strings.toLowerCase(busqueda)},data-estado=${estadoFiltro}">
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${custodio.nombre ?: '-'}">Nombre</span>
                                    <span class="cui-row-subtitle" th:text="${'ID ' + custodio.idCustodio}">ID</span>
                                </div>
                            </td>
                            <td th:text="${custodio.cedula ?: '-'}">Cedula</td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${custodio.correo ?: '-'}">Correo</span>
                                    <span class="cui-row-subtitle" th:text="${custodio.telefono ?: '-'}">Telefono</span>
                                </div>
                            </td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${departamento}">Departamento</span>
                                    <span class="cui-row-subtitle" th:text="${cargo}">Cargo</span>
                                </div>
                            </td>
                            <td th:text="${ubicacion}">Sucursal</td>
                            <td th:text="${custodio.fechaIngreso ?: '-'}">Fecha</td>
                            <td>
                                <span class="cui-badge"
                                      th:classappend="${custodio.estado} ? ' cui-badge-asignado' : ' cui-badge-dado-de-baja'"
                                      th:text="${custodio.estado} ? 'Activo' : 'Inactivo'">Estado</span>
                            </td>
                            <td>
                                <div class="cui-action-cell">
                                    <a class="btn btn-outline-primary btn-sm" th:href="@{/custodias/expediente/{id}(id=${custodio.idCustodio})}">
                                        Expediente
                                    </a>
                                    <div class="dropdown cui-action-menu">
                                        <button type="button" class="btn btn-light cui-icon-btn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Mas acciones">
                                            <i class="feather-more-vertical" aria-hidden="true"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-end">
                                            <a class="dropdown-item" th:href="@{/custodios/editar-custodio/{id}(id=${custodio.idCustodio})}">
                                                <i class="feather-edit-2" aria-hidden="true"></i>
                                                Editar
                                            </a>
                                            <button type="button"
                                                    class="dropdown-item text-danger"
                                                    data-bs-toggle="modal"
                                                    data-bs-target="#modalToggleCustodio"
                                                    th:attr="data-id=${custodio.idCustodio},data-estado=${custodio.estado}">
                                                <i th:class="${custodio.estado} ? 'feather-trash-2' : 'feather-check-circle'" aria-hidden="true"></i>
                                                <span th:text="${custodio.estado} ? 'Desactivar' : 'Activar'">Cambiar estado</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay custodios que coincidan con los filtros aplicados.')}"></div>
                </div>
            </div>
        </section>

        <div class="modal fade" id="modalToggleCustodio" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Confirmar cambio de estado</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body" id="textoModalToggleCustodio">Esta seguro?</div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                        <form id="formToggleCustodio" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="idCustodio" id="idCustodioToggle">
                            <button type="submit" class="btn" id="btnToggleCustodio">Confirmar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var modalToggleCustodio = document.getElementById("modalToggleCustodio");
            if (!modalToggleCustodio) {
                return;
            }

            modalToggleCustodio.addEventListener("show.bs.modal", function (event) {
                var button = event.relatedTarget;
                var id = button.getAttribute("data-id");
                var estadoActual = button.getAttribute("data-estado") === "true";
                var form = document.getElementById("formToggleCustodio");
                var btn = document.getElementById("btnToggleCustodio");
                var texto = document.getElementById("textoModalToggleCustodio");

                document.getElementById("idCustodioToggle").value = id;

                if (estadoActual) {
                    texto.textContent = "Esta seguro de desactivar este custodio?";
                    form.action = "/custodios/eliminar-custodio";
                    btn.textContent = "Si, desactivar";
                    btn.className = "btn btn-danger";
                } else {
                    texto.textContent = "Esta seguro de activar este custodio?";
                    form.action = "/custodios/activar-custodio";
                    btn.textContent = "Si, activar";
                    btn.className = "btn btn-success";
                }
            });
        });
    </script>
</th:block>
</body>
</html>
