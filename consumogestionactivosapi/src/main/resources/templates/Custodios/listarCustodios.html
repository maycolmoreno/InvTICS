<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<title>Custodios</title>

</head>

<body>
	<div layout:fragment="contenidopaginas">

		<!-- HEADER -->
		<div class="page-header">
			<div class="page-header-left d-flex align-items-center">
				<div class="page-header-title">
					<h5 class="m-b-10">Custodios</h5>
				</div>
				<ul class="breadcrumb">
					<li class="breadcrumb-item"><a th:href="@{/custodios}">Inicio</a></li>
					<li class="breadcrumb-item">Custodios</li>
				</ul>
			</div>

			<div class="page-header-right ms-auto">
				<div class="page-header-right-items">
					<div
						class="d-flex align-items-center gap-2 page-header-right-items-wrapper">
						<a th:href="@{/custodios/nuevo-custodio}" class="btn btn-primary">
							<i class="feather-plus me-2"></i> <span>Nuevo Custodio</span>
						</a>
					</div>
				</div>
			</div>
		</div>

		<div class="main-content">

			<!-- FILTER BAR -->
			<div class="filter-bar">
				<div class="flex-grow-1" style="min-width:200px; max-width:340px;">
					<div class="input-group">
						<span class="input-group-text bg-white border-end-0 pe-2" style="border-color:#e4e4e7;">
							<i class="feather feather-search" style="font-size:14px; color:#a1a1aa;"></i>
						</span>
						<input type="text" id="searchInput"
							   class="form-control border-start-0 ps-1"
							   placeholder="Buscar por nombre, cedula o correo..."
							   autocomplete="off">
					</div>
				</div>
				<div style="min-width:160px;">
					<select id="filterDepartamento" class="form-select">
						<option value="">Todos los departamentos</option>
					</select>
				</div>
				<div style="min-width:140px;">
					<select id="filterCargo" class="form-select">
						<option value="">Todos los cargos</option>
					</select>
				</div>
				<div style="min-width:140px;">
					<select id="filterEstado" class="form-select">
						<option value="">Todos los estados</option>
						<option value="activo">Activo</option>
						<option value="inactivo">Inactivo</option>
					</select>
				</div>
				<div class="ms-auto row-counter">
					Mostrando <strong id="rowCount">0</strong> custodios
				</div>
			</div>

			<!-- TABLE -->
			<div class="card card-custodios">
				<div class="card-body p-0">
					<div class="table-responsive">
						<table class="table table-hover mb-0" id="custodiosTable">
							<thead>
								<tr>
									<th>ID</th>
									<th>Nombre</th>
									<th>Cédula</th>
									<th>Correo</th>
									<th>Teléfono</th>
									<th>Fecha Ingreso</th>
									<th>Departamento</th>
									<th>Cargo</th>
									<th>Sucursal</th>
									<th>Estado</th>
									<th class="text-end">Acciones</th>
								</tr>
							</thead>

							<tbody id="custodiosTbody">
								<tr th:each="custodio : ${listarcustodios}"
									class="fila-custodio"
									th:attr="data-departamento=${custodio.fkDepartamento != null ? custodio.fkDepartamento.nombre : ''},data-cargo=${custodio.fkCargo != null ? custodio.fkCargo.nombre : ''},data-estado=${custodio.estado ? 'activo' : 'inactivo'}">
									<td class="fw-bold" th:text="${custodio.idCustodio}"></td>
									<td th:text="${custodio.nombre} ?: '-'"></td>
									<td th:text="${custodio.cedula} ?: '-'"></td>
									<td th:text="${custodio.correo} ?: '-'"></td>
									<td th:text="${custodio.telefono} ?: '-'"></td>
									<td th:text="${custodio.fechaIngreso} ?: '-'"></td>
									<td th:text="${custodio.fkDepartamento != null ? custodio.fkDepartamento.nombre : '-'}"></td>
									<td th:text="${custodio.fkCargo != null ? custodio.fkCargo.nombre : '-'}"></td>
									<td th:text="${custodio.fkUbicacion != null ? custodio.fkUbicacion.nombre : '-'}"></td>
									<td>
										<div th:if="${custodio.estado}"
											class="badge bg-soft-success text-success">Activo</div>
										<div th:unless="${custodio.estado}"
											class="badge bg-soft-danger text-danger">Inactivo</div>
									</td>

									<td>
										<div class="hstack gap-2 justify-content-end">
											<a
												th:href="@{/custodios/editar-custodio/{id}(id=${custodio.idCustodio})}"
												class="avatar-text avatar-md"> <i
												class="feather feather-edit"></i>
											</a>
											<button type="button" class="avatar-text avatar-md"
												data-bs-toggle="modal"
												data-bs-target="#modalToggleCustodio"
												th:attr="data-id=${custodio.idCustodio}, data-estado=${custodio.estado}">
												<i class="feather"
													th:classappend="${custodio.estado} ? ' feather-trash-2 text-danger' : ' feather-check-circle text-success'"></i>
											</button>
										</div>
									</td>
								</tr>
							</tbody>

						</table>
					</div>
				</div>

				<!-- PAGINATION BAR -->
				<div class="pagination-bar" id="paginationBar">
					<div class="page-size-wrap">
						<span>Filas por pagina:</span>
						<select id="pageSizeSelect">
							<option value="5">5</option>
							<option value="10" selected>10</option>
							<option value="25">25</option>
							<option value="50">50</option>
						</select>
					</div>
					<div class="pagination-info" id="paginationInfo"></div>
					<nav class="pagination-nav" id="paginationNav"></nav>
				</div>
			</div>

		</div>

		<!-- MODAL -->
		<div class="modal fade" id="modalToggleCustodio" tabindex="-1"
			aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">

					<div class="modal-header">
						<h5 class="modal-title">Confirmar</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>

					<div class="modal-body" id="textoModalToggleCustodio">¿Está
						seguro?</div>

					<div class="modal-footer">
						<button type="button" class="btn btn-light"
							data-bs-dismiss="modal">No</button>

						<form id="formToggleCustodio" method="post">
							<input type="hidden" name="idCustodio" id="idCustodioToggle">
							<button type="submit" class="btn" id="btnToggleCustodio">Sí</button>
						</form>
					</div>

				</div>
			</div>
		</div>

		<!-- SCRIPTS -->
		<script>
		document.addEventListener("DOMContentLoaded", function () {

			/* ── MODAL TOGGLE ─────────────────────────────────────── */
			const modalToggleCustodio = document.getElementById('modalToggleCustodio');
			modalToggleCustodio.addEventListener('show.bs.modal', function (event) {
				const button = event.relatedTarget;
				const id = button.getAttribute('data-id');
				const estadoActual = button.getAttribute('data-estado') === 'true';

				document.getElementById('idCustodioToggle').value = id;
				const form = document.getElementById('formToggleCustodio');
				const btn = document.getElementById('btnToggleCustodio');

				if (estadoActual) {
					document.getElementById('textoModalToggleCustodio').innerText = "¿Está seguro de DESACTIVAR este custodio?";
					form.action = "/custodios/eliminar-custodio";
					btn.innerText = "Sí, desactivar";
					btn.className = "btn btn-danger";
				} else {
					document.getElementById('textoModalToggleCustodio').innerText = "¿Está seguro de ACTIVAR este custodio?";
					form.action = "/custodios/activar-custodio";
					btn.innerText = "Sí, activar";
					btn.className = "btn btn-success";
				}
			});

			const modal = document.getElementById("modalToggleCustodio");
			if (modal && modal.parentElement !== document.body) {
				document.body.appendChild(modal);
			}

			/* ── FILTROS + PAGINACION ─────────────────────────────── */
			const searchInput     = document.getElementById("searchInput");
			const filterDepto     = document.getElementById("filterDepartamento");
			const filterCargo     = document.getElementById("filterCargo");
			const filterEstado    = document.getElementById("filterEstado");
			const rowCountEl      = document.getElementById("rowCount");
			const pageSizeSelect  = document.getElementById("pageSizeSelect");
			const paginationInfo  = document.getElementById("paginationInfo");
			const paginationNav   = document.getElementById("paginationNav");

			const allRows = Array.from(document.querySelectorAll("#custodiosTbody .fila-custodio"));
			let filteredRows = [];
			let currentPage  = 1;
			let pageSize     = parseInt(pageSizeSelect.value, 10);

			/* Poblar filtros Departamento y Cargo con valores unicos */
			const deptos = new Set();
			const cargos = new Set();
			allRows.forEach(function (r) {
				const d = (r.getAttribute("data-departamento") || "").trim();
				const c = (r.getAttribute("data-cargo") || "").trim();
				if (d) deptos.add(d);
				if (c) cargos.add(c);
			});
			Array.from(deptos).sort().forEach(function (d) {
				const o = document.createElement("option"); o.value = d; o.textContent = d;
				filterDepto.appendChild(o);
			});
			Array.from(cargos).sort().forEach(function (c) {
				const o = document.createElement("option"); o.value = c; o.textContent = c;
				filterCargo.appendChild(o);
			});

			/* ── Filter logic ─────────────────────────────────────── */
			function applyFilters() {
				const term   = searchInput.value.trim().toLowerCase();
				const depto  = filterDepto.value;
				const cargo  = filterCargo.value;
				const estado = filterEstado.value;

				filteredRows = allRows.filter(function (row) {
					if (term && row.textContent.toLowerCase().indexOf(term) < 0) return false;
					if (depto && (row.getAttribute("data-departamento") || "") !== depto) return false;
					if (cargo && (row.getAttribute("data-cargo") || "") !== cargo) return false;
					if (estado && (row.getAttribute("data-estado") || "") !== estado) return false;
					return true;
				});

				currentPage = 1;
				renderPage();
			}

			/* ── Render current page ──────────────────────────────── */
			function renderPage() {
				const total      = filteredRows.length;
				const totalPages = Math.max(1, Math.ceil(total / pageSize));
				if (currentPage > totalPages) currentPage = totalPages;

				const start = (currentPage - 1) * pageSize;
				const end   = Math.min(start + pageSize, total);
				const pageSet = new Set(filteredRows.slice(start, end));

				allRows.forEach(function (row) {
					row.style.display = pageSet.has(row) ? "" : "none";
				});

				rowCountEl.textContent = total;

				if (total === 0) {
					paginationInfo.innerHTML = "Sin resultados";
				} else {
					paginationInfo.innerHTML =
						"<strong>" + (start + 1) + "</strong> – <strong>" + end +
						"</strong> de <strong>" + total + "</strong>";
				}

				renderPaginationNav(totalPages);
			}

			/* ── Build pagination nav ─────────────────────────────── */
			function renderPaginationNav(totalPages) {
				let html = "";

				html += '<button class="pg-btn" data-page="prev"' +
						(currentPage <= 1 ? ' disabled' : '') + '>' +
						'<i class="feather feather-chevron-left" style="font-size:14px;"></i></button>';

				const pages = buildPageNumbers(currentPage, totalPages);
				pages.forEach(function (p) {
					if (p === '...') {
						html += '<span class="pg-ellipsis">&hellip;</span>';
					} else {
						html += '<button class="pg-btn' +
								(p === currentPage ? ' active' : '') +
								'" data-page="' + p + '">' + p + '</button>';
					}
				});

				html += '<button class="pg-btn" data-page="next"' +
						(currentPage >= totalPages ? ' disabled' : '') + '>' +
						'<i class="feather feather-chevron-right" style="font-size:14px;"></i></button>';

				paginationNav.innerHTML = html;
			}

			function buildPageNumbers(current, total) {
				if (total <= 7) return Array.from({length: total}, function (_, i) { return i + 1; });
				const pages = [];
				pages.push(1);
				if (current > 3) pages.push('...');
				for (let i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) {
					pages.push(i);
				}
				if (current < total - 2) pages.push('...');
				pages.push(total);
				return pages;
			}

			/* ── Pagination click handler ─────────────────────────── */
			paginationNav.addEventListener("click", function (e) {
				const btn = e.target.closest(".pg-btn");
				if (!btn || btn.disabled) return;
				const val = btn.dataset.page;
				const totalPages = Math.max(1, Math.ceil(filteredRows.length / pageSize));
				if (val === "prev")      currentPage = Math.max(1, currentPage - 1);
				else if (val === "next") currentPage = Math.min(totalPages, currentPage + 1);
				else                     currentPage = parseInt(val, 10);
				renderPage();
			});

			/* ── Page-size change ─────────────────────────────────── */
			pageSizeSelect.addEventListener("change", function () {
				pageSize    = parseInt(pageSizeSelect.value, 10);
				currentPage = 1;
				renderPage();
			});

			/* ── INIT ─────────────────────────────────────────────── */
			applyFilters();
			searchInput.addEventListener("input",   applyFilters);
			filterDepto.addEventListener("change",  applyFilters);
			filterCargo.addEventListener("change",  applyFilters);
			filterEstado.addEventListener("change", applyFilters);
		});
		</script>

	</div>
</body>
</html>
