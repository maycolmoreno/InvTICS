<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="commandBar" class="cui-command-bar">
    <div class="d-flex align-items-center gap-2 flex-wrap">
        <button type="button" class="cui-btn cui-btn-secondary">
            <i class="feather-filter"></i>
            <span>Filtros</span>
        </button>
        <button type="button" class="cui-btn cui-btn-secondary">
            <i class="feather-download"></i>
            <span>Exportar</span>
        </button>
    </div>
    <div class="d-flex align-items-center gap-2 flex-wrap">
        <button type="button" class="cui-btn cui-btn-primary">
            <i class="feather-plus"></i>
            <span>Nuevo</span>
        </button>
    </div>
</div>
</body>
</html>
