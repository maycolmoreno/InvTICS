<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<article th:fragment="kpiCard(label, value, meta, icon, tone)" class="cui-kpi-card">
    <div class="d-flex align-items-start justify-content-between gap-3">
        <div>
            <div class="cui-kpi-label" th:text="${label}">Indicador</div>
            <div class="cui-kpi-value" th:text="${value}">0</div>
            <div class="cui-kpi-meta" th:text="${meta}">Resumen</div>
        </div>
        <span class="cui-icon-button" th:classappend="${tone != null ? ' cui-kpi-icon-' + tone : ''}">
            <i th:class="${icon != null ? icon : 'feather-activity'}"></i>
        </span>
    </div>
</article>
</body>
</html>
