<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{plantilla/plantillaui}">
<head>
<meta charset="utf-8">
<title>Visita tecnica</title>
<style>
    :root {
        --mt-bg: #f4f6fb;
        --mt-card: #ffffff;
        --mt-line: #e3e7ef;
        --mt-text: #152238;
        --mt-muted: #6d7a92;
        --mt-primary: #4e4acb;
        --mt-primary-soft: #eeedff;
        --mt-danger: #b22222;
        --mt-warning: #9a5d00;
        --mt-ok: #1f7a3f;
        --mt-review: #1d5ca4;
        --mt-shadow: 0 10px 26px rgba(16, 24, 40, 0.06);
    }

    .mt-page {
        display: grid;
        gap: 14px;
    }

    .mt-shell {
        background: var(--mt-card);
        border: 1px solid var(--mt-line);
        border-radius: 16px;
        box-shadow: var(--mt-shadow);
        overflow: hidden;
    }

    .mt-top {
        padding: 14px 18px;
        border-bottom: 1px solid var(--mt-line);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
    }

    .mt-title {
        margin: 0;
        font-size: 29px;
        line-height: 1;
        font-weight: 800;
        color: var(--mt-text);
    }

    .mt-subtitle {
        margin: 4px 0 0;
        color: var(--mt-muted);
        font-size: 13px;
    }

    .mt-status {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        border: 1px solid #dacd95;
        background: #fff7d8;
        color: #7a5a00;
        font-size: 13px;
        font-weight: 700;
        padding: 6px 12px;
    }

    .mt-body {
        padding: 14px;
        display: grid;
        gap: 12px;
    }

    .mt-filters {
        display: grid;
        grid-template-columns: repeat(4, minmax(170px, 1fr));
        gap: 10px;
    }

    .mt-field label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--mt-muted);
        margin-bottom: 4px;
    }

    .mt-select,
    .mt-input {
        width: 100%;
        border: 1px solid var(--mt-line);
        border-radius: 10px;
        padding: 9px 12px;
        font-size: 14px;
        background: #fff;
        color: var(--mt-text);
    }

    .mt-metrics {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(4, minmax(130px, 1fr));
    }

    .mt-metric {
        border: 1px solid var(--mt-line);
        border-radius: 12px;
        background: #fbfcff;
        padding: 10px 14px;
    }

    .mt-metric b {
        display: block;
        font-size: 31px;
        line-height: 1;
        color: var(--mt-text);
    }

    .mt-metric span {
        color: var(--mt-muted);
        font-size: 13px;
    }

    .mt-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .mt-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .mt-chip {
        border: 1px solid var(--mt-line);
        background: #fff;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 13px;
        color: var(--mt-text);
        cursor: pointer;
    }

    .mt-chip.active {
        border-color: var(--mt-primary);
        background: var(--mt-primary-soft);
        color: #3329b0;
        font-weight: 700;
    }

    .mt-btn {
        border: 1px solid var(--mt-primary);
        border-radius: 10px;
        padding: 9px 14px;
        font-size: 14px;
        font-weight: 700;
        background: var(--mt-primary);
        color: #fff;
        cursor: pointer;
    }

    .mt-btn.secondary {
        background: #fff;
        color: var(--mt-primary);
    }

    .mt-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
    }

    .mt-table-wrap {
        border: 1px solid var(--mt-line);
        border-radius: 12px;
        overflow: hidden;
    }

    .mt-head,
    .mt-row {
        display: grid;
        grid-template-columns: 30px 1.5fr 0.8fr 0.8fr 0.9fr 0.7fr 30px;
        gap: 8px;
        align-items: center;
        padding: 10px 12px;
    }

    .mt-head {
        background: #f6f8fe;
        font-size: 12px;
        color: var(--mt-muted);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        border-bottom: 1px solid var(--mt-line);
    }

    .mt-group {
        border-top: 1px solid var(--mt-line);
    }

    .mt-group:first-child {
        border-top: 0;
    }

    .mt-group-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 9px 12px;
        background: #f0f2ff;
        color: #2f3f8f;
        font-weight: 700;
        font-size: 14px;
    }

    .mt-group-header small {
        color: #5462b4;
        font-weight: 600;
    }

    .mt-row {
        border-top: 1px solid var(--mt-line);
        background: #fff;
    }

    .mt-row:hover {
        background: #f9fbff;
    }

    .mt-equipo {
        display: grid;
        gap: 2px;
    }

    .mt-equipo strong {
        color: var(--mt-text);
    }

    .mt-equipo small {
        color: var(--mt-muted);
    }

    .mt-badge {
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        font-weight: 700;
        display: inline-block;
        text-align: center;
    }

    .mt-badge.URGENTE {
        color: var(--mt-danger);
        background: rgba(178, 34, 34, 0.12);
    }

    .mt-badge.PROXIMO {
        color: var(--mt-warning);
        background: rgba(154, 93, 0, 0.14);
    }

    .mt-badge.AL_DIA {
        color: var(--mt-ok);
        background: rgba(31, 122, 63, 0.14);
    }

    .mt-badge.REVISADO {
        color: var(--mt-review);
        background: rgba(29, 92, 164, 0.14);
    }

    .mt-info {
        width: 22px;
        height: 22px;
        border: 1px solid var(--mt-line);
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--mt-muted);
        text-decoration: none;
        font-size: 12px;
    }

    .mt-empty {
        padding: 26px 14px;
        text-align: center;
        color: var(--mt-muted);
        background: #fff;
    }

    .mt-bottom {
        border-top: 1px solid var(--mt-line);
        background: #fff;
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        position: sticky;
        bottom: 0;
        z-index: 8;
    }

    .mt-bottom-right {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
    }

    .mt-bottom .count {
        color: var(--mt-text);
        font-weight: 700;
    }

    .mt-bottom .count small {
        color: var(--mt-muted);
        font-weight: 600;
    }

    @media (max-width: 1200px) {
        .mt-filters {
            grid-template-columns: repeat(2, minmax(170px, 1fr));
        }

        .mt-metrics {
            grid-template-columns: repeat(2, minmax(130px, 1fr));
        }

        .mt-head,
        .mt-row {
            grid-template-columns: 30px 1.8fr 1fr 1fr 1fr 0.9fr 30px;
        }
    }

    @media (max-width: 800px) {
        .mt-top {
            grid-template-columns: 1fr;
        }

        .mt-title {
            font-size: 22px;
        }

        .mt-filters,
        .mt-metrics {
            grid-template-columns: 1fr;
        }

        .mt-head {
            display: none;
        }

        .mt-row {
            grid-template-columns: 30px 1fr 1fr;
            grid-template-areas:
                "check equipo estado"
                "check serial dias"
                "check dept info";
            gap: 6px;
            align-items: start;
        }

        .mt-row > :nth-child(1) { grid-area: check; }
        .mt-row > :nth-child(2) { grid-area: equipo; }
        .mt-row > :nth-child(3) { grid-area: serial; }
        .mt-row > :nth-child(4) { grid-area: dept; }
        .mt-row > :nth-child(5) { grid-area: dias; }
        .mt-row > :nth-child(6) { grid-area: estado; }
        .mt-row > :nth-child(7) { grid-area: info; justify-self: end; }

        .mt-bottom {
            border-radius: 12px;
            border: 1px solid var(--mt-line);
            margin-top: 6px;
        }
    }
</style>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="mt-page">
        <div class="mt-shell">
            <div class="mt-top">
                <div>
                    <h2 class="mt-title">Visita tecnica</h2>
                    <p class="mt-subtitle">Filtra por ubicacion, custodio y estado para iniciar ordenes de trabajo.</p>
                </div>
                <span class="mt-status">En proceso</span>
            </div>

            <div class="mt-body">
                <div class="mt-filters">
                    <div class="mt-field">
                        <label for="ubicacionSelect">Ubicacion</label>
                        <select id="ubicacionSelect" class="mt-select">
                            <option value="" selected disabled>Selecciona una ubicacion</option>
                            <option th:each="u : ${ubicaciones}" th:value="${u.idUbicacion}" th:text="${u.nombre}"></option>
                        </select>
                    </div>
                    <div class="mt-field">
                        <label for="custodioSelect">Custodio</label>
                        <select id="custodioSelect" class="mt-select" disabled>
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="mt-field">
                        <label for="tipoMantenimientoInicio">Tipo mantenimiento</label>
                        <select id="tipoMantenimientoInicio" class="mt-select">
                            <option value="PREVENTIVO">Preventivo</option>
                            <option value="CORRECTIVO">Correctivo</option>
                        </select>
                    </div>
                    <div class="mt-field">
                        <label for="searchInput">Buscar</label>
                        <input id="searchInput" class="mt-input" type="search" placeholder="Serial, Cod. Interno o modelo">
                    </div>
                </div>

                <div class="mt-metrics">
                    <div class="mt-metric"><b id="metricTotal">0</b><span>Total equipos</span></div>
                    <div class="mt-metric"><b id="metricPendientes">0</b><span>Requieren mantenimiento</span></div>
                    <div class="mt-metric"><b id="metricRevisados">0</b><span>Revisados hoy</span></div>
                    <div class="mt-metric"><b id="metricSeleccionados">0</b><span>Seleccionados</span></div>
                </div>

                <div class="mt-controls">
                    <div class="mt-chips" id="stateFilters">
                        <button type="button" class="mt-chip active" data-estado="TODOS">Todos</button>
                        <button type="button" class="mt-chip" data-estado="URGENTE">Urgente</button>
                        <button type="button" class="mt-chip" data-estado="PROXIMO">Proximo</button>
                        <button type="button" class="mt-chip" data-estado="AL_DIA">Al dia</button>
                        <button type="button" class="mt-chip" data-estado="REVISADO">Revisado</button>
                    </div>
                    <button type="button" class="mt-btn secondary" id="btnSeleccionarPendientes">Seleccionar pendientes</button>
                </div>

                <div class="mt-table-wrap" id="listaEquiposWrap">
                    <div class="mt-head">
                        <div><input id="checkAll" type="checkbox" aria-label="Seleccionar todo"></div>
                        <div>Equipo</div>
                        <div>Serial / Cod. Interno</div>
                        <div>Custodio</div>
                        <div>Departamento</div>
                        <div>Estado</div>
                        <div></div>
                    </div>
                    <div id="listaEquipos">
                        <div class="mt-empty">Selecciona una ubicacion para cargar equipos.</div>
                    </div>
                </div>
            </div>

            <div class="mt-bottom">
                <div class="count">Seleccionados: <span id="selectedCount">0</span> <small>de <span id="countVisible">0</span></small></div>
                <div class="mt-bottom-right">
                    <button type="button" class="mt-btn secondary" id="btnLimpiarSeleccion">Limpiar</button>
                    <button type="button" class="mt-btn" id="btnIniciarMantenimiento">Iniciar mantenimiento</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const ubicacionSelect = document.getElementById("ubicacionSelect");
            const custodioSelect = document.getElementById("custodioSelect");
            const lista = document.getElementById("listaEquipos");
            const searchInput = document.getElementById("searchInput");
            const stateFilters = document.getElementById("stateFilters");
            const checkAll = document.getElementById("checkAll");
            const btnPendientes = document.getElementById("btnSeleccionarPendientes");
            const btnIniciar = document.getElementById("btnIniciarMantenimiento");
            const btnLimpiar = document.getElementById("btnLimpiarSeleccion");
            const tipoMantenimientoInicio = document.getElementById("tipoMantenimientoInicio");

            const metricTotal = document.getElementById("metricTotal");
            const metricPendientes = document.getElementById("metricPendientes");
            const metricRevisados = document.getElementById("metricRevisados");
            const metricSeleccionados = document.getElementById("metricSeleccionados");
            const selectedCount = document.getElementById("selectedCount");
            const countVisible = document.getElementById("countVisible");

            let data = [];
            let estadoFiltro = "TODOS";
            let queryFiltro = "";
            let seleccionados = new Set();

            const hoy = new Date().toISOString().slice(0, 10);

            function setLoading(msg) {
                lista.innerHTML = "<div class='mt-empty'>" + msg + "</div>";
            }

            function toText(v) {
                return (v || "").toString().trim();
            }

            function normalize(v) {
                return toText(v)
                    .toLowerCase()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "");
            }

            function formatDias(item) {
                if (item.diasSinMantenimiento == null) return "Sin registro";
                return item.diasSinMantenimiento + " dias";
            }

            function getEstadoLabel(estado) {
                const map = {
                    URGENTE: "Urgente",
                    PROXIMO: "Proximo",
                    AL_DIA: "Al dia",
                    REVISADO: "Revisado"
                };
                return map[estado] || "Sin estado";
            }

            function getEquipoNombre(item) {
                const marca = toText(item.marca);
                const modelo = toText(item.modelo);
                return [marca, modelo].join(" ").trim() || "Equipo";
            }

            function buildSearchBlob(item) {
                return normalize([
                    getEquipoNombre(item),
                    item.serial,
                    item.codigoSap,
                    item.custodioNombre,
                    item.custodioArea
                ].join(" "));
            }

            function filteredItems() {
                return data.filter(item => {
                    const byEstado = estadoFiltro === "TODOS" || item.estadoMantenimiento === estadoFiltro;
                    if (!byEstado) return false;
                    if (!queryFiltro) return true;
                    return buildSearchBlob(item).includes(queryFiltro);
                });
            }

            function updateCounters(visible) {
                const pendientes = visible.filter(i => i.estadoMantenimiento === "URGENTE" || i.estadoMantenimiento === "PROXIMO").length;
                const revisadosHoy = visible.filter(i => i.fechaUltimoMantenimiento === hoy).length;
                const selectedVisible = visible.filter(i => seleccionados.has(i.idEquipo)).length;

                metricTotal.textContent = String(visible.length);
                metricPendientes.textContent = String(pendientes);
                metricRevisados.textContent = String(revisadosHoy);
                metricSeleccionados.textContent = String(seleccionados.size);
                selectedCount.textContent = String(seleccionados.size);
                countVisible.textContent = String(visible.length);
                checkAll.checked = visible.length > 0 && selectedVisible === visible.length;
            }

            function toggleSelection(id, checked) {
                if (checked) {
                    seleccionados.add(id);
                } else {
                    seleccionados.delete(id);
                }
            }

            function render() {
                const visible = filteredItems();
                updateCounters(visible);

                if (!visible.length) {
                    lista.innerHTML = "<div class='mt-empty'>No hay equipos para el filtro actual.</div>";
                    return;
                }

                const groups = new Map();
                visible.forEach(item => {
                    const key = toText(item.custodioNombre) || "Sin custodio";
                    if (!groups.has(key)) groups.set(key, []);
                    groups.get(key).push(item);
                });

                const groupRows = [];
                Array.from(groups.keys()).sort((a, b) => a.localeCompare(b)).forEach(custodio => {
                    const items = groups.get(custodio);
                    const bodyId = "grp-" + custodio.toLowerCase().replace(/[^a-z0-9]+/g, "-") + "-" + items.length;
                    groupRows.push(
                        "<div class='mt-group'>" +
                            "<div class='mt-group-header' data-target='" + bodyId + "'>" +
                                "<span>" + custodio + " <small>- " + items.length + " equipo(s)</small></span>" +
                                "<span aria-hidden='true'>?</span>" +
                            "</div>" +
                            "<div id='" + bodyId + "'>" +
                                items.map(item => {
                                    const checked = seleccionados.has(item.idEquipo) ? "checked" : "";
                                    const equipoNombre = getEquipoNombre(item);
                                    const serial = toText(item.serial) || "-";
                                    const sap = toText(item.codigoSap) || "-";
                                    const area = toText(item.custodioArea) || "-";
                                    const dias = formatDias(item);
                                    const estado = toText(item.estadoMantenimiento) || "AL_DIA";

                                    return "<div class='mt-row'>" +
                                        "<div><input type='checkbox' class='mt-check' data-id='" + item.idEquipo + "' " + checked + "></div>" +
                                        "<div class='mt-equipo'><strong>" + equipoNombre + "</strong><small>" + (toText(item.marca) || "N/A") + "</small></div>" +
                                        "<div><strong>" + serial + "</strong><br><small class='text-muted'>" + sap + "</small></div>" +
                                        "<div>" + (toText(item.custodioNombre) || "-") + "</div>" +
                                        "<div>" + area + "</div>" +
                                        "<div><span class='mt-badge " + estado + "'>" + getEstadoLabel(estado) + "</span><br><small class='text-muted'>" + dias + "</small></div>" +
                                        "<div><a class='mt-info' href='/mantenimiento/historial/" + item.idEquipo + "' title='Ver historial'>i</a></div>" +
                                    "</div>";
                                }).join("") +
                            "</div>" +
                        "</div>"
                    );
                });

                lista.innerHTML = groupRows.join("");

                document.querySelectorAll(".mt-group-header").forEach(header => {
                    header.addEventListener("click", function() {
                        const target = document.getElementById(header.dataset.target);
                        if (!target) return;
                        const isHidden = target.style.display === "none";
                        target.style.display = isHidden ? "block" : "none";
                        header.querySelector("span:last-child").textContent = isHidden ? "?" : "?";
                    });
                });

                document.querySelectorAll(".mt-check").forEach(check => {
                    check.addEventListener("change", function(e) {
                        const id = parseInt(e.target.dataset.id, 10);
                        toggleSelection(id, e.target.checked);
                        updateCounters(filteredItems());
                    });
                });
            }

            function fetchCustodios(ubicacionId) {
                custodioSelect.innerHTML = "<option value=''>Todos</option>";
                custodioSelect.disabled = true;
                return fetch("/api/visita/custodios?ubicacionId=" + ubicacionId, { credentials: "same-origin" })
                    .then(r => {
                        if (!r.ok) throw new Error("No se pudieron cargar custodios");
                        return r.json();
                    })
                    .then(items => {
                        (items || []).forEach(c => {
                            const opt = document.createElement("option");
                            opt.value = c.idCustodio;
                            opt.textContent = c.nombre + (c.area ? " - " + c.area : "");
                            custodioSelect.appendChild(opt);
                        });
                        custodioSelect.disabled = false;
                        custodioSelect.value = "";
                    })
                    .catch(() => {
                        custodioSelect.disabled = false;
                    });
            }

            function fetchEquipos() {
                const ubicacionId = ubicacionSelect.value;
                if (!ubicacionId) {
                    setLoading("Selecciona una ubicacion para cargar equipos.");
                    return;
                }
                const custodioId = custodioSelect.value;
                let url = "/api/visita/equipos?ubicacionId=" + encodeURIComponent(ubicacionId);
                if (custodioId) {
                    url += "&custodioId=" + encodeURIComponent(custodioId);
                }

                setLoading("Cargando equipos...");
                seleccionados.clear();

                fetch(url, { credentials: "same-origin" })
                    .then(r => {
                        if (!r.ok) throw new Error("No se pudieron cargar equipos");
                        return r.json();
                    })
                    .then(items => {
                        data = items || [];
                        render();
                    })
                    .catch(() => {
                        data = [];
                        setLoading("No se pudieron cargar los equipos.");
                        updateCounters([]);
                    });
            }

            stateFilters.addEventListener("click", function(e) {
                const btn = e.target.closest(".mt-chip");
                if (!btn) return;
                document.querySelectorAll(".mt-chip").forEach(c => c.classList.remove("active"));
                btn.classList.add("active");
                estadoFiltro = btn.dataset.estado;
                render();
            });

            searchInput.addEventListener("input", function(e) {
                queryFiltro = normalize(e.target.value || "");
                render();
            });

            checkAll.addEventListener("change", function(e) {
                const checked = !!e.target.checked;
                filteredItems().forEach(item => toggleSelection(item.idEquipo, checked));
                render();
            });

            btnPendientes.addEventListener("click", function() {
                seleccionados.clear();
                data.forEach(item => {
                    if (item.estadoMantenimiento === "URGENTE" || item.estadoMantenimiento === "PROXIMO") {
                        seleccionados.add(item.idEquipo);
                    }
                });
                render();
            });

            btnLimpiar.addEventListener("click", function() {
                seleccionados.clear();
                render();
            });

            btnIniciar.addEventListener("click", function() {
                if (seleccionados.size === 0) {
                    alert("Selecciona al menos un equipo para iniciar mantenimiento.");
                    return;
                }

                const tipo = (tipoMantenimientoInicio.value || "PREVENTIVO").toUpperCase();
                const cantidad = seleccionados.size;
                const confirmar = confirm("Se abrira el registro manual para " + cantidad + " equipo(s) de tipo " + tipo + ". Deseas continuar?");
                if (!confirmar) {
                    return;
                }

                const ids = Array.from(seleccionados).join(",");
                window.location.href = "/mantenimiento/nuevo?equipoIds=" + encodeURIComponent(ids);
            });

            ubicacionSelect.addEventListener("change", function() {
                const ubicacionId = ubicacionSelect.value;
                if (!ubicacionId) return;
                fetchCustodios(ubicacionId).then(fetchEquipos);
            });

            custodioSelect.addEventListener("change", fetchEquipos);
        })();
    </script>
</div>
</body>
</html>
