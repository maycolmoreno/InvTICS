<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">
<head>
<title>Nueva Actividad Checklist</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
	<form th:action="@{/checklist}" th:object="${actividad}" method="post">
		<div class="page-shell admin-form-shell">
			<section class="operations-strip">
				<div class="operations-copy">
					<div class="eyebrow">Configuracion Operativa</div>
					<h1 class="operations-title">Registrar nueva actividad de checklist</h1>
				</div>
				<div class="operations-badges">
					<div class="operations-badge"><i class="feather-check-square"></i><span>Checklist tecnico</span></div>
				</div>
			</section>

			<section class="admin-form-grid">
				<article class="admin-form-card">
					<h2 class="admin-form-card-title">Datos de la actividad</h2>
					<p class="admin-form-card-copy">Define el nombre, la categoria y el orden de aparicion en el checklist de mantenimiento.</p>
					<div class="form-grid">
						<div>
							<label class="field-label">Nombre de la actividad</label>
							<input type="text" class="form-control" placeholder="Ej. Verificar ventiladores" th:field="*{nombre}" maxlength="200">
							<div class="text-danger small mt-1" th:if="${errorNombre}" th:text="${errorNombre}"></div>
						</div>
						<div>
							<label class="field-label">Categoria</label>
							<input type="text" class="form-control" placeholder="Ej. Hardware, Software, Red" th:field="*{categoria}" maxlength="100">
							<div class="text-danger small mt-1" th:if="${errorCategoria}" th:text="${errorCategoria}"></div>
						</div>
						<div>
							<label class="field-label">Orden</label>
							<input type="number" class="form-control" placeholder="1" th:field="*{orden}" min="1">
						</div>
						<div>
							<label class="field-label">Estado</label>
							<select class="form-select" th:field="*{estado}">
								<option value="true">Activa</option>
								<option value="false">Inactiva</option>
							</select>
						</div>
					</div>
				</article>
			</section>

			<div class="action-footer">
				<div class="action-footer-copy">La actividad aparecera automaticamente en los formularios de mantenimiento.</div>
				<div class="d-flex gap-2 flex-wrap">
					<a th:href="@{/checklist}" class="btn btn-light px-4 py-3">Cancelar</a>
					<button type="submit" class="btn btn-primary px-4 py-3">
						<i class="feather-save me-2"></i>Guardar actividad
					</button>
				</div>
			</div>
		</div>
	</form>
</div>
</body>
</html>
