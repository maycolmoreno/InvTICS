<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">
<head>
<meta charset="utf-8">
<title>Checklist de Actividades</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
  <div class="cui-page">
    <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Checklist de actividades', subtitle='Actividades tecnicas que aparecen automaticamente en los formularios de mantenimiento.')}"></div>

    <div class="alert alert-success cui-alert" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>

    <div class="cui-command-bar">
      <button type="button" class="cui-btn cui-btn-primary" data-action="actividad-nuevo" data-cui-drawer-open="#drawerActividad">
        <i class="feather-plus-circle" aria-hidden="true"></i>
        <span>Nueva actividad</span>
      </button>
    </div>

    <section class="cui-data-grid" data-cui-grid>
      <div class="cui-data-grid-header">
        <div>
          <h2>Listado de actividades</h2>
          <span class="cui-data-grid-meta" data-cui-grid-count>0 registros</span>
        </div>
      </div>

      <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar actividad...', exportHref=null)}"></div>

      <div class="cui-data-grid-body">
        <div class="table-responsive">
          <table class="table cui-table">
            <thead>
            <tr>
              <th style="width:80px">Orden</th>
              <th>Actividad</th>
              <th>Estado</th>
              <th class="text-end">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(actividades)}">
              <td colspan="4">
                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-check-square', title='Sin actividades', message='No hay actividades checklist configuradas.')}"></div>
              </td>
            </tr>
            <tr th:each="act : ${actividades}"
                data-cui-grid-row
                th:attr="data-search=${#strings.toLowerCase(act.nombre ?: '')},
                         data-id-actividad=${act.idActividad},
                         data-nombre=${act.nombre ?: ''},
                         data-orden=${act.orden ?: ''},
                         data-estado-activo=${act.estado}">
              <td><span class="cui-row-title" th:text="${act.orden ?: '-'}">1</span></td>
              <td th:text="${act.nombre}">Actividad</td>
              <td>
                <span th:replace="~{fragments/components/status-badge :: statusBadge(${act.estado ? 'Activa' : 'Inactiva'}, ${act.estado ? 'success' : 'muted'})}"></span>
              </td>
              <td>
                <div class="cui-action-cell">
                  <button type="button" class="cui-btn cui-btn-secondary cui-btn-sm" data-action="actividad-editar" data-cui-drawer-open="#drawerActividad">Editar</button>
                  <form th:action="@{/checklist/eliminar}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="idActividad" th:value="${act.idActividad}">
                    <button type="submit" class="cui-btn cui-btn-danger cui-btn-sm" data-cui-confirm="Eliminar esta actividad del checklist?">
                      <i class="feather-trash-2" aria-hidden="true"></i>
                    </button>
                  </form>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
        <div hidden data-cui-empty-state>
          <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay actividades que coincidan con la busqueda visual.')}"></div>
        </div>
      </div>
    </section>

    <!-- Drawer: Nueva / Editar actividad -->
    <aside class="cui-drawer" id="drawerActividad" aria-hidden="true" aria-label="Actividad checklist">
      <div class="cui-drawer-header">
        <div>
          <div class="fw-bold" id="drawerActividadTitulo">Nueva actividad</div>
          <div class="small text-muted">Define el nombre y el orden de aparicion en el checklist de mantenimiento.</div>
        </div>
        <button type="button" class="cui-icon-button" data-cui-drawer-close aria-label="Cerrar panel">
          <i class="feather-x"></i>
        </button>
      </div>
      <div class="cui-drawer-body">
        <form id="formActividad" th:action="@{/checklist}" method="post" class="row g-3">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <input type="hidden" name="idActividad" value="0">

          <div class="col-12">
            <label class="form-label">Nombre de la actividad <span class="cui-required-mark">*</span></label>
            <input type="text" class="form-control" name="nombre" placeholder="Ej. Verificar ventiladores" maxlength="200">
          </div>
          <div class="col-6">
            <label class="form-label">Orden</label>
            <input type="number" class="form-control" name="orden" placeholder="1" min="1">
          </div>
          <div class="col-6" id="drawerActividadEstadoWrap" hidden>
            <label class="form-label">Estado</label>
            <select class="form-select" name="estado" id="actividadEstadoSelect">
              <option value="true">Activa</option>
              <option value="false">Inactiva</option>
            </select>
          </div>

          <div class="col-12 d-flex justify-content-end gap-2 pt-2">
            <button type="button" class="cui-btn cui-btn-secondary" data-cui-drawer-close>Cancelar</button>
            <button class="cui-btn cui-btn-primary" type="submit">
              <i class="feather-save" aria-hidden="true"></i>
              <span>Guardar</span>
            </button>
          </div>
        </form>
      </div>
    </aside>
  </div>
</div>

<th:block layout:fragment="scripts">
  <script>
  (function () {
    var form = document.getElementById('formActividad');
    var drawerTitulo = document.getElementById('drawerActividadTitulo');
    var estadoWrap = document.getElementById('drawerActividadEstadoWrap');

    function setValue(name, value) {
      var el = form.querySelector('[name="' + name + '"]');
      if (el) el.value = value || '';
    }

    function abrirDrawerNuevo() {
      form.reset();
      setValue('idActividad', '0');
      setValue('orden', '1');
      drawerTitulo.textContent = 'Nueva actividad';
      estadoWrap.hidden = true;
    }

    function abrirDrawerEditar(row) {
      var d = row.dataset;
      form.reset();
      drawerTitulo.textContent = 'Editar actividad';
      setValue('idActividad', d.idActividad);
      setValue('nombre', d.nombre);
      setValue('orden', d.orden);
      estadoWrap.hidden = false;
      document.getElementById('actividadEstadoSelect').value = d.estadoActivo === 'true' ? 'true' : 'false';
    }

    document.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-action]');
      if (!btn) return;
      if (btn.dataset.action === 'actividad-nuevo') {
        abrirDrawerNuevo();
      } else if (btn.dataset.action === 'actividad-editar') {
        var row = btn.closest('tr');
        if (row) abrirDrawerEditar(row);
      }
    });
  })();
  </script>
</th:block>
</body>
</html>
