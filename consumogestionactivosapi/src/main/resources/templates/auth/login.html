<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantilla-auth}">
<head>
    <title>Iniciar sesion</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div layout:fragment="contenidoauth" class="tag-scene">
        <main class="tag-card" aria-labelledby="tituloLogin">
            <div class="tag-hole" aria-hidden="true"></div>

            <div class="tag-band" aria-hidden="true">
                <span class="tag-code">CRES-0001 &middot; PUNTO DE ACCESO</span>
                <span class="tag-barcode"></span>
            </div>

            <div class="tag-body">
                <div class="tag-brand">
                    <span class="tag-brand-name">CRESIO</span>
                    <span class="tag-brand-sub">Gestion de activos TIC</span>
                </div>

                <h1 class="tag-title" id="tituloLogin">Iniciar sesion</h1>

                <div th:if="${exito}" class="tag-alert tag-alert-ok" role="alert">
                    <i class="feather-check-circle" aria-hidden="true"></i>
                    <span th:text="${exito}"></span>
                </div>

                <div th:if="${error}" class="tag-alert tag-alert-error" role="alert">
                    <i class="feather-alert-circle" aria-hidden="true"></i>
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="tag-field">
                        <label for="correo">Correo institucional</label>
                        <input type="email" id="correo" name="correo"
                               placeholder="usuario@cresio.com" autocomplete="username"
                               required autofocus>
                    </div>

                    <div class="tag-field">
                        <label for="contrasena">Contrasena</label>
                        <input type="password" id="contrasena" name="contrasena"
                               placeholder="Tu contrasena" autocomplete="current-password"
                               required>
                    </div>

                    <button type="submit" class="tag-submit">
                        <i class="feather-log-in" aria-hidden="true"></i>
                        Iniciar sesion
                    </button>
                </form>

                <p class="tag-help">
                    &iquest;No puedes entrar? Escribe a Tecnologias e Innovacion.
                </p>
            </div>
        </main>

        <p class="tag-scene-footer">
            Cada activo etiquetado &middot; cada custodia registrada
        </p>
    </div>
</body>
</html>
