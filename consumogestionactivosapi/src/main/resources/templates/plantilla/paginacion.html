<!-- Fragmento de paginación reutilizable -->
<!-- Uso: <div th:replace="~{plantilla/paginacion :: paginacion(rutaBase='/equipos')}"></div> -->
<div th:fragment="paginacion(rutaBase)" th:if="${totalPaginas != null and totalPaginas > 1}">
    <nav aria-label="Paginación" class="mt-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <small class="text-muted">
                Mostrando página <span th:text="${paginaActual + 1}">1</span>
                de <span th:text="${totalPaginas}">1</span>
                (<span th:text="${totalElementos}">0</span> registros)
            </small>
        </div>
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${paginaActual == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{${rutaBase}(page=0, size=${tamanioPagina})}">&laquo;</a>
            </li>
            <li class="page-item" th:classappend="${paginaActual == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{${rutaBase}(page=${paginaActual - 1}, size=${tamanioPagina})}">&lsaquo;</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}"
                th:if="${i >= paginaActual - 2 and i <= paginaActual + 2}"
                class="page-item"
                th:classappend="${i == paginaActual} ? 'active'">
                <a class="page-link"
                   th:href="@{${rutaBase}(page=${i}, size=${tamanioPagina})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${paginaActual + 1 >= totalPaginas} ? 'disabled'">
                <a class="page-link"
                   th:href="@{${rutaBase}(page=${paginaActual + 1}, size=${tamanioPagina})}">&rsaquo;</a>
            </li>
            <li class="page-item" th:classappend="${paginaActual + 1 >= totalPaginas} ? 'disabled'">
                <a class="page-link"
                   th:href="@{${rutaBase}(page=${totalPaginas - 1}, size=${tamanioPagina})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</div>
