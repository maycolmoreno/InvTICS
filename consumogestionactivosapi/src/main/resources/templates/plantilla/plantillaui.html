<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
<meta charset="utf-8" />
<meta http-equiv="x-ua-compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="_csrf" th:content="${_csrf.token}" />
<meta name="_csrf_header" th:content="${_csrf.headerName}" />
<title>CRESIO - Gestion de Activos</title>
<link rel="icon" type="image/png" th:href="@{/assets/images/logo/logoCRESIO.png}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" type="text/css" th:href="@{/assets/css/bootstrap.min.css}">
<link rel="stylesheet" type="text/css" th:href="@{/assets/vendors/css/vendors.min.css}">
<link rel="stylesheet" type="text/css" th:href="@{/assets/vendors/css/select2.min.css}">
<link rel="stylesheet" type="text/css" th:href="@{/assets/vendors/css/select2-theme.min.css}">
<link rel="stylesheet" type="text/css" th:href="@{/assets/css/theme.min.css}">
<link rel="stylesheet" type="text/css" th:href="@{/assets/css/cresio-theme-pro.css}">
<link rel="stylesheet" type="text/css" th:href="@{/assets/css/cresio-itam.css}">
<link rel="stylesheet" type="text/css" th:href="@{/css/cresio/tokens.css}">
<link rel="stylesheet" type="text/css" th:href="@{/css/cresio/base.css}">
<link rel="stylesheet" type="text/css" th:href="@{/css/cresio/layout.css}">
<link rel="stylesheet" type="text/css" th:href="@{/css/cresio/components.css}">
<link rel="stylesheet" type="text/css" th:href="@{/css/cresio/data-grid.css}">
<link rel="stylesheet" type="text/css" th:href="@{/css/cresio/expediente.css}">
<link rel="stylesheet" type="text/css" th:href="@{/css/cresio/utilities.css}">
</head>

<body class="cui-app">
    <div th:replace="~{fragments/shell/sidebar :: sidebar}"></div>

    <div class="cui-main">
        <div th:replace="~{fragments/shell/topbar :: topbar}"></div>

        <main class="cui-content">
            <div class="cui-content-inner">
                <section layout:fragment="contenidopaginas"></section>
            </div>
        </main>

        <footer class="cui-footer d-flex flex-wrap align-items-center justify-content-between gap-2">
            <span>Copyright &copy; <span id="cuiCurrentYear">2026</span></span>
            <span><strong>CRESIO</strong> - Todos los derechos reservados</span>
        </footer>
    </div>

    <div th:replace="~{fragments/components/toast :: toastContainer}"></div>
    <div th:replace="~{fragments/components/drawer :: drawer}"></div>
    <div th:replace="~{fragments/components/confirm-modal :: confirmModal}"></div>

    <script th:src="@{/assets/vendors/js/vendors.min.js}"></script>
    <script th:src="@{/assets/js/common-init.min.js}"></script>
    <script th:src="@{/assets/js/theme-customizer-init.min.js}"></script>
    <script th:src="@{/assets/vendors/js/select2.min.js}"></script>
    <script th:src="@{/assets/vendors/js/select2-active.min.js}"></script>
    <script th:src="@{/assets/js/cresio-sidebar-fix.js}"></script>
    <script th:src="@{/js/cresio/app.js}"></script>
    <script th:src="@{/js/cresio/sidebar.js}"></script>
    <script th:src="@{/js/cresio/drawer.js}"></script>
    <script th:src="@{/js/cresio/toast.js}"></script>
    <script th:src="@{/js/cresio/confirm-modal.js}"></script>
    <script th:src="@{/js/cresio/data-grid.js}"></script>
    <script th:src="@{/js/cresio/action-menu.js}"></script>
    <script th:src="@{/js/cresio/filters.js}"></script>
    <script th:src="@{/js/cresio/expediente.js}"></script>
    <script>
        (function() {
            var year = document.getElementById('cuiCurrentYear');
            if (year) {
                year.textContent = new Date().getFullYear();
            }

            var token = document.querySelector('meta[name="_csrf"]');
            var header = document.querySelector('meta[name="_csrf_header"]');
            if (token && header) {
                var originalFetch = window.fetch;
                window.fetch = function(url, options) {
                    options = options || {};
                    var method = (options.method || 'GET').toUpperCase();
                    if (method !== 'GET' && method !== 'HEAD') {
                        options.headers = options.headers || {};
                        if (options.headers instanceof Headers) {
                            options.headers.set(header.content, token.content);
                        } else {
                            options.headers[header.content] = token.content;
                        }
                    }
                    return originalFetch.call(this, url, options);
                };
            }
        })();
    </script>
    <script>
        $(document).ready(function() {
            function cresioInitSelect2(scope) {
                var $scope = scope ? $(scope) : $(document);
                // Los filtros de data-grid usan select nativo: select2 con width 100%
                // los estira a fila completa y rompe la barra de filtros.
                $scope.find('select.form-select:not([data-select2-selector])')
                      .not('.cui-grid-filters select').each(function () {
                    var $sel = $(this);
                    if ($sel.hasClass('select2-hidden-accessible')) return;
                    $sel.select2({
                        theme: 'bootstrap-5',
                        width: '100%',
                        dropdownParent: document.body,
                        language: { noResults: function () { return 'Sin resultados'; } }
                    });
                });
            }

            cresioInitSelect2();

            var _drawerOpen = window.CresioDrawer && window.CresioDrawer.open;
            if (_drawerOpen) {
                window.CresioDrawer.open = function (target) {
                    _drawerOpen(target);
                    setTimeout(function () {
                        cresioInitSelect2(document.querySelector(target || '#cuiDrawer'));
                    }, 60);
                };
            }
        });
    </script>
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
