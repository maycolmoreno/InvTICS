<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <meta charset="utf-8">
    <title>Roles</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <section class="cui-admin-header d-flex align-items-start justify-content-between gap-3 flex-wrap">
            <div>
                <p class="cui-eyebrow">Seguridad operativa</p>
                <h1>Roles y permisos</h1>
                <p>Catalogo de perfiles y alcance funcional del sistema.</p>
            </div>
            <a th:href="@{/roles/nuevo-rol}" class="cui-btn cui-btn-primary">
                <i class="feather-plus-circle" aria-hidden="true"></i>
                <span>Nuevo rol</span>
            </a>
        </section>

        <section class="cui-kpi-grid">
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Roles disponibles', value=${#lists.size(listarroles)}, meta='Catalogo total', icon='feather-shield', tone='primary')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Roles activos', value=${#lists.size(listarroles.?[estado])}, meta='Habilitados', icon='feather-check-circle', tone='success')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Roles inactivos', value=${#lists.size(listarroles.?[!estado])}, meta='Deshabilitados', icon='feather-slash', tone='danger')}"></div>
        </section>

        <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${errorEliminar}">
            <strong>Error:</strong> <span th:text="${errorEliminar}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>

        <section class="cui-data-grid" id="rolesAdminGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Administracion</p>
                    <h2>Listado de roles</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>
            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar rol...', exportHref=null)}"></div>
            <div class="cui-grid-filters">
                <select class="form-select" data-cui-grid-filter data-filter-key="estado" data-cui-filter-persist>
                    <option value="">Todos los estados</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(listarroles)}">
                            <td colspan="4">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-shield', title='Sin roles', message='No hay roles configurados.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="rol : ${listarroles}" data-cui-grid-row
                            th:attr="data-search=${#strings.toLowerCase(rol.nombre)},data-estado=${rol.estado ? 'activo' : 'inactivo'}">
                            <td><span class="cui-row-title" th:text="${rol.idRol}">1</span></td>
                            <td th:text="${rol.nombre}">Administrador</td>
                            <td>
                                <span class="cui-badge" th:classappend="${rol.estado} ? ' cui-badge-asignado' : ' cui-badge-dado-de-baja'" th:text="${rol.estado ? 'Activo' : 'Inactivo'}">Activo</span>
                            </td>
                            <td>
                                <div class="cui-action-cell">
                                    <a th:href="@{/roles/permisos/{id}(id=${rol.idRol})}" class="btn btn-outline-primary btn-sm">Permisos</a>
                                    <div class="dropdown cui-action-menu">
                                        <button type="button" class="btn btn-light cui-icon-btn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Mas acciones">
                                            <i class="feather-more-vertical" aria-hidden="true"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-end">
                                            <a class="dropdown-item" th:href="@{/roles/editar-rol/{id}(id=${rol.idRol})}">
                                                <i class="feather-edit-2" aria-hidden="true"></i>
                                                Editar
                                            </a>
                                            <form th:if="${rol.estado}" th:action="@{/roles/eliminar/{id}(id=${rol.idRol})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <button type="submit" class="cui-document-action text-danger" data-cui-confirm="Seguro que deseas desactivar este rol?">
                                                    <i class="feather-slash" aria-hidden="true"></i>
                                                    Desactivar
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay roles que coincidan con la busqueda visual.')}"></div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
