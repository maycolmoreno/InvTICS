<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
<meta charset="utf-8">
<title>Roles</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
  <div class="page-shell admin-shell">
    <section class="operations-hero">
      <div class="operations-hero-copy">
        <div class="eyebrow">Seguridad Operativa</div>
        <h1>Catalogo de roles y alcance funcional</h1>
      </div>
      <div class="operations-hero-actions">
        <a th:href="@{/roles/nuevo-rol}" class="btn btn-primary px-4 py-3">
          <i class="feather-plus-circle me-2"></i>Nuevo rol
        </a>
      </div>
    </section>

    <section class="admin-summary-grid">
      <article class="admin-summary-card">
        <div class="admin-summary-label">Roles disponibles</div>
        <div class="admin-summary-value" th:text="${#lists.size(listarroles)}">0</div>
      </article>
      <article class="admin-summary-card">
        <div class="admin-summary-label">Roles activos</div>
        <div class="admin-summary-value" th:text="${#lists.size(listarroles.?[estado])}">0</div>
      </article>
      <article class="admin-summary-card">
        <div class="admin-summary-label">Roles inactivos</div>
        <div class="admin-summary-value" th:text="${#lists.size(listarroles.?[!estado])}">0</div>
      </article>
    </section>

    <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${errorEliminar}">
      <strong>Error:</strong> <span th:text="${errorEliminar}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <section class="surface-card page-panel">
      <div class="management-toolbar mb-4">
        <div class="toolbar-pills">
          <div class="toolbar-pill"><i class="feather-shield"></i><span>Activos <strong th:text="${#lists.size(listarroles.?[estado])}">0</strong></span></div>
          <div class="toolbar-pill"><i class="feather-slash"></i><span>Inactivos <strong th:text="${#lists.size(listarroles.?[!estado])}">0</strong></span></div>
        </div>
      </div>

      <div class="table-shell">
        <div class="table-responsive">
          <table class="table table-hover align-middle" id="rolesTable">
            <thead>
            <tr>
              <th>ID</th>
              <th>Rol</th>
              <th>Estado</th>
              <th class="text-end">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="rol : ${listarroles}">
              <td><strong th:text="${rol.idRol}">1</strong></td>
              <td>
                <div class="fw-semibold" th:text="${rol.nombre}">Administrador</div>
              </td>
              <td>
                <span th:class="${rol.estado ? 'badge bg-soft-success text-success' : 'badge bg-soft-danger text-danger'}"
                      th:text="${rol.estado ? 'Activo' : 'Inactivo'}">Activo</span>
              </td>
              <td>
                <div class="hstack gap-2 justify-content-end">
                  <a th:href="@{/roles/editar-rol/{id}(id=${rol.idRol})}" class="btn btn-light btn-sm">
                    <i class="feather-edit-2 me-1"></i>Editar
                  </a>
                  <form th:if="${rol.estado}" th:action="@{/roles/eliminar/{id}(id=${rol.idRol})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-outline-danger btn-sm"
                            onclick="return confirm('¿Seguro que deseas desactivar este rol?');">
                      <i class="feather-slash me-1"></i>Desactivar
                    </button>
                  </form>
                </div>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(listarroles)}">
              <td colspan="4">
                <div class="table-empty-state">
                  <i class="feather-shield"></i>
                  <div class="fw-semibold">No hay roles configurados</div>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</div>
</body>
</html>
