<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <meta charset="utf-8">
    <title>Roles</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <section class="cui-admin-header d-flex align-items-start justify-content-between gap-3 flex-wrap">
            <div>
                <p class="cui-eyebrow">Seguridad operativa</p>
                <h1>Roles y permisos</h1>
                <p>Catalogo de perfiles y alcance funcional del sistema.</p>
            </div>
            <button type="button" class="cui-btn cui-btn-primary" data-action="rol-nuevo" data-cui-drawer-open="#drawerRol">
                <i class="feather-plus-circle" aria-hidden="true"></i>
                <span>Nuevo rol</span>
            </button>
        </section>

        <div class="alert alert-success cui-alert" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${errorEliminar}">
            <strong>Error:</strong> <span th:text="${errorEliminar}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>

        <section class="cui-data-grid" id="rolesAdminGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Administracion</p>
                    <h2>Listado de roles</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>
            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar rol...', exportHref=null)}"></div>
            <div class="cui-grid-filters">
                <select class="form-select" data-cui-grid-filter data-filter-key="estado" data-cui-filter-persist>
                    <option value="">Todos los estados</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(listarroles)}">
                            <td colspan="4">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-shield', title='Sin roles', message='No hay roles configurados.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="rol : ${listarroles}" data-cui-grid-row
                            th:attr="data-search=${#strings.toLowerCase(rol.nombre)},
                                     data-estado=${rol.estado ? 'activo' : 'inactivo'},
                                     data-id-rol=${rol.idRol},
                                     data-nombre=${rol.nombre ?: ''},
                                     data-estado-activo=${rol.estado}">
                            <td><span class="cui-row-title" th:text="${rol.idRol}">1</span></td>
                            <td th:text="${rol.nombre}">Administrador</td>
                            <td>
                                <span class="cui-badge" th:classappend="${rol.estado} ? ' cui-badge-asignado' : ' cui-badge-dado-de-baja'" th:text="${rol.estado ? 'Activo' : 'Inactivo'}">Activo</span>
                            </td>
                            <td>
                                <div class="cui-action-cell">
                                    <a th:href="@{/roles/permisos/{id}(id=${rol.idRol})}" class="cui-btn cui-btn-secondary cui-btn-sm">Permisos</a>
                                    <div class="dropdown cui-action-menu">
                                        <button type="button" class="cui-icon-btn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Mas acciones">
                                            <i class="feather-more-vertical" aria-hidden="true"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-end">
                                            <button type="button" class="dropdown-item" data-action="rol-editar" data-cui-drawer-open="#drawerRol">
                                                <i class="feather-edit-2" aria-hidden="true"></i>
                                                Editar
                                            </button>
                                            <form th:if="${rol.estado}" th:action="@{/roles/eliminar/{id}(id=${rol.idRol})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <button type="submit" class="cui-document-action text-danger" data-cui-confirm="Seguro que deseas desactivar este rol?">
                                                    <i class="feather-slash" aria-hidden="true"></i>
                                                    Desactivar
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay roles que coincidan con la busqueda visual.')}"></div>
                </div>
            </div>
        </section>

        <!-- Drawer: Nuevo / Editar rol -->
        <aside class="cui-drawer" id="drawerRol" aria-hidden="true" aria-label="Rol">
            <div class="cui-drawer-header">
                <div>
                    <div class="fw-bold" id="drawerRolTitulo">Nuevo rol</div>
                    <div class="small text-muted">Configura un rol base para ordenar menus, permisos y responsabilidades.</div>
                </div>
                <button type="button" class="cui-icon-button" data-cui-drawer-close aria-label="Cerrar panel">
                    <i class="feather-x"></i>
                </button>
            </div>
            <div class="cui-drawer-body">
                <form id="formRol" th:action="@{/roles}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="idRol" value="0">

                    <div class="col-12">
                        <label class="form-label">Nombre del rol <span class="cui-required-mark">*</span></label>
                        <select class="form-select" name="nombre" id="rolNombreSelect" required>
                            <option value="">Seleccione un rol</option>
                            <option value="Administrador">Administrador</option>
                            <option value="Tecnico">Tecnico</option>
                            <option value="Auditor">Auditor</option>
                        </select>
                    </div>

                    <div class="col-12" id="drawerRolEstadoWrap" hidden>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="estado" value="true" id="rolEstadoSwitch" checked>
                            <label class="form-check-label" for="rolEstadoSwitch">Activo</label>
                        </div>
                    </div>

                    <div class="col-12 d-flex justify-content-end gap-2 pt-2">
                        <button type="button" class="cui-btn cui-btn-secondary" data-cui-drawer-close>Cancelar</button>
                        <button class="cui-btn cui-btn-primary" type="submit">
                            <i class="feather-save" aria-hidden="true"></i>
                            <span>Guardar</span>
                        </button>
                    </div>
                </form>
            </div>
        </aside>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
    (function () {
        var form = document.getElementById('formRol');
        var selNombre = document.getElementById('rolNombreSelect');
        var drawerTitulo = document.getElementById('drawerRolTitulo');
        var estadoWrap = document.getElementById('drawerRolEstadoWrap');

        function setValue(name, value) {
            var el = form.querySelector('[name="' + name + '"]');
            if (el) el.value = value || '';
        }

        function abrirDrawerNuevo() {
            form.reset();
            setValue('idRol', '0');
            selNombre.value = '';
            drawerTitulo.textContent = 'Nuevo rol';
            estadoWrap.hidden = true;
        }

        function abrirDrawerEditar(row) {
            var d = row.dataset;
            form.reset();
            drawerTitulo.textContent = 'Editar rol';
            setValue('idRol', d.idRol);
            selNombre.value = d.nombre;
            estadoWrap.hidden = false;
            document.getElementById('rolEstadoSwitch').checked = d.estadoActivo === 'true';
        }

        document.addEventListener('click', function (e) {
            var btn = e.target.closest('[data-action]');
            if (!btn) return;
            if (btn.dataset.action === 'rol-nuevo') {
                abrirDrawerNuevo();
            } else if (btn.dataset.action === 'rol-editar') {
                var row = btn.closest('tr');
                if (row) abrirDrawerEditar(row);
            }
        });
    })();
    </script>
</th:block>
</body>
</html>
