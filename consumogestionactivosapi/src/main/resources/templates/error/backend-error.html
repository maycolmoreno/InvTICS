<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Error — CRESIO</title>
    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logoCRESIO.png}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/cresio/tokens.css}">
    <link rel="stylesheet" th:href="@{/css/cresio/base.css}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--cui-bg-surface, #f5f7fa);
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        }
        .error-card {
            background: #fff;
            border-radius: 16px;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .08);
            text-align: center;
        }
        .error-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.75rem;
            background-color: #FEE2E2;
            color: #DC2626;
        }
        .error-status {
            font-size: 3rem;
            font-weight: 800;
            color: #DC2626;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .error-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.75rem;
        }
        .error-message {
            color: #64748b;
            font-size: 0.9375rem;
            margin-bottom: 2rem;
        }
        .error-brand {
            font-size: 0.8125rem;
            color: #94a3b8;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">⚠</div>

        <div class="error-status" th:text="${errorStatus ?: '500'}">500</div>

        <div class="error-title" th:switch="${errorStatus}">
            <span th:case="400">Solicitud inválida</span>
            <span th:case="401">Sesión expirada</span>
            <span th:case="403">Acceso denegado</span>
            <span th:case="404">Recurso no encontrado</span>
            <span th:case="503">Servicio no disponible</span>
            <span th:case="*">Error del servidor</span>
        </div>

        <p class="error-message" th:text="${errorMessage ?: 'Ocurrió un error inesperado.'}">
            Ocurrió un error inesperado.
        </p>

        <div class="d-flex gap-2 justify-content-center">
            <button class="btn btn-outline-secondary btn-sm" onclick="history.back()">
                ← Volver
            </button>
            <a th:href="@{/inicio}" class="btn btn-primary btn-sm">
                Ir al inicio
            </a>
        </div>

        <div class="error-brand">
            CRESIO &middot; Gestión de Activos TIC
        </div>
    </div>
</body>
</html>
