<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{plantilla/plantillaui}">
<head>
<meta charset="utf-8">
<title>Nueva Actividad</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Nueva actividad planificada', subtitle='Registra una tarea, mantenimiento o visita para el equipo tecnico.')}"></div>

        <div class="cui-exp-card" style="max-width:760px;margin:0 auto;">
            <div class="cui-exp-card-body">
                <form th:action="@{/planificacion/guardar}" method="post" th:object="${actividad}" class="d-flex flex-column gap-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div>
                        <label class="form-label fw-semibold">Título <span class="cui-required-mark">*</span></label>
                        <input type="text" class="form-control" th:field="*{titulo}" required maxlength="200" placeholder="Ej: Revision equipos piso 3">
                    </div>

                    <div>
                        <label class="form-label fw-semibold">Descripción</label>
                        <textarea class="form-control" th:field="*{descripcion}" rows="3" placeholder="Detalle de la actividad..."></textarea>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6" th:unless="${esTecnico}">
                            <label class="form-label fw-semibold">Técnico asignado <span class="cui-required-mark">*</span></label>
                            <select class="form-select" th:field="*{tecnicoId}" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="t : ${tecnicos}" th:value="${t.idUsuario}" th:text="${t.nombre}"></option>
                            </select>
                        </div>
                        <input type="hidden" th:if="${esTecnico}" name="tecnicoId" th:value="${idUsuarioActual}">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Tipo de actividad <span class="cui-required-mark">*</span></label>
                            <select class="form-select" th:field="*{tipoActividad}" required id="selectTipo">
                                <option value="">Seleccionar...</option>
                                <option value="TAREA_DIARIA">Tarea diaria</option>
                                <option value="TAREA_SEMANAL">Tarea semanal</option>
                                <option value="MANTENIMIENTO_PROGRAMADO">Mantenimiento programado</option>
                                <option value="VISITA_TECNICA">Visita tecnica</option>
                                <option value="OBJETIVO_MENSUAL">Objetivo mensual</option>
                            </select>
                        </div>
                    </div>

                    <div id="grupoObjetivo" hidden>
                        <label class="form-label fw-semibold">Objetivo del mantenimiento <span class="cui-required-mark">*</span></label>
                        <select class="form-select" id="selectObjetivo">
                            <option value="EQUIPO">Equipo específico</option>
                            <option value="FARMACIA">Farmacia completa (mantenimiento general)</option>
                        </select>
                    </div>
                    <div id="grupoEquipo" hidden>
                        <label class="form-label fw-semibold">Equipo <span class="cui-required-mark">*</span></label>
                        <select class="form-select" th:field="*{fkEquipoId}" id="selectEquipo">
                            <option value="">Seleccionar equipo...</option>
                            <option th:each="e : ${equipos}" th:value="${e.idEquipo}"
                                    th:text="${e.codigoSap + ' - ' + e.modelo + (e.serial != null ? ' (S/N: ' + e.serial + ')' : '')}"></option>
                        </select>
                    </div>
                    <div id="grupoFarmacia" hidden>
                        <label class="form-label fw-semibold">Farmacia <span class="cui-required-mark">*</span></label>
                        <select class="form-select" th:field="*{fkUbicacionId}" id="selectFarmacia">
                            <option value="">Seleccionar farmacia...</option>
                            <option th:each="u : ${ubicaciones}" th:value="${u.idUbicacion}"
                                    th:text="${u.nombre + (u.ciudad != null and !#strings.isEmpty(u.ciudad) ? ' - ' + u.ciudad : '')}"></option>
                        </select>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Prioridad</label>
                            <select class="form-select" th:field="*{prioridad}">
                                <option value="BAJA">Baja</option>
                                <option value="MEDIA" selected>Media</option>
                                <option value="ALTA">Alta</option>
                                <option value="URGENTE">Urgente</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Tiempo estimado (min)</label>
                            <input type="number" class="form-control" th:field="*{tiempoEstimadoMinutos}" min="0" placeholder="Ej: 60">
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Fecha inicio <span class="cui-required-mark">*</span></label>
                            <input type="date" class="form-control" th:field="*{fechaInicio}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Fecha fin <span class="cui-required-mark">*</span></label>
                            <input type="date" class="form-control" th:field="*{fechaFin}" required>
                        </div>
                    </div>

                    <div>
                        <label class="form-label fw-semibold">Observaciones</label>
                        <textarea class="form-control" th:field="*{observaciones}" rows="3" placeholder="Notas adicionales..."></textarea>
                    </div>

                    <div class="d-flex gap-2 justify-content-end pt-2">
                        <a th:href="@{/planificacion}" class="cui-btn cui-btn-secondary">Cancelar</a>
                        <button type="submit" class="cui-btn cui-btn-primary">
                            <i class="feather-save" aria-hidden="true"></i>
                            <span>Guardar actividad</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<th:block layout:fragment="scripts">
<script>
document.addEventListener('DOMContentLoaded', function() {
    var selectTipo = document.getElementById('selectTipo');
    var grupoObjetivo = document.getElementById('grupoObjetivo');
    var selectObjetivo = document.getElementById('selectObjetivo');
    var grupoEquipo = document.getElementById('grupoEquipo');
    var selectEquipo = document.getElementById('selectEquipo');
    var grupoFarmacia = document.getElementById('grupoFarmacia');
    var selectFarmacia = document.getElementById('selectFarmacia');

    function limpiar(select) {
        select.value = '';
        if (typeof $ !== 'undefined' && $.fn.select2 && $(select).hasClass('select2-hidden-accessible')) {
            $(select).val(null).trigger('change.select2');
        }
    }

    // El mantenimiento programado apunta a un equipo especifico o a una
    // farmacia completa (mantenimiento general): solo un campo viaja lleno.
    function toggleObjetivo() {
        var esMant = selectTipo.value === 'MANTENIMIENTO_PROGRAMADO';
        var esFarmacia = esMant && selectObjetivo.value === 'FARMACIA';

        grupoObjetivo.hidden = !esMant;
        grupoEquipo.hidden = !esMant || esFarmacia;
        grupoFarmacia.hidden = !esFarmacia;

        selectEquipo.required = esMant && !esFarmacia;
        selectFarmacia.required = esFarmacia;

        if (!esMant || esFarmacia) limpiar(selectEquipo);
        if (!esFarmacia) limpiar(selectFarmacia);
    }

    selectTipo.addEventListener('change', toggleObjetivo);
    selectObjetivo.addEventListener('change', toggleObjetivo);
    toggleObjetivo();

    if (typeof $ !== 'undefined' && $.fn.select2) {
        $('#selectEquipo').select2({ width: '100%', placeholder: 'Buscar equipo...' });
        $('#selectEquipo').on('change', function() { selectEquipo.value = this.value; });
        $('#selectFarmacia').select2({ width: '100%', placeholder: 'Buscar farmacia...' });
        $('#selectFarmacia').on('change', function() { selectFarmacia.value = this.value; });
    }
});
</script>
</th:block>
</body>
</html>
