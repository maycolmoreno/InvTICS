<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{plantilla/plantillaui}">
<head>
<meta charset="utf-8">
<title>Métricas de Cumplimiento</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Métricas de cumplimiento', subtitle='Avance de actividades planificadas por tecnico.')}"></div>

        <div class="cui-command-bar">
            <form method="get" th:action="@{/planificacion/metricas}" class="d-flex align-items-center gap-2">
                <label class="form-label fw-semibold mb-0" for="selectPeriodo">Periodo</label>
                <select id="selectPeriodo" name="periodo" class="form-select form-select-sm" onchange="this.form.submit()">
                    <option value="SEMANAL" th:selected="${periodoSeleccionado == 'SEMANAL'}">Semanal</option>
                    <option value="MENSUAL" th:selected="${periodoSeleccionado == 'MENSUAL'}">Mensual</option>
                    <option value="GLOBAL" th:selected="${periodoSeleccionado == 'GLOBAL'}">Global</option>
                </select>
            </form>
            <a th:href="@{/planificacion}" class="cui-btn cui-btn-secondary">
                <i class="feather-arrow-left" aria-hidden="true"></i>
                <span>Volver</span>
            </a>
        </div>

        <div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>

        <div th:if="${!#lists.isEmpty(metricas)}" class="cui-summary-strip">
            <div class="cui-summary-item">
                <span class="cui-summary-label">Completadas</span>
                <strong class="cui-summary-value success" th:text="${totalCompletadas}">0</strong>
            </div>
            <span class="cui-summary-sep" aria-hidden="true">·</span>
            <div class="cui-summary-item">
                <span class="cui-summary-label">Pendientes</span>
                <strong class="cui-summary-value" th:text="${totalPendientes}">0</strong>
            </div>
            <span class="cui-summary-sep" aria-hidden="true">·</span>
            <div class="cui-summary-item">
                <span class="cui-summary-label">En progreso</span>
                <strong class="cui-summary-value" th:text="${totalEnProgreso}">0</strong>
            </div>
            <span class="cui-summary-sep" aria-hidden="true">·</span>
            <div class="cui-summary-item">
                <span class="cui-summary-label">Vencidas</span>
                <strong class="cui-summary-value danger" th:text="${totalVencidas}">0</strong>
            </div>
            <span class="cui-summary-sep" aria-hidden="true">·</span>
            <div class="cui-summary-item">
                <span class="cui-summary-label">Total</span>
                <strong class="cui-summary-value" th:text="${totalActividades}">0</strong>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-lg-4 col-md-6" th:each="m : ${metricas}">
                <div class="cui-exp-card h-100">
                    <div class="cui-exp-card-header">
                        <h2 th:text="${m.tecnicoNombre}">Tecnico</h2>
                    </div>
                    <div class="cui-exp-card-body d-flex flex-column gap-3">
                        <div>
                            <div class="d-flex justify-content-between small mb-1">
                                <span>% completadas</span>
                                <strong th:text="${m.porcentajeCompletadas + '%'}">0%</strong>
                            </div>
                            <div class="progress" style="height:8px;">
                                <div class="progress-bar"
                                     th:classappend="${m.porcentajeCompletadas >= 80} ? 'bg-success' : (${m.porcentajeCompletadas >= 50} ? 'bg-warning' : 'bg-danger')"
                                     role="progressbar"
                                     th:style="'width:' + ${m.porcentajeCompletadas} + '%'"
                                     th:aria-valuenow="${m.porcentajeCompletadas}" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                        </div>
                        <div>
                            <div class="d-flex justify-content-between small mb-1">
                                <span>Cumplimiento a tiempo</span>
                                <strong th:text="${m.porcentajeCumplimientoATiempo + '%'}">0%</strong>
                            </div>
                            <div class="progress" style="height:8px;">
                                <div class="progress-bar"
                                     th:classappend="${m.porcentajeCumplimientoATiempo >= 80} ? 'bg-success' : (${m.porcentajeCumplimientoATiempo >= 50} ? 'bg-warning' : 'bg-danger')"
                                     role="progressbar"
                                     th:style="'width:' + ${m.porcentajeCumplimientoATiempo} + '%'"
                                     th:aria-valuenow="${m.porcentajeCumplimientoATiempo}" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                        </div>

                        <div class="cui-detail-grid">
                            <div class="cui-detail-item">
                                <span>Total actividades</span>
                                <strong th:text="${m.totalActividades}">0</strong>
                            </div>
                            <div class="cui-detail-item">
                                <span>Completadas</span>
                                <strong th:text="${m.completadas}">0</strong>
                            </div>
                            <div class="cui-detail-item">
                                <span>A tiempo / Tarde</span>
                                <strong th:text="${m.completadasATiempo + ' / ' + m.completadasTarde}">0 / 0</strong>
                            </div>
                            <div class="cui-detail-item">
                                <span>Pendientes</span>
                                <strong th:text="${m.pendientes}">0</strong>
                            </div>
                            <div class="cui-detail-item">
                                <span>En progreso</span>
                                <strong th:text="${m.enProgreso}">0</strong>
                            </div>
                            <div class="cui-detail-item">
                                <span>Vencidas</span>
                                <strong class="text-danger" th:text="${m.vencidas}">0</strong>
                            </div>
                            <div class="cui-detail-item">
                                <span>Tiempo promedio</span>
                                <strong th:text="${m.tiempoPromedioMinutos + ' min'}">0 min</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(metricas)}">
            <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-bar-chart-2', title='Sin datos de metricas', message='No hay datos de metricas disponibles para el periodo seleccionado.')}"></div>
        </div>
    </div>
</div>
</body>
</html>
