<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{plantilla/plantillaui}">
<head>
<meta charset="utf-8">
<title>Planificación de Actividades</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Planificación de actividades', subtitle='Tareas, mantenimientos y visitas asignadas al equipo tecnico.')}"></div>

        <div class="alert alert-success cui-alert" th:if="${mensaje}" th:text="${mensaje}"></div>
        <div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>

        <div class="cui-command-bar">
            <a th:href="@{/planificacion/metricas}" class="cui-btn cui-btn-secondary">
                <i class="feather-bar-chart-2" aria-hidden="true"></i>
                <span>Ver métricas</span>
            </a>
            <a th:href="@{/planificacion/nueva}" class="cui-btn cui-btn-primary">
                <i class="feather-plus" aria-hidden="true"></i>
                <span>Nueva actividad</span>
            </a>
        </div>

        <section class="cui-data-grid" id="actividadesGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <h2>Actividades planificadas</h2>
                    <span class="cui-data-grid-meta" data-cui-grid-count>0 registros</span>
                </div>
            </div>

            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar actividad, tecnico, equipo o farmacia...', exportHref=null)}"></div>

            <div class="cui-grid-filters">
                <select class="form-select form-select-sm" data-cui-grid-filter data-filter-key="tecnico" th:unless="${esTecnico}">
                    <option value="">Todos los tecnicos</option>
                    <option th:each="t : ${tecnicos}" th:value="${t.idUsuario}" th:text="${t.nombre}"></option>
                </select>
                <select class="form-select form-select-sm" data-cui-grid-filter data-filter-key="estado">
                    <option value="">Todos los estados</option>
                    <option value="PENDIENTE">Pendiente</option>
                    <option value="EN_PROGRESO">En progreso</option>
                    <option value="COMPLETADA">Completada</option>
                    <option value="VENCIDA">Vencida</option>
                    <option value="CANCELADA">Cancelada</option>
                </select>
                <select class="form-select form-select-sm" data-cui-grid-filter data-filter-key="tipo">
                    <option value="">Todos los tipos</option>
                    <option value="TAREA_DIARIA">Tarea diaria</option>
                    <option value="TAREA_SEMANAL">Tarea semanal</option>
                    <option value="MANTENIMIENTO_PROGRAMADO">Mantenimiento programado</option>
                    <option value="VISITA_TECNICA">Visita tecnica</option>
                    <option value="OBJETIVO_MENSUAL">Objetivo mensual</option>
                </select>
            </div>

            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Título</th>
                            <th>Técnico</th>
                            <th>Tipo</th>
                            <th>Equipo / Farmacia</th>
                            <th>Prioridad</th>
                            <th>Estado</th>
                            <th>Fecha inicio</th>
                            <th>Fecha fin</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="a : ${actividades}"
                            data-cui-grid-row
                            th:data-tecnico="${a.tecnicoId}"
                            th:data-estado="${a.estado}"
                            th:data-tipo="${a.tipoActividad}"
                            th:attr="data-search=${#strings.toLowerCase((a.titulo ?: '') + ' ' + (a.descripcion ?: '') + ' ' + (a.tecnicoNombre ?: '') + ' ' + (a.tipoActividad ?: '') + ' ' + (a.equipoNombre ?: '') + ' ' + (a.ubicacionNombre ?: ''))}">
                            <td th:text="${a.idActividadPlanificada}">1</td>
                            <td>
                                <div class="cui-row-title" th:text="${a.titulo}">Titulo</div>
                                <div class="cui-row-subtitle" th:text="${a.descripcion}">Descripcion</div>
                            </td>
                            <td th:text="${a.tecnicoNombre}">Tecnico</td>
                            <td th:text="${a.tipoActividad != null ? a.tipoActividad.replace('_', ' ') : '-'}">Tipo</td>
                            <td>
                                <span th:if="${a.equipoNombre}" th:text="${a.equipoNombre}">Equipo</span>
                                <span th:if="${a.equipoNombre == null and a.ubicacionNombre != null}"
                                      th:text="'Farmacia ' + ${a.ubicacionNombre} + ' (general)'">Farmacia</span>
                                <span th:if="${a.equipoNombre == null and a.ubicacionNombre == null}" class="text-muted">—</span>
                            </td>
                            <td>
                                <span th:replace="~{fragments/components/status-badge :: statusBadge(${a.prioridad}, ${(a.prioridad == 'ALTA' or a.prioridad == 'URGENTE') ? 'danger' : (a.prioridad == 'MEDIA' ? 'warning' : 'success')})}"></span>
                            </td>
                            <td>
                                <span th:replace="~{fragments/components/status-badge :: statusBadge(${a.estado != null ? a.estado.replace('_', ' ') : '-'}, ${a.estado == 'PENDIENTE' ? 'warning' : (a.estado == 'EN_PROGRESO' ? 'info' : (a.estado == 'COMPLETADA' ? 'success' : (a.estado == 'VENCIDA' ? 'danger' : 'muted')))})}"></span>
                            </td>
                            <td th:text="${a.fechaInicio}">Fecha</td>
                            <td th:text="${a.fechaFin}">Fecha</td>
                            <td>
                                <div class="cui-action-cell" th:if="${a.estado != 'COMPLETADA' and a.estado != 'CANCELADA'}">
                                    <form th:if="${a.estado == 'PENDIENTE'}" th:action="@{'/planificacion/' + ${a.idActividadPlanificada} + '/estado'}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="estado" value="EN_PROGRESO">
                                        <button class="cui-btn cui-btn-secondary cui-btn-sm" type="submit">
                                            <i class="feather-play" aria-hidden="true"></i>
                                            <span>Iniciar</span>
                                        </button>
                                    </form>
                                    <form th:action="@{'/planificacion/' + ${a.idActividadPlanificada} + '/estado'}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="estado" value="COMPLETADA">
                                        <button class="cui-btn cui-btn-primary cui-btn-sm" type="submit">
                                            <i class="feather-check" aria-hidden="true"></i>
                                            <span>Completar</span>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div data-cui-empty-state th:hidden="${!#lists.isEmpty(actividades)}">
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-calendar', title='No hay actividades planificadas', message='Crea la primera actividad para empezar a planificar el trabajo del equipo.')}"></div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
