<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Reporte de Mantenimientos - CRESIO</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Reporte de mantenimientos', subtitle='Consulta tecnica de ordenes por estado, tipo, tecnico y fechas.')}"></div>

        <div class="cui-command-bar">
            <a th:href="@{/reportes}" class="cui-btn cui-btn-secondary">
                <i class="feather-arrow-left" aria-hidden="true"></i>
                <span>Reportes</span>
            </a>
            <a class="cui-btn cui-btn-primary"
               th:href="@{/reportes/mantenimientos/excel(estado=${estadoSeleccionado}, tipo=${tipoSeleccionado}, tecnicoId=${tecnicoSeleccionado})}">
                <i class="feather-download" aria-hidden="true"></i>
                <span>Descargar Excel</span>
            </a>
        </div>

        <section class="cui-data-grid" id="maintenanceReportGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Reporte tecnico</p>
                    <h2>Mantenimientos</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>

            <form th:action="@{/reportes/mantenimientos}" method="get" class="cui-data-grid-toolbar">
                <div class="cui-search-control">
                    <i class="feather-search" aria-hidden="true"></i>
                    <input type="search" class="form-control" data-cui-grid-search placeholder="Buscar en resultados..." autocomplete="off">
                </div>
                <div class="cui-toolbar-actions">
                    <select class="form-select" name="estado" onchange="this.form.submit()">
                        <option value="" th:selected="${estadoSeleccionado == null || estadoSeleccionado == ''}">Todos los estados</option>
                        <option th:each="e : ${listaEstados}" th:value="${e}" th:text="${e}" th:selected="${estadoSeleccionado != null && estadoSeleccionado.equalsIgnoreCase(e)}"></option>
                    </select>
                    <select class="form-select" name="tipo" onchange="this.form.submit()">
                        <option value="" th:selected="${tipoSeleccionado == null || tipoSeleccionado == ''}">Todos los tipos</option>
                        <option th:each="t : ${listaTipos}" th:value="${t}" th:text="${t}" th:selected="${tipoSeleccionado != null && tipoSeleccionado.equalsIgnoreCase(t)}"></option>
                    </select>
                    <select class="form-select" name="tecnicoId" onchange="this.form.submit()">
                        <option value="" th:selected="${tecnicoSeleccionado == null}">Todos los tecnicos</option>
                        <option th:each="u : ${listaUsuarios}" th:value="${u.idUsuario}" th:text="${u.nombre}" th:selected="${tecnicoSeleccionado != null && tecnicoSeleccionado == u.idUsuario}"></option>
                    </select>
                    <a th:href="@{/reportes/mantenimientos}" class="cui-btn cui-btn-secondary">
                        <i class="feather-x" aria-hidden="true"></i>
                        <span>Limpiar</span>
                    </a>
                </div>
            </form>

            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Equipo</th>
                            <th>Custodio / Tecnico</th>
                            <th>Tipo</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Proxima fecha</th>
                            <th>Detalle</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(listaMantenimientos)}">
                            <td colspan="8">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-tool', title='Sin mantenimientos', message='No se encontraron mantenimientos con los filtros seleccionados.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="m : ${listaMantenimientos}"
                            data-cui-grid-row
                            th:with="estadoTexto=${m.estadoInterno ?: 'Sin estado'},
                                     busqueda=${(m.idMantenimiento ?: '') + ' ' + (m.equipoDescripcion ?: '') + ' ' + (m.equipoCodigoSap ?: '') + ' ' + (m.custodioNombre ?: '') + ' ' + (m.tecnicoNombre ?: '') + ' ' + (m.tipoMantenimiento ?: '') + ' ' + estadoTexto + ' ' + (m.detalle ?: '')}"
                            th:attr="data-search=${#strings.toLowerCase(busqueda)}">
                            <td th:text="${m.idMantenimiento}">-</td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${m.equipoDescripcion ?: '-'}">Equipo</span>
                                    <span class="cui-row-subtitle" th:text="${m.equipoCodigoSap ?: '-'}">Codigo</span>
                                </div>
                            </td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${m.tecnicoNombre ?: '-'}">Tecnico</span>
                                    <span class="cui-row-subtitle" th:text="${m.custodioNombre ?: '-'}">Custodio</span>
                                </div>
                            </td>
                            <td>
                                <span class="cui-badge" th:classappend="${m.tipoMantenimiento == 'PREVENTIVO'} ? ' cui-badge-info' : (${m.tipoMantenimiento == 'CORRECTIVO'} ? ' cui-badge-en-reparacion' : ' cui-badge-muted')" th:text="${m.tipoMantenimiento ?: '-'}">Tipo</span>
                            </td>
                            <td th:text="${m.fechaMantenimiento != null ? #temporals.format(m.fechaMantenimiento, 'dd/MM/yyyy') : '-'}">-</td>
                            <td>
                                <span class="cui-badge"
                                      th:classappend="${estadoTexto.contains('COMPLET') ? ' cui-badge-asignado' : (estadoTexto.contains('PENDIENT') ? ' cui-badge-en-reparacion' : (estadoTexto.contains('CERRAD') ? ' cui-badge-muted' : ' cui-badge-info'))}"
                                      th:text="${estadoTexto}">Estado</span>
                            </td>
                            <td th:text="${m.proximaFecha != null ? #temporals.format(m.proximaFecha, 'dd/MM/yyyy') : '-'}">-</td>
                            <td th:text="${m.detalle ?: '-'}">-</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay registros que coincidan con la busqueda visual.')}"></div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
