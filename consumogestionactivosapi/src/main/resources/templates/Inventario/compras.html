<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Compras</title>
</head>
<body>
<div layout:fragment="contenidopaginas" class="itam-page">
    <div class="main-content">
        <div class="itam-shell">
            <div class="itam-hero">
                <div>
                    <p class="itam-eyebrow">Inventario operativo</p>
                    <h1 class="itam-title">Compras</h1>
                    <p class="itam-subtitle">Controla ordenes de compra, recepciones parciales y pendientes de ingreso a bodega.</p>
                </div>
                <div class="itam-actions">
                    <a th:href="@{/inventario/dashboard}" class="itam-btn">
                        <i class="feather-arrow-left"></i>
                        <span>Dashboard</span>
                    </a>
                    <a th:href="@{/inventario/recepcion}" class="itam-btn primary">
                        <i class="feather-package"></i>
                        <span>Recibir</span>
                    </a>
                </div>
            </div>

            <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

            <div class="itam-grid-2">
                <section class="itam-panel">
                    <div class="itam-panel-head">
                        <h2 class="itam-panel-title">Ordenes de compra</h2>
                        <span class="itam-badge" th:text="${#lists.size(ordenesCompra) + ' registradas'}">0 registradas</span>
                    </div>
                    <div class="itam-panel-body">
                        <div class="itam-list" th:if="${!#lists.isEmpty(ordenesCompra)}">
                            <div class="itam-list-item" th:each="oc : ${ordenesCompra}">
                                <span class="itam-dot"
                                      th:classappend="${oc.estado == 'RECIBIDA' ? ' success' : (oc.estado == 'RECIBIDA_PARCIAL' ? ' warning' : '')}"></span>
                                <div>
                                    <p class="itam-item-title" th:text="${oc.numeroOc}">OC-001</p>
                                    <p class="itam-item-meta">
                                        <span th:text="${oc.proveedor ?: 'Sin proveedor'}">Proveedor</span>
                                        <span> &middot; </span>
                                        <span th:text="${oc.bodegaDestinoNombre ?: 'Sin bodega'}">Bodega</span>
                                    </p>
                                </div>
                                <div class="d-flex gap-2 align-items-center">
                                    <span class="itam-badge"
                                          th:classappend="${oc.estado == 'RECIBIDA' ? ' success' : (oc.estado == 'RECIBIDA_PARCIAL' ? ' warning' : ' neutral')}"
                                          th:text="${oc.estado}">Estado</span>
                                    <form th:if="${oc.estado != 'RECIBIDA'}" th:action="@{/inventario/ordenes-compra/{id}/confirmar-recepcion(id=${oc.idOrdenCompra})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="itam-btn success" type="submit">Cerrar</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <div class="itam-empty" th:if="${#lists.isEmpty(ordenesCompra)}">Todavia no hay ordenes de compra.</div>
                    </div>
                </section>

                <section class="itam-panel">
                    <div class="itam-panel-head">
                        <h2 class="itam-panel-title">Nueva orden</h2>
                        <span class="itam-badge neutral">Compra</span>
                    </div>
                    <div class="itam-panel-body">
                        <form th:action="@{/inventario/ordenes-compra}" th:object="${ordenCompraRequest}" method="post" class="row g-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="col-md-6">
                                <label class="form-label">Numero OC</label>
                                <input class="form-control" th:field="*{numeroOc}" placeholder="OC-2026-001" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Fecha emision</label>
                                <input class="form-control" th:field="*{fechaEmision}" type="date">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Proveedor</label>
                                <input class="form-control" th:field="*{proveedor}" placeholder="Proveedor">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Bodega destino</label>
                                <select class="form-select" th:field="*{bodegaDestinoId}" required>
                                    <option value="">Seleccione</option>
                                    <option th:each="b : ${bodegas}" th:value="${b.idBodega}" th:text="${b.nombre}">Bodega</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Observacion</label>
                                <textarea class="form-control" th:field="*{observacion}" rows="3" placeholder="Contexto de compra"></textarea>
                            </div>
                            <div class="col-12 d-flex justify-content-end">
                                <button class="itam-btn primary" type="submit">
                                    <i class="feather-save"></i>
                                    <span>Crear orden</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>
</body>
</html>
