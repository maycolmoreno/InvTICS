<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Compras</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Compras', subtitle='Control de ordenes de compra, recepciones parciales y pendientes de ingreso a bodega.')}"></div>

        <div class="cui-command-bar">
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <a th:href="@{/inventario/dashboard}" class="cui-btn cui-btn-secondary">
                    <i class="feather-grid" aria-hidden="true"></i>
                    <span>Dashboard</span>
                </a>
                <a th:href="@{/inventario/recepcion}" class="cui-btn cui-btn-secondary">
                    <i class="feather-package" aria-hidden="true"></i>
                    <span>Recepcion</span>
                </a>
            </div>
        </div>

        <div class="alert alert-success cui-alert" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>

        <section class="cui-kpi-grid">
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Ordenes', value=${#lists.size(ordenesCompra)}, meta='Registradas', icon='feather-shopping-bag', tone='primary')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Recibidas', value=${#lists.size(ordenesCompra.?[estado == 'RECIBIDA'])}, meta='Cerradas operacionalmente', icon='feather-check-circle', tone='success')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Parciales', value=${#lists.size(ordenesCompra.?[estado == 'RECIBIDA_PARCIAL'])}, meta='Pendientes de completar', icon='feather-alert-triangle', tone='warning')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Pendientes', value=${#lists.size(ordenesCompra.?[estado != 'RECIBIDA' and estado != 'RECIBIDA_PARCIAL'])}, meta='Por recibir', icon='feather-clock', tone='info')}"></div>
        </section>

        <div class="cui-workspace-grid">
            <section class="cui-data-grid" id="purchaseOrdersGrid" data-cui-grid>
                <div class="cui-data-grid-header">
                    <div>
                        <p class="cui-eyebrow">Operacion logistica</p>
                        <h2>Ordenes de compra</h2>
                    </div>
                    <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
                </div>

                <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar por OC, proveedor, bodega o estado...', exportHref=null)}"></div>

                <div class="cui-grid-filters">
                    <select class="form-select" data-cui-grid-filter data-filter-key="estado" data-cui-filter-persist>
                        <option value="">Todos los estados</option>
                        <option value="RECIBIDA">Recibida</option>
                        <option value="RECIBIDA_PARCIAL">Recibida parcial</option>
                        <option value="PENDIENTE">Pendiente</option>
                    </select>
                </div>

                <div class="cui-data-grid-body">
                    <div class="table-responsive">
                        <table class="table cui-table">
                            <thead>
                            <tr>
                                <th>Orden</th>
                                <th>Proveedor</th>
                                <th>Bodega destino</th>
                                <th>Estado</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${ordenesCompra == null or #lists.isEmpty(ordenesCompra)}">
                                <td colspan="5">
                                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-shopping-bag', title='Sin ordenes de compra', message='Todavia no hay ordenes de compra registradas.')}"></div>
                                </td>
                            </tr>
                            <tr th:each="oc : ${ordenesCompra}"
                                data-cui-grid-row
                                th:with="estadoTexto=${oc.estado ?: 'PENDIENTE'},
                                         busqueda=${(oc.numeroOc ?: '') + ' ' + (oc.proveedor ?: '') + ' ' + (oc.bodegaDestinoNombre ?: '') + ' ' + estadoTexto}"
                                th:attr="data-search=${#strings.toLowerCase(busqueda)},data-estado=${estadoTexto}">
                                <td>
                                    <div class="cui-row-stack">
                                        <span class="cui-row-title" th:text="${oc.numeroOc}">OC-001</span>
                                        <span class="cui-row-subtitle" th:text="${oc.fechaEmision != null ? oc.fechaEmision : 'Sin fecha'}">Fecha</span>
                                    </div>
                                </td>
                                <td th:text="${oc.proveedor ?: 'Sin proveedor'}">Proveedor</td>
                                <td th:text="${oc.bodegaDestinoNombre ?: 'Sin bodega'}">Bodega</td>
                                <td>
                                    <span class="cui-badge"
                                          th:classappend="${estadoTexto == 'RECIBIDA'} ? ' cui-badge-asignado' : (${estadoTexto == 'RECIBIDA_PARCIAL'} ? ' cui-badge-en-reparacion' : ' cui-badge-en-bodega')"
                                          th:text="${estadoTexto}">Estado</span>
                                </td>
                                <td>
                                    <div class="cui-action-cell">
                                        <a th:href="@{/inventario/recepcion}" class="btn btn-outline-primary btn-sm">
                                            Gestionar
                                        </a>
                                        <div class="dropdown cui-action-menu">
                                            <button type="button" class="btn btn-light cui-icon-btn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Mas acciones">
                                                <i class="feather-more-vertical" aria-hidden="true"></i>
                                            </button>
                                            <div class="dropdown-menu dropdown-menu-end">
                                                <a class="dropdown-item" th:href="@{/inventario/recepcion}">
                                                    <i class="feather-package" aria-hidden="true"></i>
                                                    Recibir
                                                </a>
                                                <form th:if="${oc.estado != 'RECIBIDA'}"
                                                      th:action="@{/inventario/ordenes-compra/{id}/confirmar-recepcion(id=${oc.idOrdenCompra})}"
                                                      method="post">
                                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                    <button type="submit"
                                                            class="cui-document-action text-danger"
                                                            data-cui-confirm="Esta seguro de cerrar la recepcion de esta orden de compra?">
                                                        <i class="feather-check-circle" aria-hidden="true"></i>
                                                        Cerrar recepcion
                                                    </button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div hidden data-cui-empty-state>
                        <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay ordenes que coincidan con los filtros aplicados.')}"></div>
                    </div>
                </div>
            </section>

            <section class="cui-form-panel">
                <div class="cui-form-panel-header">
                    <h2 class="cui-form-panel-title">Nueva orden</h2>
                    <span class="cui-badge cui-badge-en-bodega">Compra</span>
                </div>
                <form th:action="@{/inventario/ordenes-compra}" th:object="${ordenCompraRequest}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="col-md-6">
                        <label class="form-label">Numero OC</label>
                        <input class="form-control" th:field="*{numeroOc}" placeholder="OC-2026-001" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Fecha emision</label>
                        <input class="form-control" th:field="*{fechaEmision}" type="date">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Proveedor</label>
                        <input class="form-control" th:field="*{proveedor}" placeholder="Proveedor">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Bodega destino</label>
                        <select class="form-select" th:field="*{bodegaDestinoId}" required>
                            <option value="">Seleccione</option>
                            <option th:each="b : ${bodegas}" th:value="${b.idBodega}" th:text="${b.nombre}">Bodega</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observacion</label>
                        <textarea class="form-control" th:field="*{observacion}" rows="3" placeholder="Contexto de compra"></textarea>
                    </div>
                    <div class="col-12 d-flex justify-content-end">
                        <button class="cui-btn cui-btn-primary" type="submit">
                            <i class="feather-save" aria-hidden="true"></i>
                            <span>Crear orden</span>
                        </button>
                    </div>
                </form>
            </section>
        </div>
    </div>
</div>
</body>
</html>
