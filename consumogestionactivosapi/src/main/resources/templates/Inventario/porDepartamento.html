<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<meta charset="utf-8">
<title>Inventario por Departamento</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">
	<div class="cui-page">
		<div th:replace="~{fragments/shell/page-header :: pageHeader(title='Inventario por departamento', subtitle='Equipos asignados agrupados por departamento, via custodias activas.')}"></div>

		<div th:if="${#maps.isEmpty(agrupado)}">
			<div th:replace="~{fragments/components/empty-state :: empty(icon='feather-inbox', title='Sin equipos asignados', message='No hay equipos asignados en custodias activas.')}"></div>
		</div>

		<section class="cui-card mb-3" th:each="entry : ${agrupado}">
			<div class="d-flex justify-content-between align-items-center mb-3">
				<h2 class="d-flex align-items-center gap-2 mb-0" style="font-size:16px">
					<i class="feather-briefcase" aria-hidden="true"></i>
					<span th:text="${entry.key}">Departamento</span>
				</h2>
				<span class="cui-badge cui-badge-info" th:text="${conteo[entry.key]} + ' equipo(s)'">0 equipo(s)</span>
			</div>
			<div class="table-responsive">
				<table class="table cui-table mb-0">
					<thead>
						<tr>
							<th>#</th>
							<th>Código</th>
							<th>Categoría</th>
							<th>Marca</th>
							<th>Modelo</th>
							<th>Serial</th>
							<th>Custodio</th>
							<th>Sucursal</th>
							<th>Estado</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="c, iter : ${entry.value}">
							<td th:text="${iter.count}">1</td>
							<td th:text="${c.fkEquipo?.codigoSap ?: 'N/A'}">COD</td>
							<td th:text="${c.fkEquipo?.fkCategoria?.nombre ?: 'N/A'}">Cat</td>
							<td th:text="${c.fkEquipo?.fkMarca?.nombre ?: 'N/A'}">Marca</td>
							<td th:text="${c.fkEquipo?.modelo ?: 'N/A'}">Modelo</td>
							<td th:text="${c.fkEquipo?.serial ?: 'N/A'}">Serial</td>
							<td th:text="${c.fkCustodio?.nombre ?: 'Sin custodio'}">Custodio</td>
							<td th:text="${c.fkCustodio?.fkUbicacion?.nombre ?: 'N/A'}">Sucursal</td>
							<td>
								<span class="cui-badge"
									th:classappend="${c.fkEquipo?.estadoEquipo == 'BUENO'} ? ' cui-badge-success' : (${c.fkEquipo?.estadoEquipo == 'MALO'} ? ' cui-badge-danger' : ' cui-badge-warning')"
									th:text="${c.fkEquipo?.estadoEquipo ?: 'N/A'}">BUENO</span>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>
	</div>
	</div>
</body>
</html>
