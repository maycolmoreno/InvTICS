<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Recepcion</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Recepcion', subtitle='Bandeja de ordenes de compra pendientes. La recepcion se gestiona linea por linea desde cada OC.')}"></div>

        <div class="cui-command-bar">
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <a th:href="@{/inventario/compras}" class="cui-btn cui-btn-secondary">
                    <i class="feather-shopping-bag" aria-hidden="true"></i>
                    <span>Compras</span>
                </a>
                <a th:href="@{/inventario/dashboard}" class="cui-btn cui-btn-secondary">
                    <i class="feather-grid" aria-hidden="true"></i>
                    <span>Dashboard</span>
                </a>
            </div>
        </div>

        <div class="alert alert-success cui-alert" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>

        <div th:with="pendientes=${ordenesCompra.?[estado != 'RECIBIDA' and estado != 'CANCELADA']}">

            <div class="cui-summary-strip">
                <div class="cui-summary-item">
                    <span class="cui-summary-label">OC pendientes</span>
                    <strong class="cui-summary-value warning" th:text="${#lists.size(pendientes)}">0</strong>
                </div>
                <span class="cui-summary-sep" aria-hidden="true">·</span>
                <div class="cui-summary-item">
                    <span class="cui-summary-label">En recepcion parcial</span>
                    <strong class="cui-summary-value danger"
                            th:text="${#lists.size(pendientes.?[estado == 'RECEPCION_PARCIAL'])}">0</strong>
                </div>
            </div>

            <section class="cui-data-grid">
                <div class="cui-data-grid-header">
                    <div>
                        <p class="cui-eyebrow">Cola de trabajo</p>
                        <h2>Ordenes pendientes de recepcion</h2>
                    </div>
                </div>
                <div class="cui-data-grid-body">
                    <div class="table-responsive">
                        <table class="table cui-table">
                            <thead>
                            <tr>
                                <th>Orden</th>
                                <th>Proveedor</th>
                                <th>Bodega destino</th>
                                <th>Estado</th>
                                <th class="text-center">Lineas pendientes</th>
                                <th style="min-width:130px">Progreso</th>
                                <th class="text-end">Accion</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(pendientes)}">
                                <td colspan="7">
                                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-check-circle', title='Sin pendientes', message='Todas las ordenes de compra han sido recibidas o canceladas.')}"></div>
                                </td>
                            </tr>
                            <tr th:each="oc : ${pendientes}"
                                th:with="lineasTotal=${#lists.size(oc.detalles)},
                                         lineasCompletas=${#lists.size(oc.detalles.?[estado == 'COMPLETO'])},
                                         lineasPend=${lineasTotal - lineasCompletas},
                                         pct=${lineasTotal > 0 ? (lineasCompletas * 100 / lineasTotal) : 0}">
                                <td>
                                    <div class="cui-row-stack">
                                        <span class="cui-row-title" th:text="${oc.numeroOc}">OC-001</span>
                                        <span class="cui-row-subtitle"
                                              th:text="${oc.fechaEmision != null ? oc.fechaEmision : 'Sin fecha'}">Fecha</span>
                                    </div>
                                </td>
                                <td th:text="${oc.proveedor ?: '—'}">Proveedor</td>
                                <td th:text="${oc.bodegaDestinoNombre ?: '—'}">Bodega</td>
                                <td>
                                    <span class="cui-badge"
                                          th:classappend="${oc.estado == 'RECEPCION_PARCIAL'} ? ' cui-badge-en-reparacion' : ' cui-badge-en-bodega'"
                                          th:text="${oc.estado ?: '—'}">Estado</span>
                                </td>
                                <td class="text-center">
                                    <span th:text="${lineasPend} + ' de ' + ${lineasTotal}"
                                          th:classappend="${lineasPend > 0} ? 'text-warning fw-semibold' : 'text-success'">—</span>
                                </td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="progress flex-grow-1" style="height:6px;"
                                             th:title="${lineasCompletas} + ' de ' + ${lineasTotal} + ' lineas completadas'">
                                            <div class="progress-bar"
                                                 role="progressbar"
                                                 th:style="'width:' + ${pct} + '%'"
                                                 th:attr="aria-valuenow=${pct}"
                                                 aria-valuemin="0"
                                                 aria-valuemax="100"></div>
                                        </div>
                                        <small class="text-nowrap text-muted" th:text="${pct} + '%'">0%</small>
                                    </div>
                                </td>
                                <td class="text-end">
                                    <a th:href="@{/inventario/ordenes-compra/{id}/gestionar(id=${oc.idOrdenCompra})}"
                                       class="btn btn-outline-primary btn-sm">
                                        <i class="feather-package" aria-hidden="true"></i>
                                        Gestionar
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>
</body>
</html>
