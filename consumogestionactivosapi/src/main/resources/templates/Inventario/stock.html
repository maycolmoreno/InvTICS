<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Stock</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Stock', subtitle='Existencias de consumibles por bodega, entregas y traslados operativos.')}"></div>

        <div class="cui-command-bar">
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <a th:href="@{/inventario/recepcion}" class="cui-btn cui-btn-secondary">
                    <i class="feather-plus-circle" aria-hidden="true"></i>
                    <span>Recibir</span>
                </a>
                <a th:href="@{/inventario/movimientos}" class="cui-btn cui-btn-secondary">
                    <i class="feather-clock" aria-hidden="true"></i>
                    <span>Movimientos</span>
                </a>
            </div>
        </div>

        <div class="alert alert-success cui-alert" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>

        <section class="cui-kpi-grid">
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Items en stock', value=${#lists.size(stock)}, meta='Consulta actual', icon='feather-archive', tone='primary')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Stock saludable', value=${#lists.size(stock.?[cantidad != null and cantidad > 10])}, meta='Mas de 10 unidades', icon='feather-check-circle', tone='success')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Stock bajo', value=${#lists.size(stock.?[cantidad != null and cantidad > 0 and cantidad <= 10])}, meta='Requiere seguimiento', icon='feather-alert-triangle', tone='warning')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Sin stock', value=${#lists.size(stock.?[cantidad == null or cantidad <= 0])}, meta='No disponible', icon='feather-x-circle', tone='danger')}"></div>
        </section>

        <div class="cui-workspace-grid">
            <section class="cui-data-grid" id="stockGrid" data-cui-grid>
                <div class="cui-data-grid-header">
                    <div>
                        <p class="cui-eyebrow">Operacion logistica</p>
                        <h2>Existencias</h2>
                    </div>
                    <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
                </div>

                <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar por consumible, codigo o bodega...', exportHref=null)}"></div>

                <div class="cui-grid-filters">
                    <select class="form-select" disabled>
                        <option th:each="b : ${bodegas}"
                                th:value="${b.idBodega}"
                                th:selected="${b.idBodega == bodegaSeleccionadaId}"
                                th:text="${b.nombre}">Bodega</option>
                    </select>
                    <select class="form-select" data-cui-grid-filter data-filter-key="estado" data-cui-filter-persist>
                        <option value="">Todos los niveles</option>
                        <option value="saludable">Saludable</option>
                        <option value="bajo">Bajo</option>
                        <option value="sin-stock">Sin stock</option>
                    </select>
                </div>

                <div class="cui-data-grid-body">
                    <div class="table-responsive">
                        <table class="table cui-table">
                            <thead>
                            <tr>
                                <th>Consumible</th>
                                <th>Bodega</th>
                                <th>Cantidad</th>
                                <th>Estado</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${stock == null or #lists.isEmpty(stock)}">
                                <td colspan="5">
                                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-archive', title='Sin stock', message='Sin stock registrado para la bodega principal.')}"></div>
                                </td>
                            </tr>
                            <tr th:each="s : ${stock}"
                                data-cui-grid-row
                                th:with="cantidad=${s.cantidad != null ? s.cantidad : 0},
                                         estadoStock=${cantidad > 10 ? 'saludable' : (cantidad > 0 ? 'bajo' : 'sin-stock')},
                                         busqueda=${(s.consumibleNombre ?: '') + ' ' + (s.consumibleCodigo ?: '') + ' ' + (s.bodegaNombre ?: '')}"
                                th:attr="data-search=${#strings.toLowerCase(busqueda)},data-estado=${estadoStock}">
                                <td>
                                    <div class="cui-row-stack">
                                        <span class="cui-row-title" th:text="${s.consumibleNombre}">Mouse USB</span>
                                        <span class="cui-row-subtitle" th:text="${s.consumibleCodigo ?: 'Sin codigo'}">COD</span>
                                    </div>
                                </td>
                                <td th:text="${s.bodegaNombre ?: 'Sin bodega'}">Bodega</td>
                                <td>
                                    <span class="cui-row-title" th:text="${cantidad}">0</span>
                                </td>
                                <td>
                                    <span class="cui-badge"
                                          th:classappend="${estadoStock == 'saludable'} ? ' cui-badge-asignado' : (${estadoStock == 'bajo'} ? ' cui-badge-en-reparacion' : ' cui-badge-critico')"
                                          th:text="${estadoStock == 'saludable' ? 'Saludable' : (estadoStock == 'bajo' ? 'Bajo' : 'Sin stock')}">Estado</span>
                                </td>
                                <td>
                                    <div class="cui-action-cell">
                                        <button type="button" class="btn btn-outline-primary btn-sm" data-bs-toggle="pill" data-bs-target="#entrega-consumible">
                                            Entregar
                                        </button>
                                        <div class="dropdown cui-action-menu">
                                            <button type="button" class="btn btn-light cui-icon-btn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Mas acciones">
                                                <i class="feather-more-vertical" aria-hidden="true"></i>
                                            </button>
                                            <div class="dropdown-menu dropdown-menu-end">
                                                <button type="button" class="dropdown-item" data-bs-toggle="pill" data-bs-target="#traslado-consumible">
                                                    <i class="feather-truck" aria-hidden="true"></i>
                                                    Trasladar
                                                </button>
                                                <a class="dropdown-item" th:href="@{/inventario/movimientos}">
                                                    <i class="feather-clock" aria-hidden="true"></i>
                                                    Ver movimientos
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div hidden data-cui-empty-state>
                        <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay stock que coincida con los filtros aplicados.')}"></div>
                    </div>
                </div>
            </section>

            <section class="cui-form-panel">
                <div class="cui-form-panel-header">
                    <h2 class="cui-form-panel-title">Acciones rapidas</h2>
                    <span class="cui-badge cui-badge-asignado">Operacion</span>
                </div>
                <ul class="nav nav-pills mb-3" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#entrega-consumible" type="button" role="tab">Entregar</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#traslado-consumible" type="button" role="tab">Trasladar</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="entrega-consumible" role="tabpanel">
                        <form th:action="@{/inventario/asignaciones/consumibles}" th:object="${asignacionConsumibleRequest}" method="post" class="row g-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="col-md-6">
                                <label class="form-label">Bodega</label>
                                <select class="form-select" th:field="*{bodegaId}" required>
                                    <option value="">Seleccione</option>
                                    <option th:each="b : ${bodegas}" th:value="${b.idBodega}" th:text="${b.nombre}">Bodega</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Consumible</label>
                                <select class="form-select" th:field="*{consumibleId}" required>
                                    <option value="">Seleccione</option>
                                    <option th:each="s : ${stock}" th:value="${s.consumibleId}" th:text="${s.consumibleNombre + ' (' + s.cantidad + ')'}">Consumible</option>
                                </select>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label">Custodio</label>
                                <select class="form-select" th:field="*{custodioId}" required>
                                    <option value="">Seleccione</option>
                                    <option th:each="c : ${custodios}" th:value="${c.idCustodio}" th:text="${c.nombre}">Custodio</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Cantidad</label>
                                <input class="form-control" th:field="*{cantidad}" type="number" min="1" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Observacion</label>
                                <textarea class="form-control" th:field="*{observacion}" rows="2"></textarea>
                            </div>
                            <div class="col-12 d-flex justify-content-end">
                                <button class="cui-btn cui-btn-primary" type="submit" th:disabled="${#lists.isEmpty(stock)}">
                                    <i class="feather-user-check" aria-hidden="true"></i>
                                    <span>Entregar</span>
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="traslado-consumible" role="tabpanel">
                        <form th:action="@{/inventario/traslados/consumibles}" th:object="${trasladoConsumibleRequest}" method="post" class="row g-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="col-md-6">
                                <label class="form-label">Origen</label>
                                <select class="form-select" th:field="*{bodegaOrigenId}" required>
                                    <option value="">Seleccione</option>
                                    <option th:each="b : ${bodegas}" th:value="${b.idBodega}" th:text="${b.nombre}">Origen</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Destino</label>
                                <select class="form-select" th:field="*{bodegaDestinoId}" required>
                                    <option value="">Seleccione</option>
                                    <option th:each="b : ${bodegas}" th:value="${b.idBodega}" th:text="${b.nombre}">Destino</option>
                                </select>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label">Consumible</label>
                                <select class="form-select" th:field="*{consumibleId}" required>
                                    <option value="">Seleccione</option>
                                    <option th:each="s : ${stock}" th:value="${s.consumibleId}" th:text="${s.consumibleNombre + ' (' + s.cantidad + ')'}">Consumible</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Cantidad</label>
                                <input class="form-control" th:field="*{cantidad}" type="number" min="1" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Observacion</label>
                                <textarea class="form-control" th:field="*{observacion}" rows="2"></textarea>
                            </div>
                            <div class="col-12 d-flex justify-content-end">
                                <button class="cui-btn cui-btn-primary" type="submit" th:disabled="${#lists.isEmpty(stock)}">
                                    <i class="feather-truck" aria-hidden="true"></i>
                                    <span>Trasladar</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>
</body>
</html>
