<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Stock</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Stock', subtitle='Existencias de consumibles por bodega. Entrega y traslado desde cada fila.')}"></div>

        <div class="cui-command-bar">
            <div class="d-flex align-items-center gap-2 flex-wrap">
            </div>
        </div>

        <div class="alert alert-success cui-alert" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>

        <section class="cui-data-grid" id="stockGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Operacion logistica</p>
                    <h2>Existencias</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>

            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar por consumible, codigo o bodega...', exportHref=null)}"></div>

            <div class="cui-grid-filters">
                <select class="form-select" data-cui-grid-filter data-filter-key="nivel" data-cui-filter-persist>
                    <option value="">Todos los niveles</option>
                    <option value="saludable">Saludable</option>
                    <option value="bajo">Bajo</option>
                    <option value="sin-stock">Sin stock</option>
                </select>
            </div>

            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>Consumible</th>
                            <th>Bodega</th>
                            <th class="text-center">Cantidad</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${stock == null or #lists.isEmpty(stock)}">
                            <td colspan="5">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-archive', title='Sin stock', message='Sin stock registrado para la bodega principal.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="s : ${stock}"
                            data-cui-grid-row
                            th:with="cantidad=${s.cantidad != null ? s.cantidad : 0},
                                     nivel=${cantidad > 10 ? 'saludable' : (cantidad > 0 ? 'bajo' : 'sin-stock')},
                                     busqueda=${(s.consumibleNombre ?: '') + ' ' + (s.consumibleCodigo ?: '') + ' ' + (s.bodegaNombre ?: '')}"
                            th:attr="data-search=${#strings.toLowerCase(busqueda)},
                                     data-nivel=${nivel},
                                     data-consumible-id=${s.consumibleId},
                                     data-consumible-nombre=${s.consumibleNombre ?: ''},
                                     data-bodega-id=${bodegaSeleccionadaId},
                                     data-bodega-nombre=${s.bodegaNombre ?: ''},
                                     data-cantidad=${cantidad}">
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${s.consumibleNombre}">Mouse USB</span>
                                    <span class="cui-row-subtitle" th:text="${s.consumibleCodigo ?: 'Sin codigo'}">COD</span>
                                </div>
                            </td>
                            <td th:text="${s.bodegaNombre ?: 'Sin bodega'}">Bodega</td>
                            <td class="text-center">
                                <span class="cui-row-title" th:text="${cantidad}">0</span>
                            </td>
                            <td>
                                <span class="cui-badge"
                                      th:classappend="${nivel == 'saludable'} ? ' cui-badge-asignado' : (${nivel == 'bajo'} ? ' cui-badge-en-reparacion' : ' cui-badge-critico')"
                                      th:text="${nivel == 'saludable' ? 'Saludable' : (nivel == 'bajo' ? 'Bajo' : 'Sin stock')}">Estado</span>
                            </td>
                            <td>
                                <div class="cui-action-cell">
                                    <button type="button"
                                            class="btn btn-outline-primary btn-sm"
                                            th:disabled="${cantidad == 0}"
                                            data-action="stock-entregar"
                                            data-cui-drawer-open="#drawerEntregarStock">
                                        <i class="feather-user-check" aria-hidden="true"></i>
                                        Entregar
                                    </button>
                                    <button type="button"
                                            class="btn btn-outline-secondary btn-sm"
                                            th:disabled="${cantidad == 0}"
                                            data-action="stock-trasladar"
                                            data-cui-drawer-open="#drawerTrasladarStock">
                                        <i class="feather-send" aria-hidden="true"></i>
                                        Trasladar
                                    </button>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay stock que coincida con los filtros aplicados.')}"></div>
                </div>
            </div>
        </section>

        <!-- Drawer: Entregar consumible -->
        <aside class="cui-drawer" id="drawerEntregarStock" aria-hidden="true" aria-label="Entregar consumible">
            <div class="cui-drawer-header">
                <div>
                    <div class="fw-bold">Entregar consumible</div>
                    <div class="small text-muted">Complete los datos de entrega</div>
                </div>
                <button type="button" class="cui-icon-button" data-cui-drawer-close aria-label="Cerrar panel">
                    <i class="feather-x"></i>
                </button>
            </div>
            <div class="cui-drawer-body">
                <form th:action="@{/inventario/asignaciones/consumibles}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="consumibleId" id="ent-consumible-id">
                    <input type="hidden" name="bodegaId" id="ent-bodega-id">

                    <div class="col-12">
                        <label class="form-label text-muted small">Consumible</label>
                        <div class="form-control bg-light fw-semibold" id="ent-consumible-nombre">—</div>
                    </div>
                    <div class="col-8">
                        <label class="form-label text-muted small">Bodega origen</label>
                        <div class="form-control bg-light" id="ent-bodega-nombre">—</div>
                    </div>
                    <div class="col-4">
                        <label class="form-label text-muted small">Disponible</label>
                        <div class="form-control bg-light text-center fw-bold" id="ent-disponible">—</div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Custodio <span class="cui-required-mark">*</span></label>
                        <select class="cui-inline-input" name="custodioId" required>
                            <option value="">Seleccione custodio...</option>
                            <option th:each="c : ${custodios}"
                                    th:value="${c.idCustodio}"
                                    th:text="${c.nombre}">Custodio</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Cantidad a entregar <span class="cui-required-mark">*</span></label>
                        <input class="cui-inline-input" type="number" name="cantidad" id="ent-cantidad"
                               min="1" value="1" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observacion</label>
                        <textarea class="cui-inline-input" name="observacion" rows="2"></textarea>
                    </div>
                    <div class="col-12 d-flex justify-content-end gap-2">
                        <button type="button" class="cui-btn cui-btn-secondary" data-cui-drawer-close>Cancelar</button>
                        <button class="cui-btn cui-btn-primary" type="submit">
                            <i class="feather-user-check" aria-hidden="true"></i>
                            <span>Entregar</span>
                        </button>
                    </div>
                </form>
            </div>
        </aside>

        <!-- Drawer: Trasladar consumible -->
        <aside class="cui-drawer" id="drawerTrasladarStock" aria-hidden="true" aria-label="Trasladar consumible">
            <div class="cui-drawer-header">
                <div>
                    <div class="fw-bold">Trasladar consumible</div>
                    <div class="small text-muted">Mover unidades entre bodegas</div>
                </div>
                <button type="button" class="cui-icon-button" data-cui-drawer-close aria-label="Cerrar panel">
                    <i class="feather-x"></i>
                </button>
            </div>
            <div class="cui-drawer-body">
                <form th:action="@{/inventario/traslados/consumibles}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="consumibleId" id="tras-consumible-id">
                    <input type="hidden" name="bodegaOrigenId" id="tras-bodega-origen-id">

                    <div class="col-12">
                        <label class="form-label text-muted small">Consumible</label>
                        <div class="form-control bg-light fw-semibold" id="tras-consumible-nombre">—</div>
                    </div>
                    <div class="col-8">
                        <label class="form-label text-muted small">Bodega origen</label>
                        <div class="form-control bg-light" id="tras-bodega-nombre">—</div>
                    </div>
                    <div class="col-4">
                        <label class="form-label text-muted small">Disponible</label>
                        <div class="form-control bg-light text-center fw-bold" id="tras-disponible">—</div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Bodega destino <span class="cui-required-mark">*</span></label>
                        <select class="cui-inline-input" name="bodegaDestinoId" required>
                            <option value="">Seleccione bodega destino...</option>
                            <option th:each="b : ${bodegas}"
                                    th:value="${b.idBodega}"
                                    th:text="${b.nombre}">Bodega</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Cantidad <span class="cui-required-mark">*</span></label>
                        <input class="cui-inline-input" type="number" name="cantidad" id="tras-cantidad"
                               min="1" value="1" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observacion</label>
                        <textarea class="cui-inline-input" name="observacion" rows="2"></textarea>
                    </div>
                    <div class="col-12 d-flex justify-content-end gap-2">
                        <button type="button" class="cui-btn cui-btn-secondary" data-cui-drawer-close>Cancelar</button>
                        <button class="cui-btn cui-btn-primary" type="submit">
                            <i class="feather-send" aria-hidden="true"></i>
                            <span>Trasladar</span>
                        </button>
                    </div>
                </form>
            </div>
        </aside>

        <script>
        (function () {
            function set(id, valor, esInput) {
                var el = document.getElementById(id);
                if (!el) return;
                if (esInput) { el.value = valor; } else { el.textContent = valor || '—'; }
            }

            document.addEventListener('click', function (e) {
                var btn = e.target.closest('[data-action]');
                if (!btn) return;
                var row = btn.closest('tr');
                if (!row) return;
                var d = row.dataset;

                if (btn.dataset.action === 'stock-entregar') {
                    set('ent-consumible-id',     d.consumibleId,    true);
                    set('ent-bodega-id',          d.bodegaId,        true);
                    set('ent-consumible-nombre',  d.consumibleNombre);
                    set('ent-bodega-nombre',      d.bodegaNombre);
                    set('ent-disponible',         d.cantidad);
                    document.getElementById('ent-cantidad').setAttribute('max', d.cantidad || 1);
                }

                if (btn.dataset.action === 'stock-trasladar') {
                    set('tras-consumible-id',     d.consumibleId,    true);
                    set('tras-bodega-origen-id',  d.bodegaId,        true);
                    set('tras-consumible-nombre', d.consumibleNombre);
                    set('tras-bodega-nombre',     d.bodegaNombre);
                    set('tras-disponible',        d.cantidad);
                    document.getElementById('tras-cantidad').setAttribute('max', d.cantidad || 1);
                }
            });
        }());
        </script>
    </div>
</div>
</body>
</html>
