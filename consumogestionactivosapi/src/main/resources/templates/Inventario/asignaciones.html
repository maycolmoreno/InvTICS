<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Asignaciones</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">

        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Asignacion de activos', subtitle='Selecciona el colaborador y los activos en bodega. Para entregar consumibles usa el modulo Stock.')}"></div>

        <div class="cui-command-bar">
            <div class="d-flex align-items-center gap-2">
                <a th:href="@{/inventario/stock}" class="cui-btn cui-btn-secondary">
                    <i class="feather-archive" aria-hidden="true"></i>
                    <span>Stock</span>
                </a>
            </div>
        </div>

        <div class="alert alert-success cui-alert" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-warning cui-alert" th:if="${warning}" th:text="${warning}"></div>
        <div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>


        <form th:action="@{/inventario/asignaciones/lote}" method="post" id="formLote">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="d-flex flex-column gap-3">
                <section class="asi-panel">
                    <div class="asi-panel-header">
                        <h3>Colaborador</h3>
                    </div>
                    <div class="asi-panel-body">
                        <input type="hidden" name="custodioId" id="asi-custodio-id" required>

                        <div class="asi-search-wrap" id="asi-search-wrap">
                            <label class="form-label">Buscar por nombre o cédula <span class="text-danger">*</span></label>
                            <input type="text" id="asi-search-inp" class="form-control"
                                   placeholder="Escriba al menos 2 caracteres..."
                                   autocomplete="off" data-select2-skip="true">
                            <div id="asi-search-drop" class="asi-search-drop" hidden></div>
                        </div>

                        <div id="asi-colab-card" class="asi-colab-card" hidden>
                            <div class="asi-colab-info">
                                <strong id="asi-colab-nombre"></strong>
                                <span id="asi-colab-meta"></span>
                            </div>
                            <button type="button" class="cui-btn cui-btn-secondary btn-sm" id="asi-colab-cambiar">Cambiar</button>
                        </div>
                        <p id="asi-custodio-error" class="asi-validation-msg" role="alert">
                            <i class="feather-alert-circle" aria-hidden="true"></i>
                            Seleccione un colaborador de la lista antes de continuar.
                        </p>
                    </div>
                </section>

                <section class="asi-panel">
                    <div class="asi-panel-header d-flex align-items-center justify-content-between">
                        <h3>Activos disponibles</h3>
                        <span class="cui-badge cui-badge-en-bodega" id="conteoActivos">0 seleccionados</span>
                    </div>
                    <div class="table-responsive" style="max-height:320px;overflow-y:auto;">
                        <table class="table cui-table mb-0">
                            <thead style="position:sticky;top:0;z-index:1;">
                            <tr>
                                <th style="width:2.25rem"></th>
                                <th>Codigo</th>
                                <th>Modelo</th>
                                <th>Serial</th>
                                <th>Bodega</th>
                                <th>Etiqueta</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${activosEnBodega == null or #lists.isEmpty(activosEnBodega)}">
                                <td colspan="6">
                                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-monitor', title='Sin activos asignables', message='No hay activos en bodega con etiqueta disponible para asignacion.')}"></div>
                                </td>
                            </tr>
                            <tr th:each="a : ${activosEnBodega}" class="activo-row"
                                th:with="etq=${a.etiquetado}">
                                <td>
                                    <input type="checkbox" class="form-check-input activo-chk"
                                           name="equipoIds"
                                           th:value="${a.idEquipo}"
                                           th:disabled="${etq != null and !etq}"
                                           th:title="${etq != null and !etq} ? 'Requiere etiqueta fisica antes de asignarse' : null">
                                </td>
                                <td class="fw-semibold" th:text="${a.codigoCresio ?: '—'}">COD</td>
                                <td th:text="${a.modelo ?: '—'}">Modelo</td>
                                <td th:text="${a.serial ?: '—'}">Serial</td>
                                <td th:text="${a.bodegaNombre ?: '—'}">Bodega</td>
                                <td>
                                    <span th:if="${etq}" class="cui-badge cui-badge-asignado">
                                        <i class="feather-tag" aria-hidden="true"></i> OK
                                    </span>
                                    <span th:unless="${etq}" class="cui-badge cui-badge-baja">Sin etiqueta</span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="asi-panel">
                    <div class="asi-panel-header">
                        <h3>Detalles de entrega</h3>
                    </div>
                    <div class="asi-panel-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Condicion al entregar <span class="text-danger">*</span></label>
                                <select class="form-select" name="condicionEntrega" required>
                                    <option value="">Seleccione</option>
                                    <option value="NUEVO">Nuevo</option>
                                    <option value="BUENO">Bueno</option>
                                    <option value="REGULAR">Regular</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Fecha de asignacion <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" name="fechaInicio" id="inp-fecha" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Asignado por</label>
                                <input type="text" class="form-control" name="realizadoPor"
                                       th:value="${usuarioActual}"
                                       placeholder="Quien entrega fisicamente">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Observacion</label>
                                <textarea class="form-control" name="observacion" rows="2"
                                          placeholder="Detalle adicional (opcional)"></textarea>
                            </div>
                        </div>
                    </div>
                </section>

                <div class="d-flex justify-content-end">
                    <button type="submit" class="cui-btn cui-btn-primary" style="min-width:200px;">
                        <i class="feather-user-check me-1" aria-hidden="true"></i>
                        Confirmar asignacion
                    </button>
                </div>
            </div>
        </form>

        <script>
        (function () {
            // Fecha por defecto
            var fecha = document.getElementById('inp-fecha');
            if (fecha && !fecha.value) fecha.value = new Date().toISOString().slice(0, 10);

            // Contador de activos seleccionados
            document.addEventListener('change', function () {
                var el = document.getElementById('conteoActivos');
                if (el) el.textContent = document.querySelectorAll('.activo-chk:checked').length + ' seleccionados';
            });

            // AJAX autocomplete de custodios
            var inp      = document.getElementById('asi-search-inp');
            var drop     = document.getElementById('asi-search-drop');
            var wrap     = document.getElementById('asi-search-wrap');
            var card     = document.getElementById('asi-colab-card');
            var hid      = document.getElementById('asi-custodio-id');
            var nomEl    = document.getElementById('asi-colab-nombre');
            var metaEl   = document.getElementById('asi-colab-meta');
            var btnCamb  = document.getElementById('asi-colab-cambiar');
            var timer    = null;

            function mostrarSeleccion(id, nombre, cedula) {
                hid.value          = id;
                nomEl.textContent  = nombre;
                metaEl.textContent = cedula ? ('CI: ' + cedula) : '';
                wrap.hidden = true;
                card.hidden = false;
                drop.hidden = true;
                drop.innerHTML = '';
                inp.value = '';
            }

            function seleccionar(item) {
                if (item.origen !== 'DIRECTORIO') {
                    mostrarSeleccion(item.id, item.nombre, item.cedula);
                    return;
                }
                // Persona encontrada en el directorio institucional pero sin
                // registro local todavia: se crea/actualiza el custodio local
                // justo ahora, antes de poder asignarle un activo.
                metaEl.textContent = 'Registrando en CRESIO...';
                nomEl.textContent = item.nombre;
                wrap.hidden = true;
                card.hidden = false;
                drop.hidden = true;

                var csrfInput = document.querySelector('#formLote input[type=hidden][name]');
                var body = new URLSearchParams();
                body.set('cedula', item.cedula);
                if (csrfInput) { body.set(csrfInput.name, csrfInput.value); }

                fetch('/inventario/custodios/resolver-directorio', {
                    method: 'POST',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: body
                })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.error) {
                        resetear();
                        window.alert('No se pudo registrar a ' + item.nombre + ': ' + data.error);
                        return;
                    }
                    mostrarSeleccion(data.id, data.nombre, data.cedula);
                    if (data.advertencias && data.advertencias.length) {
                        window.alert('Colaborador registrado con advertencias:\n- ' + data.advertencias.join('\n- '));
                    }
                })
                .catch(function () {
                    resetear();
                    window.alert('No se pudo registrar a ' + item.nombre + ' (error de conexion).');
                });
            }

            function resetear() {
                hid.value = '';
                card.hidden = true;
                wrap.hidden = false;
                inp.value = '';
                inp.focus();
            }

            btnCamb.addEventListener('click', resetear);

            inp.addEventListener('input', function () {
                clearTimeout(timer);
                var q = inp.value.trim();
                if (q.length < 2) { drop.hidden = true; return; }
                timer = setTimeout(function () {
                    fetch('/inventario/custodios/buscar?q=' + encodeURIComponent(q), {
                        headers: { 'X-Requested-With': 'XMLHttpRequest' }
                    })
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        drop.innerHTML = '';
                        if (!data.length) {
                            drop.innerHTML = '<div class="asi-drop-item"><em>Sin resultados para "' + q + '"</em></div>';
                        } else {
                            data.forEach(function (it) {
                                var div = document.createElement('div');
                                div.className = 'asi-drop-item';
                                var metaPartes = ['CI: ' + (it.cedula || '—')];
                                if (it.cargo) { metaPartes.push(it.cargo); }
                                if (it.departamento) { metaPartes.push(it.departamento); }
                                var etiquetaOrigen = it.origen === 'DIRECTORIO'
                                    ? '<span class="cui-badge cui-badge-en-bodega">Directorio institucional</span>'
                                    : '';
                                div.innerHTML = '<div class="asi-drop-nombre">' + it.nombre + ' ' + etiquetaOrigen + '</div>'
                                    + '<div class="asi-drop-meta">' + metaPartes.join(' · ') + '</div>';
                                div.addEventListener('click', function () { seleccionar(it); });
                                drop.appendChild(div);
                            });
                        }
                        drop.hidden = false;
                    })
                    .catch(function () { drop.hidden = true; });
                }, 300);
            });

            document.addEventListener('click', function (e) {
                if (inp && drop && !inp.contains(e.target) && !drop.contains(e.target)) {
                    drop.hidden = true;
                }
            });

            // Validar que se seleccionó custodio antes de enviar
            const custodioError = document.getElementById('asi-custodio-error');
            document.getElementById('formLote').addEventListener('submit', function (e) {
                if (!hid.value) {
                    e.preventDefault();
                    inp.focus();
                    inp.classList.add('is-invalid');
                    if (custodioError) custodioError.classList.add('visible');
                } else {
                    inp.classList.remove('is-invalid');
                    if (custodioError) custodioError.classList.remove('visible');
                }
            });
        }());
        </script>
    </div>
</div>
</body>
</html>
