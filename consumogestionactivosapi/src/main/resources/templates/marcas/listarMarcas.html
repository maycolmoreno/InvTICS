<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <meta charset="utf-8">
    <title>Marcas</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <section class="cui-admin-header d-flex align-items-start justify-content-between gap-3 flex-wrap">
            <div>
                <p class="cui-eyebrow">Catalogo tecnico</p>
                <h1>Marcas de activos</h1>
                <p>Configuracion sobria para marcas usadas en el inventario tecnologico.</p>
            </div>
            <button type="button" class="cui-btn cui-btn-primary" data-action="marca-nuevo" data-cui-drawer-open="#drawerMarca">
                <i class="feather-plus-circle" aria-hidden="true"></i>
                <span>Nueva marca</span>
            </button>
        </section>

        <div class="alert alert-success cui-alert" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-danger cui-alert" th:if="${errorEliminar}" th:text="${errorEliminar}"></div>

        <section class="cui-data-grid" id="brandsAdminGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Administracion</p>
                    <h2>Listado de marcas</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>
            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar marca...', exportHref=null)}"></div>
            <div class="cui-grid-filters">
                <select class="form-select" data-cui-grid-filter data-filter-key="estado" data-cui-filter-persist>
                    <option value="">Todos los estados</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Marca</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(listarmarcas)}">
                            <td colspan="4">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-tag', title='Sin marcas', message='No hay marcas registradas.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="marca : ${listarmarcas}" data-cui-grid-row
                            th:attr="data-search=${#strings.toLowerCase(marca.nombre)},
                                     data-estado=${marca.estado ? 'activo' : 'inactivo'},
                                     data-id-marca=${marca.idMarca},
                                     data-nombre=${marca.nombre ?: ''},
                                     data-estado-activo=${marca.estado}">
                            <td><span class="cui-row-title" th:text="${marca.idMarca}">1</span></td>
                            <td th:text="${marca.nombre}">Dell</td>
                            <td>
                                <span class="cui-badge" th:classappend="${marca.estado} ? ' cui-badge-asignado' : ' cui-badge-dado-de-baja'" th:text="${marca.estado ? 'Activo' : 'Inactivo'}">Activo</span>
                            </td>
                            <td>
                                <div class="cui-action-cell">
                                    <button type="button" class="cui-btn cui-btn-secondary cui-btn-sm" data-action="marca-editar" data-cui-drawer-open="#drawerMarca">Editar</button>
                                    <div class="dropdown cui-action-menu">
                                        <button type="button" class="cui-icon-btn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Mas acciones">
                                            <i class="feather-more-vertical" aria-hidden="true"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-end">
                                            <form th:if="${marca.estado}" th:action="@{/marcas/eliminar/{id}(id=${marca.idMarca})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <button type="submit" class="cui-document-action text-danger" data-cui-confirm="Seguro que deseas desactivar esta marca?">
                                                    <i class="feather-slash" aria-hidden="true"></i>
                                                    Desactivar
                                                </button>
                                            </form>
                                            <span th:unless="${marca.estado}" class="dropdown-item text-muted"><i class="feather-info"></i>Sin acciones disponibles</span>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay marcas que coincidan con la busqueda visual.')}"></div>
                </div>
            </div>
        </section>

        <!-- Drawer: Nueva / Editar marca -->
        <aside class="cui-drawer" id="drawerMarca" aria-hidden="true" aria-label="Marca">
            <div class="cui-drawer-header">
                <div>
                    <div class="fw-bold" id="drawerMarcaTitulo">Nueva marca</div>
                    <div class="small text-muted">Registra la marca para asociarla a equipos del inventario.</div>
                </div>
                <button type="button" class="cui-icon-button" data-cui-drawer-close aria-label="Cerrar panel">
                    <i class="feather-x"></i>
                </button>
            </div>
            <div class="cui-drawer-body">
                <form id="formMarca" th:action="@{/marcas}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="idMarca" value="0">

                    <div class="col-12">
                        <label class="form-label">Nombre <span class="cui-required-mark">*</span></label>
                        <input type="text" class="form-control" name="nombre" placeholder="Ej. Dell" minlength="2" maxlength="100">
                    </div>

                    <div class="col-12" id="drawerMarcaEstadoWrap" hidden>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="estado" value="true" id="marcaEstadoSwitch" checked>
                            <label class="form-check-label" for="marcaEstadoSwitch">Activo</label>
                        </div>
                    </div>

                    <div class="col-12 d-flex justify-content-end gap-2 pt-2">
                        <button type="button" class="cui-btn cui-btn-secondary" data-cui-drawer-close>Cancelar</button>
                        <button class="cui-btn cui-btn-primary" type="submit">
                            <i class="feather-save" aria-hidden="true"></i>
                            <span>Guardar</span>
                        </button>
                    </div>
                </form>
            </div>
        </aside>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
    (function () {
        var form = document.getElementById('formMarca');
        var drawerTitulo = document.getElementById('drawerMarcaTitulo');
        var estadoWrap = document.getElementById('drawerMarcaEstadoWrap');

        function setValue(name, value) {
            var el = form.querySelector('[name="' + name + '"]');
            if (el) el.value = value || '';
        }

        function abrirDrawerNuevo() {
            form.reset();
            setValue('idMarca', '0');
            drawerTitulo.textContent = 'Nueva marca';
            estadoWrap.hidden = true;
        }

        function abrirDrawerEditar(row) {
            var d = row.dataset;
            form.reset();
            drawerTitulo.textContent = 'Editar marca';
            setValue('idMarca', d.idMarca);
            setValue('nombre', d.nombre);
            estadoWrap.hidden = false;
            document.getElementById('marcaEstadoSwitch').checked = d.estadoActivo === 'true';
        }

        document.addEventListener('click', function (e) {
            var btn = e.target.closest('[data-action]');
            if (!btn) return;
            if (btn.dataset.action === 'marca-nuevo') {
                abrirDrawerNuevo();
            } else if (btn.dataset.action === 'marca-editar') {
                var row = btn.closest('tr');
                if (row) abrirDrawerEditar(row);
            }
        });
    })();
    </script>
</th:block>
</body>
</html>
