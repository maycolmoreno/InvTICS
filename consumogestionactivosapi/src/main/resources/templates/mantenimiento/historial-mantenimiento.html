<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{plantilla/plantillaui}">
<head><title>Historial Equipo</title></head>
<body>
<div layout:fragment="contenidopaginas" class="container-fluid py-4">
    <h3 class="mb-3">Historial del equipo <span th:text="${equipo.codigoSap}"></span></h3>
    <div class="card"><div class="card-body">
        <div class="timeline">
            <div class="border-start ps-3 mb-3" th:each="m : ${historial}">
                <div class="fw-bold" th:text="${m.fechaMantenimiento}"></div>
                <div th:text="${m.tipoMantenimiento}"></div>
                <div class="text-muted" th:text="${m.tecnicoNombre}"></div>
                <a class="btn btn-sm btn-outline-primary mt-2" th:href="@{'/mantenimiento/' + ${m.idMantenimiento}}">Ver detalle</a>
            </div>
        </div>
    </div></div>
</div>
</body>
</html>
