<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Notificaciones</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Mis alertas', subtitle='Notificaciones operativas pendientes y recientes.')}"></div>

        <div th:if="${exito}" class="alert alert-success cui-alert" th:text="${exito}"></div>
        <div th:if="${error}" class="alert alert-danger cui-alert" th:text="${error}"></div>

        <section class="cui-data-grid">
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Alertas</p>
                    <h2>Notificaciones</h2>
                </div>
                <div class="cui-data-grid-meta"
                     th:text="${notificaciones != null ? #lists.size(notificaciones) + ' registros' : '0 registros'}">
                    0 registros
                </div>
            </div>

            <div th:if="${notificaciones == null or #lists.isEmpty(notificaciones)}"
                 class="cui-empty-state">
                <i class="feather-bell" aria-hidden="true"></i>
                <h3>Sin notificaciones</h3>
                <p>No tienes alertas pendientes por revisar.</p>
                <a th:href="@{/inventario/dashboard}" class="cui-btn cui-btn-secondary">Ir al Centro Operacional</a>
            </div>

            <div th:unless="${notificaciones == null or #lists.isEmpty(notificaciones)}" class="table-responsive">
                <table class="table cui-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Estado</th>
                        <th>Mensaje</th>
                        <th>Fecha</th>
                        <th class="text-end">Accion</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="notificacion : ${notificaciones}"
                        th:classappend="${notificacion.leida == true} ? '' : ' table-warning'">
                        <td>
                            <span class="cui-badge"
                                  th:classappend="${notificacion.leida == true} ? ' cui-badge-asignado' : ' cui-badge-en-reparacion'"
                                  th:text="${notificacion.leida == true ? 'Leida' : 'Pendiente'}">
                                Pendiente
                            </span>
                        </td>
                        <td>
                            <div class="fw-semibold" th:text="${notificacion.mensaje ?: 'Notificacion sin mensaje'}">
                                Mensaje
                            </div>
                            <a th:if="${notificacion.url != null and !#strings.isEmpty(notificacion.url)}"
                               th:href="${notificacion.url}"
                               class="small">Ver detalle</a>
                        </td>
                        <td class="text-muted"
                            th:text="${notificacion.creadoEn != null ? #temporals.format(notificacion.creadoEn, 'dd/MM/yyyy HH:mm') : '-'}">
                            -
                        </td>
                        <td class="text-end">
                            <form th:if="${notificacion.leida != true}"
                                  th:action="@{'/notificaciones/' + ${notificacion.idNotificacion} + '/leer'}"
                                  method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="cui-btn cui-btn-secondary cui-btn-sm">
                                    Marcar como leida
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</div>
</body>
</html>
