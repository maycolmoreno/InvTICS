<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Mantenimientos</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Mantenimientos', subtitle='Mesa tecnica para consultar, ejecutar y cerrar ordenes de mantenimiento.')}"></div>

        <div class="cui-command-bar">
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <a th:href="@{/mantenimiento/programado}" class="cui-btn cui-btn-secondary">
                    <i class="feather-calendar" aria-hidden="true"></i>
                    <span>Programados</span>
                </a>
                <a th:href="@{/mantenimiento/kanban}" class="cui-btn cui-btn-secondary">
                    <i class="feather-columns" aria-hidden="true"></i>
                    <span>Kanban</span>
                </a>
            </div>
            <a th:href="@{/mantenimiento/nuevo}" class="cui-btn cui-btn-primary">
                <i class="feather-plus" aria-hidden="true"></i>
                <span>Nuevo mantenimiento</span>
            </a>
        </div>

        <div class="cui-summary-strip">
            <div class="cui-summary-item">
                <span class="cui-summary-label">Pendientes</span>
                <strong class="cui-summary-value" th:text="${#lists.size(listamantenimientos.?[estadoInterno == 'PENDIENTE'])}">0</strong>
            </div>
            <span class="cui-summary-sep" aria-hidden="true">·</span>
            <div class="cui-summary-item">
                <span class="cui-summary-label">En proceso</span>
                <strong class="cui-summary-value warning" th:text="${#lists.size(listamantenimientos.?[estadoInterno == 'EN_PROCESO'])}">0</strong>
            </div>
            <span class="cui-summary-sep" aria-hidden="true">·</span>
            <div class="cui-summary-item">
                <span class="cui-summary-label">Correctivos abiertos</span>
                <strong class="cui-summary-value danger" th:text="${#lists.size(listamantenimientos.?[tipoMantenimiento == 'CORRECTIVO' and estadoInterno != 'CERRADO'])}">0</strong>
            </div>
        </div>

        <div th:if="${exito}" class="alert alert-success cui-alert" th:text="${exito}"></div>

        <section class="cui-data-grid" id="maintenanceGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Ordenes</p>
                    <h2>Historial de mantenimiento</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>

            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar por equipo, tecnico, custodio o estado...', exportHref=@{/reportes/mantenimientos/excel})}"></div>

            <div class="cui-grid-filters">
                <select class="form-select" data-cui-grid-filter data-filter-key="estado" data-cui-filter-persist>
                    <option value="">Todos los estados</option>
                    <option value="EN_PROCESO">En proceso</option>
                    <option value="CERRADO">Cerrado</option>
                    <option value="PENDIENTE">Pendiente</option>
                </select>
                <select class="form-select" data-cui-grid-filter data-filter-key="tipo" data-cui-filter-persist>
                    <option value="">Todos los tipos</option>
                    <option value="PREVENTIVO">Preventivo</option>
                    <option value="CORRECTIVO">Correctivo</option>
                </select>
            </div>

            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>Equipo</th>
                            <th>Tecnico / Custodio</th>
                            <th>Tipo</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${listamantenimientos == null or #lists.isEmpty(listamantenimientos)}">
                            <td colspan="6">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-tool', title='Sin mantenimientos', message='No hay ordenes de mantenimiento registradas.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="m : ${listamantenimientos}"
                            data-cui-grid-row
                            th:with="equipoNombre=${m.equipos != null and !#lists.isEmpty(m.equipos) ? (m.equipos[0].descripcion ?: 'Orden de mantenimiento') : (m.equipoDescripcion ?: 'Orden de mantenimiento')},
                                     equipoCodigo=${m.equipos != null and !#lists.isEmpty(m.equipos) ? (m.equipos[0].codigoSap ?: '-') : (m.equipoCodigoSap ?: '-')},
                                     estadoTexto=${m.estadoInterno ?: 'PENDIENTE'},
                                     tipoTexto=${m.tipoMantenimiento ?: '-'},
                                     busqueda=${equipoNombre + ' ' + equipoCodigo + ' ' + (m.tecnicoNombre ?: '') + ' ' + (m.custodioNombre ?: '') + ' ' + estadoTexto + ' ' + tipoTexto}"
                            th:attr="data-search=${#strings.toLowerCase(busqueda)},data-estado=${estadoTexto},data-tipo=${tipoTexto}">
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${equipoNombre}">Equipo</span>
                                    <span class="cui-row-subtitle" th:text="${equipoCodigo}">Codigo</span>
                                    <span th:if="${m.totalEquipos != null and m.totalEquipos > 1}" class="cui-row-subtitle text-primary fw-bold"
                                          th:text="'+ ' + ${m.totalEquipos - 1} + ' equipo(s) mas'">+ 1 equipo</span>
                                </div>
                            </td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${m.tecnicoNombre ?: '-'}">Tecnico</span>
                                    <span class="cui-row-subtitle" th:text="${m.custodioNombre ?: '-'}">Custodio</span>
                                </div>
                            </td>
                            <td th:text="${tipoTexto}">Tipo</td>
                            <td th:text="${m.fechaMantenimiento ?: '-'}">Fecha</td>
                            <td>
                                <span class="cui-badge"
                                      th:classappend="${estadoTexto == 'CERRADO'} ? ' cui-badge-asignado' : (${estadoTexto == 'EN_PROCESO'} ? ' cui-badge-en-reparacion' : ' cui-badge-en-bodega')"
                                      th:text="${estadoTexto}">Estado</span>
                            </td>
                            <td>
                                <div class="cui-action-cell">
                                    <a class="cui-btn cui-btn-secondary" th:href="@{'/mantenimiento/' + ${m.idMantenimiento}}">
                                        Ver detalle
                                    </a>
                                    <div class="dropdown cui-action-menu">
                                        <button type="button" class="cui-icon-btn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Mas acciones">
                                            <i class="feather-more-vertical" aria-hidden="true"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-end">
                                            <a class="dropdown-item" th:href="@{/mantenimiento/kanban}">
                                                <i class="feather-columns" aria-hidden="true"></i>
                                                Ver en kanban
                                            </a>
                                            <a class="dropdown-item" th:href="@{/mantenimiento/programado}">
                                                <i class="feather-calendar" aria-hidden="true"></i>
                                                Programados
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay mantenimientos que coincidan con los filtros aplicados.')}"></div>
                </div>
            </div>

            <div th:replace="~{fragments/grids/pagination :: pagination(rutaBase='/mantenimiento')}"></div>
        </section>
    </div>
</div>
</body>
</html>
