<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<title>GPS Historial</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
	#mapHistorial {
		height: 480px;
		border-radius: 12px;
		margin-bottom: 24px;
	}
	.tecnico-card {
		transition: background-color 0.2s;
	}
	.tecnico-card:hover {
		background-color: #f0f4ff;
		cursor: pointer;
	}
	.status-dot {
		display: inline-block;
		width: 10px;
		height: 10px;
		border-radius: 50%;
	}
	.hora-label {
		font-size: 12px;
		color: #6c757d;
	}
	.filtro-fecha {
		display: flex;
		align-items: center;
		gap: 12px;
	}
</style>
</head>

<body>
<section layout:fragment="contenidopaginas">
	<div class="page-header">
		<div class="page-header-left d-flex align-items-center">
			<div class="page-header-title">
				<h5 class="m-b-10">GPS Historial</h5>
			</div>
			<ul class="breadcrumb">
				<li class="breadcrumb-item"><a th:href="@{/inicio}">Inicio</a></li>
				<li class="breadcrumb-item">GPS Historial</li>
			</ul>
		</div>
	</div>

	<div class="main-content">
		<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
			<span th:text="${error}"></span>
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>

		<!-- Filtro por fecha -->
		<div class="card mb-4">
			<div class="card-body">
				<form th:action="@{/ubicaciones-tecnicos/historial}" method="get" class="filtro-fecha">
					<label for="fecha" class="form-label mb-0 fw-semibold">Fecha:</label>
					<input type="date" id="fecha" name="fecha" class="form-control" style="max-width: 220px;"
						th:value="${fechaSeleccionada}" required />
					<button type="submit" class="btn btn-primary">
						<i class="feather-search me-1"></i>Buscar
					</button>
					<a th:href="@{/ubicaciones-tecnicos/tiempo-real}" class="btn btn-outline-secondary ms-auto">
						<i class="feather-radio me-1"></i>Ir a Tiempo Real
					</a>
				</form>
			</div>
		</div>

		<!-- Mapa -->
		<div class="card mb-4">
			<div class="card-body p-0">
				<div id="mapHistorial"></div>
			</div>
		</div>

		<!-- Tabla de registros -->
		<div th:if="${historial != null && !historial.isEmpty()}" class="card">
			<div class="card-header">
				<h6 class="mb-0">
					Registros GPS del
					<span th:text="${#temporals.format(fechaSeleccionada, 'dd/MM/yyyy')}"></span>
					<span class="badge bg-primary ms-2" th:text="${historial.size()}">0</span>
				</h6>
			</div>
			<div class="card-body p-0">
				<div class="table-responsive">
					<table class="table align-middle mb-0" id="tablaHistorial">
						<thead>
							<tr>
								<th>Técnico</th>
								<th>Departamento</th>
								<th>Coordenadas</th>
								<th>Precisión</th>
								<th>Hora de captura</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="h : ${historial}" class="tecnico-card"
								th:data-lat="${h.latitud}" th:data-lng="${h.longitud}"
								th:data-nombre="${h.nombre}"
								th:data-hora="${#temporals.format(h.timestampCaptura, 'HH:mm:ss')}">
								<td>
									<strong th:text="${h.nombre}">Nombre</strong>
								</td>
								<td th:text="${h.departamento != null ? h.departamento : 'Sin departamento'}">Depto</td>
								<td>
									<small>
										<span th:text="${#numbers.formatDecimal(h.latitud, 1, 5)}">0.00000</span>,
										<span th:text="${#numbers.formatDecimal(h.longitud, 1, 5)}">0.00000</span>
									</small>
								</td>
								<td>
									<span th:if="${h.precisionMetros != null}"
										th:text="'±' + ${#numbers.formatDecimal(h.precisionMetros, 1, 0)} + 'm'">-</span>
									<span th:if="${h.precisionMetros == null}">-</span>
								</td>
								<td>
									<span class="hora-label"
										th:text="${#temporals.format(h.timestampCaptura, 'HH:mm:ss')}">-</span>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>

		<div th:if="${historial == null || historial.isEmpty()}" class="card">
			<div class="card-body text-center py-5">
				<i class="feather-map-pin" style="font-size: 48px; color: #ccc;"></i>
				<p class="mt-3 text-muted">No hay registros GPS para la fecha seleccionada.</p>
			</div>
		</div>
	</div>

	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	<script th:inline="javascript">
		document.addEventListener('DOMContentLoaded', function() {
			var historial = /*[[${historial}]]*/ [];
			var map = L.map('mapHistorial').setView([-0.1807, -78.4678], 7);

			L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
				attribution: '&copy; OpenStreetMap'
			}).addTo(map);

			// Colores por técnico
			var colores = ['#47267f', '#e8412d', '#2196F3', '#4CAF50', '#FF9800', '#9C27B0', '#00BCD4', '#795548'];
			var tecnicoColorMap = {};
			var colorIdx = 0;

			if (historial && historial.length > 0) {
				var bounds = [];

				// Agrupar por técnico
				var porTecnico = {};
				historial.forEach(function(h) {
					var key = h.usuarioId;
					if (!porTecnico[key]) {
						porTecnico[key] = { nombre: h.nombre, departamento: h.departamento, puntos: [] };
					}
					porTecnico[key].puntos.push(h);

					if (!tecnicoColorMap[key]) {
						tecnicoColorMap[key] = colores[colorIdx % colores.length];
						colorIdx++;
					}
				});

				// Dibujar trayectoria y marcadores por técnico
				Object.keys(porTecnico).forEach(function(userId) {
					var tecnico = porTecnico[userId];
					var color = tecnicoColorMap[userId];
					var coords = [];

					tecnico.puntos.forEach(function(p) {
						var latlng = [p.latitud, p.longitud];
						coords.push(latlng);
						bounds.push(latlng);

						var icon = L.divIcon({
							className: 'custom-marker',
							html: '<div style="background:' + color + ';width:10px;height:10px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>',
							iconSize: [10, 10],
							iconAnchor: [5, 5]
						});

						var hora = '';
						if (p.timestampCaptura) {
							var ts = new Date(p.timestampCaptura);
							hora = ts.toLocaleTimeString('es-EC');
						}

						L.marker(latlng, { icon: icon })
							.addTo(map)
							.bindPopup('<strong>' + tecnico.nombre + '</strong><br>' +
								(tecnico.departamento || 'Sin departamento') + '<br>' +
								'<small>' + hora + '</small>');
					});

					// Línea de trayectoria
					if (coords.length > 1) {
						L.polyline(coords, { color: color, weight: 3, opacity: 0.7, dashArray: '8,6' }).addTo(map);
					}
				});

				if (bounds.length > 0) {
					map.fitBounds(bounds, { padding: [40, 40] });
				}
			}

			// Click en fila de la tabla centra el mapa
			document.querySelectorAll('.tecnico-card').forEach(function(row) {
				row.addEventListener('click', function() {
					var lat = parseFloat(this.dataset.lat);
					var lng = parseFloat(this.dataset.lng);
					if (!isNaN(lat) && !isNaN(lng)) {
						map.setView([lat, lng], 16);
					}
				});
			});
		});
	</script>
</section>
</body>
</html>
