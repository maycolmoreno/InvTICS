<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<meta charset="utf-8">
<title>GPS Historial</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
	#mapHistorial {
		height: 480px;
		border-radius: var(--cui-radius-lg, 12px);
	}
	.tecnico-card {
		cursor: pointer;
		transition: background-color 0.15s;
	}
	.tecnico-card:hover {
		background-color: var(--cui-surface-raised);
	}
	.hora-label {
		color: var(--cui-text-muted);
		font-size: 12px;
	}
</style>
</head>

<body>
<div layout:fragment="contenidopaginas">
<div class="cui-page">
	<div th:replace="~{fragments/shell/page-header :: pageHeader(title='GPS historial', subtitle='Trayectoria y registros de ubicacion de tecnicos por fecha.')}"></div>

	<div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>

	<!-- Filtro por fecha -->
	<div class="cui-card mb-3">
		<form th:action="@{/ubicaciones-tecnicos/historial}" method="get" class="d-flex align-items-center gap-2 flex-wrap">
			<label for="fecha" class="form-label mb-0 fw-semibold">Fecha:</label>
			<input type="date" id="fecha" name="fecha" class="form-control" style="max-width: 220px;"
				th:value="${fechaSeleccionada}" required />
			<button type="submit" class="cui-btn cui-btn-primary">
				<i class="feather-search" aria-hidden="true"></i>
				<span>Buscar</span>
			</button>
			<a th:href="@{/ubicaciones-tecnicos/tiempo-real}" class="cui-btn cui-btn-secondary ms-auto">
				<i class="feather-radio" aria-hidden="true"></i>
				<span>Ir a tiempo real</span>
			</a>
		</form>
	</div>

	<!-- Mapa -->
	<div class="cui-card mb-3 p-0">
		<div id="mapHistorial"></div>
	</div>

	<!-- Tabla de registros -->
	<section class="cui-card" th:if="${historial != null && !historial.isEmpty()}">
		<div class="d-flex align-items-center gap-2 mb-3">
			<h2 class="mb-0" style="font-size:16px">
				Registros GPS del <span th:text="${#temporals.format(fechaSeleccionada, 'dd/MM/yyyy')}"></span>
			</h2>
			<span class="cui-badge cui-badge-info" th:text="${historial.size()}">0</span>
		</div>
		<div class="table-responsive">
			<table class="table cui-table mb-0" id="tablaHistorial">
				<thead>
					<tr>
						<th>Técnico</th>
						<th>Departamento</th>
						<th>Coordenadas</th>
						<th>Precisión</th>
						<th>Hora de captura</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="h : ${historial}" class="tecnico-card"
						th:data-lat="${h.latitud}" th:data-lng="${h.longitud}"
						th:data-nombre="${h.nombre}"
						th:data-hora="${#temporals.format(h.timestampCaptura, 'HH:mm:ss')}">
						<td>
							<span class="cui-row-title" th:text="${h.nombre}">Nombre</span>
						</td>
						<td th:text="${h.departamento != null ? h.departamento : 'Sin departamento'}">Depto</td>
						<td>
							<small>
								<span th:text="${#numbers.formatDecimal(h.latitud, 1, 5)}">0.00000</span>,
								<span th:text="${#numbers.formatDecimal(h.longitud, 1, 5)}">0.00000</span>
							</small>
						</td>
						<td>
							<span th:if="${h.precisionMetros != null}"
								th:text="'±' + ${#numbers.formatDecimal(h.precisionMetros, 1, 0)} + 'm'">-</span>
							<span th:if="${h.precisionMetros == null}">-</span>
						</td>
						<td>
							<span class="hora-label"
								th:text="${#temporals.format(h.timestampCaptura, 'HH:mm:ss')}">-</span>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</section>

	<div th:if="${historial == null || historial.isEmpty()}">
		<div th:replace="~{fragments/components/empty-state :: empty(icon='feather-map-pin', title='Sin registros', message='No hay registros GPS para la fecha seleccionada.')}"></div>
	</div>
</div>
</div>

<th:block layout:fragment="scripts">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:inline="javascript">
	document.addEventListener('DOMContentLoaded', function() {
		var historial = /*[[${historial}]]*/ [];
		var map = L.map('mapHistorial').setView([-0.1807, -78.4678], 7);

		L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
			attribution: '&copy; OpenStreetMap'
		}).addTo(map);

		// Colores por técnico
		var colores = ['#47267f', '#e8412d', '#2196F3', '#4CAF50', '#FF9800', '#9C27B0', '#00BCD4', '#795548'];
		var tecnicoColorMap = {};
		var colorIdx = 0;

		if (historial && historial.length > 0) {
			var bounds = [];

			// Agrupar por técnico
			var porTecnico = {};
			historial.forEach(function(h) {
				var key = h.usuarioId;
				if (!porTecnico[key]) {
					porTecnico[key] = { nombre: h.nombre, departamento: h.departamento, puntos: [] };
				}
				porTecnico[key].puntos.push(h);

				if (!tecnicoColorMap[key]) {
					tecnicoColorMap[key] = colores[colorIdx % colores.length];
					colorIdx++;
				}
			});

			// Dibujar trayectoria y marcadores por técnico
			Object.keys(porTecnico).forEach(function(userId) {
				var tecnico = porTecnico[userId];
				var color = tecnicoColorMap[userId];
				var coords = [];

				tecnico.puntos.forEach(function(p) {
					var latlng = [p.latitud, p.longitud];
					coords.push(latlng);
					bounds.push(latlng);

					var icon = L.divIcon({
						className: 'custom-marker',
						html: '<div style="background:' + color + ';width:10px;height:10px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>',
						iconSize: [10, 10],
						iconAnchor: [5, 5]
					});

					var hora = '';
					if (p.timestampCaptura) {
						var ts = new Date(p.timestampCaptura);
						hora = ts.toLocaleTimeString('es-EC');
					}

					L.marker(latlng, { icon: icon })
						.addTo(map)
						.bindPopup('<strong>' + tecnico.nombre + '</strong><br>' +
							(tecnico.departamento || 'Sin departamento') + '<br>' +
							'<small>' + hora + '</small>');
				});

				// Línea de trayectoria
				if (coords.length > 1) {
					L.polyline(coords, { color: color, weight: 3, opacity: 0.7, dashArray: '8,6' }).addTo(map);
				}
			});

			if (bounds.length > 0) {
				map.fitBounds(bounds, { padding: [40, 40] });
			}
		}

		// Click en fila de la tabla centra el mapa
		document.querySelectorAll('.tecnico-card').forEach(function(row) {
			row.addEventListener('click', function() {
				var lat = parseFloat(this.dataset.lat);
				var lng = parseFloat(this.dataset.lng);
				if (!isNaN(lat) && !isNaN(lng)) {
					map.setView([lat, lng], 16);
				}
			});
		});
	});
</script>
</th:block>
</body>
</html>
