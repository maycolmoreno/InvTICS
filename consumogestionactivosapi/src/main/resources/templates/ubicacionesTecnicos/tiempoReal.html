<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<meta charset="utf-8">
<title>Ubicaciones en tiempo real</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
	#mapTiempoReal {
		height: 480px;
		border-radius: var(--cui-radius-lg, 12px);
	}
	.tecnico-card {
		cursor: pointer;
		transition: background-color 0.15s;
	}
	.tecnico-card:hover {
		background-color: var(--cui-surface-raised);
	}
	.status-dot {
		display: inline-block;
		width: 10px;
		height: 10px;
		border-radius: 50%;
	}
	.status-dot.active { background-color: var(--cui-success, #28a745); }
	.status-dot.warning { background-color: var(--cui-warning, #ffc107); }
	.status-dot.inactive { background-color: var(--cui-text-muted, #6c757d); }
	.tiempo-label {
		color: var(--cui-text-muted);
		font-size: 12px;
	}
</style>
</head>

<body>
<div layout:fragment="contenidopaginas">
<div class="cui-page">
	<section class="cui-admin-header d-flex align-items-start justify-content-between gap-3 flex-wrap">
		<div>
			<p class="cui-eyebrow">Ubicaciones técnicos</p>
			<h1>Ubicaciones en tiempo real</h1>
			<p>Posicion mas reciente de tecnicos en campo, actualizada en las ultimas 2 horas.</p>
		</div>
		<a th:href="@{/ubicaciones-tecnicos/tiempo-real}" class="cui-btn cui-btn-secondary cui-btn-sm">
			<i class="feather-refresh-cw" aria-hidden="true"></i>
			<span>Actualizar</span>
		</a>
	</section>

	<div class="alert alert-danger cui-alert" th:if="${error}" th:text="${error}"></div>

	<!-- Mapa -->
	<div class="cui-card mb-3 p-0">
		<div id="mapTiempoReal"></div>
	</div>

	<!-- Lista de técnicos -->
	<section class="cui-card" th:if="${ubicaciones != null && !ubicaciones.isEmpty()}">
		<div class="d-flex align-items-center gap-2 mb-3">
			<h2 class="mb-0" style="font-size:16px">Técnicos activos</h2>
			<span class="cui-badge cui-badge-info" th:text="${ubicaciones.size()}">0</span>
		</div>
		<div class="table-responsive">
			<table class="table cui-table mb-0">
				<thead>
					<tr>
						<th>Estado</th>
						<th>Técnico</th>
						<th>Departamento</th>
						<th>Coordenadas</th>
						<th>Precisión</th>
						<th>Última vez</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="u : ${ubicaciones}" class="tecnico-card"
						th:data-lat="${u.latitud}" th:data-lng="${u.longitud}"
						th:data-nombre="${u.nombre}">
						<td>
							<span class="status-dot"
								th:classappend="${u.minutosAtras < 5 ? 'active' : (u.minutosAtras < 30 ? 'warning' : 'inactive')}">
							</span>
						</td>
						<td>
							<span class="cui-row-title" th:text="${u.nombre}">Nombre</span>
						</td>
						<td th:text="${u.departamento != null ? u.departamento : 'Sin departamento'}">Depto</td>
						<td>
							<small>
								<span th:text="${#numbers.formatDecimal(u.latitud, 1, 5)}">0.00000</span>,
								<span th:text="${#numbers.formatDecimal(u.longitud, 1, 5)}">0.00000</span>
							</small>
						</td>
						<td>
							<span th:if="${u.precisionMetros != null}"
								th:text="'±' + ${#numbers.formatDecimal(u.precisionMetros, 1, 0)} + 'm'">-</span>
							<span th:if="${u.precisionMetros == null}">-</span>
						</td>
						<td>
							<span class="tiempo-label"
								th:text="${u.minutosAtras < 1 ? 'Ahora' : 'Hace ' + u.minutosAtras + ' min'}">-</span>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</section>

	<div th:if="${ubicaciones == null || ubicaciones.isEmpty()}">
		<div th:replace="~{fragments/components/empty-state :: empty(icon='feather-map-pin', title='Sin tecnicos activos', message='No hay tecnicos con ubicacion activa en las ultimas 2 horas.')}"></div>
	</div>
</div>
</div>

<th:block layout:fragment="scripts">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script th:inline="javascript">
	document.addEventListener('DOMContentLoaded', function() {
		var ubicaciones = /*[[${ubicaciones}]]*/ [];
		var map = L.map('mapTiempoReal').setView([-0.1807, -78.4678], 7);

		L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
			attribution: '&copy; OpenStreetMap'
		}).addTo(map);

		if (ubicaciones && ubicaciones.length > 0) {
			var bounds = [];
			ubicaciones.forEach(function(u) {
				var color = u.minutosAtras < 5 ? 'green' : (u.minutosAtras < 30 ? 'orange' : 'gray');
				var icon = L.divIcon({
					className: 'custom-marker',
					html: '<div style="background:' + color + ';width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>',
					iconSize: [14, 14],
					iconAnchor: [7, 7]
				});
				var tiempoTexto = u.minutosAtras < 1 ? 'Ahora' : 'Hace ' + u.minutosAtras + ' min';
				L.marker([u.latitud, u.longitud], { icon: icon })
					.addTo(map)
					.bindPopup('<strong>' + u.nombre + '</strong><br>' +
						(u.departamento || 'Sin departamento') + '<br>' +
						'<small>' + tiempoTexto + '</small>');
				bounds.push([u.latitud, u.longitud]);
			});
			if (bounds.length > 0) {
				map.fitBounds(bounds, { padding: [40, 40] });
			}
		}

		// Click en fila de la tabla centra el mapa
		document.querySelectorAll('.tecnico-card').forEach(function(row) {
			row.addEventListener('click', function() {
				var lat = parseFloat(this.dataset.lat);
				var lng = parseFloat(this.dataset.lng);
				if (!isNaN(lat) && !isNaN(lng)) {
					map.setView([lat, lng], 16);
				}
			});
		});
	});
</script>
</th:block>
</body>
</html>
