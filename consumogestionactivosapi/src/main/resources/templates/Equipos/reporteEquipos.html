<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Reporte de equipos</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Reporte de activos', subtitle='Consulta exportable del inventario tecnologico registrado.')}"></div>

        <div class="cui-command-bar">
            <a th:href="@{/reportes}" class="cui-btn cui-btn-secondary">
                <i class="feather-arrow-left" aria-hidden="true"></i>
                <span>Reportes</span>
            </a>
            <a th:href="@{/equipos/reporte-equipo/excel}" class="cui-btn cui-btn-primary">
                <i class="feather-download" aria-hidden="true"></i>
                <span>Descargar Excel</span>
            </a>
        </div>

        <section class="cui-data-grid" id="assetReportGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Exportaciones</p>
                    <h2>Inventario de activos</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>
            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar por codigo, modelo, serial, marca o categoria...', exportHref=@{/equipos/reporte-equipo/excel})}"></div>
            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Activo</th>
                            <th>Hardware</th>
                            <th>MAC</th>
                            <th>Compra</th>
                            <th>Estado tecnico</th>
                            <th>Marca / Categoria</th>
                            <th>Estado</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${listarequipos == null or #lists.isEmpty(listarequipos)}">
                            <td colspan="8">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-monitor', title='Sin equipos', message='No hay equipos disponibles para el reporte.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="equipo : ${listarequipos}"
                            data-cui-grid-row
                            th:with="marca=${equipo.fkMarca != null ? equipo.fkMarca.nombre : '-'},
                                     categoria=${equipo.fkCategoria != null ? equipo.fkCategoria.nombre : '-'},
                                     busqueda=${(equipo.codigoSap ?: '') + ' ' + (equipo.modelo ?: '') + ' ' + (equipo.serial ?: '') + ' ' + marca + ' ' + categoria + ' ' + (equipo.estadoEquipo ?: '')}"
                            th:attr="data-search=${#strings.toLowerCase(busqueda)}">
                            <td th:text="${equipo.idEquipo}">1</td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${equipo.codigoSap ?: '-'}">Codigo</span>
                                    <span class="cui-row-subtitle" th:text="${equipo.serial ?: '-'}">Serial</span>
                                </div>
                            </td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${equipo.modelo ?: '-'}">Modelo</span>
                                    <span class="cui-row-subtitle" th:text="${(equipo.procesador ?: '-') + ' / RAM ' + (equipo.memoriaRamGb ?: '-') + 'GB / ' + (equipo.capacidadAlmacenamientoGb ?: '-') + 'GB'}">Hardware</span>
                                </div>
                            </td>
                            <td th:text="${equipo.mac ?: '-'}">MAC</td>
                            <td>
                                <div class="cui-row-stack">
                                    <span th:text="${equipo.fechaCompra ?: '-'}">Fecha</span>
                                    <span class="cui-row-subtitle" th:text="${equipo.precioCompra ?: '-'}">Precio</span>
                                </div>
                            </td>
                            <td th:text="${equipo.estadoEquipo ?: '-'}">Estado tecnico</td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${marca}">Marca</span>
                                    <span class="cui-row-subtitle" th:text="${categoria}">Categoria</span>
                                </div>
                            </td>
                            <td>
                                <span class="cui-badge" th:classappend="${equipo.estado} ? ' cui-badge-asignado' : ' cui-badge-dado-de-baja'" th:text="${equipo.estado ? 'Activo' : 'Inactivo'}">Estado</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay equipos que coincidan con la busqueda visual.')}"></div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
