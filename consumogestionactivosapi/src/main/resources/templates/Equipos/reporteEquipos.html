<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<title>Equipos</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">


		<div class="page-header">
			<div class="page-header-left d-flex align-items-center">
				<div class="page-header-title">
					<h5 class="m-b-10">Reporte Equipos</h5>
				</div>
				<ul class="breadcrumb">
					<li class="breadcrumb-item"><a
						th:href="@{/equipos/reporte-equipo}">Inicio</a></li>
					<li class="breadcrumb-item">Equipos</li>
				</ul>
			</div>

			<div class="page-header-right ms-auto">
				<div class="page-header-right-items">
					<div
						class="d-flex align-items-center gap-2 page-header-right-items-wrapper">

						<a class="btn btn-success d-flex align-items-center gap-2"
							th:href="@{/equipos/reporte-equipo/excel}">
							<i class="bi bi-filetype-xlsx"></i> <span>Descargar Excel</span>
						</a>

					</div>
				</div>
			</div>
		</div>

		<!-- TABLE -->
		<div class="main-content">
			<div class="row">
				<div class="col-lg-12">
					<div class="card stretch stretch-full">

						<div class="card-body p-0">

							<div class="table-responsive">

								<table class="table table-hover" id="proposalList">
									<thead>
										<tr>
											<th>ID</th>
											<th>Cod. Interno</th>
											<th>MODELO</th>
											<th>SERIAL</th>
											<th>PROCESADOR</th>
											<th>RAM (GB)</th>
											<th>ALMACENAMIENTO (GB)</th>

											<th>LIC. WINDOWS</th>

											<th>MAC</th>
											<th>FECHA COMPRA</th>
											<th>PRECIO COMPRA</th>

											<th>ESTADO EQUIPO</th>
											<th>OBSERVACIÓN</th>

											<th>MARCA</th>
											<th>CATEGORÍA</th>

											<th>ESTADO</th>

										</tr>
									</thead>

									<tbody>
										<tr th:each="equipo : ${listarequipos}" class="single-item">
											<td th:text="${equipo.idEquipo}"></td>

											<td th:text="${equipo.codigoSap} ?: '-'"></td>
											<td th:text="${equipo.modelo} ?: '-'"></td>
											<td th:text="${equipo.serial} ?: '-'"></td>
											<td th:text="${equipo.procesador} ?: '-'"></td>
											<td th:text="${equipo.memoriaRamGb} ?: '-'"></td>
											<td th:text="${equipo.capacidadAlmacenamientoGb} ?: '-'"></td>
											<td th:text="${equipo.sistemaOperativo} ?: '-'"></td>

											<td
												th:text="${equipo.licenciaWindowsActivada != null && equipo.licenciaWindowsActivada} ? 'Sí' : 'No'"></td>

											<td th:text="${equipo.mac} ?: '-'"></td>
											<td th:text="${equipo.fechaCompra} ?: '-'"></td>
											<td th:text="${equipo.precioCompra} ?: '-'"></td>

											<td th:text="${equipo.estadoEquipo} ?: '-'"></td>
											<td th:text="${equipo.observacionEquipo} ?: '-'"></td>

											<!-- ✅ NOMBRES (no IDs) -->
										
											<td
												th:text="${equipo.fkMarca != null ? equipo.fkMarca.nombre : '-'}"></td>
											<td
												th:text="${equipo.fkCategoria != null ? equipo.fkCategoria.nombre : '-'}"></td>
										<td>
												<div th:if="${equipo.estado}"
													class="badge bg-soft-success text-success">Activo</div>
												<div th:unless="${equipo.estado}"
													class="badge bg-soft-danger text-danger">Inactivo</div>
											</td>
									</tr>
									</tbody>

								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
