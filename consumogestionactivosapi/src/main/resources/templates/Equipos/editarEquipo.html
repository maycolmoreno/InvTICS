<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<meta charset="utf-8">
<title>Editar Equipo</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">
		<div class="page-shell">
			<div class="view-heading">
				<div>
					<div class="eyebrow">Actualizacion de activo</div>
					<h1 class="view-title">Editar Equipo</h1>
				</div>
				<div class="d-flex flex-wrap gap-2">
					<a th:href="@{/equipos}" class="btn btn-outline-secondary px-4 py-3">Atras</a>
					<a href="javascript:void(0);" class="btn btn-primary px-4 py-3" onclick="document.getElementById('frmEquipo').submit();">
						<i class="feather-save me-2"></i>Guardar
					</a>
				</div>
			</div>

			<form id="frmEquipo" th:action="@{/equipos}" th:object="${equipo}" method="post" class="form-shell">
				<input type="hidden" th:field="*{idEquipo}">

				<div class="surface-card page-panel">
					<div class="content-card-header">
						<div>
							<h2 class="content-card-title">Informacion general</h2>
						</div>
					</div>
					<div class="form-grid">
						<div class="span-4 field-group">
							<label class="field-label">Codigo Activo Fijo</label>
							<input type="text" class="form-control" th:field="*{codigoSap}" maxlength="16" placeholder="A_EC_00000000919" pattern="[A-Z]_EC_[0-9]{11}" title="Ingrese el Codigo Activo Fijo con formato A_EC_00000000919" style="text-transform: uppercase;">
							<div class="text-danger small" th:if="${errorCodigo}" th:text="${errorCodigo}"></div>
						</div>
						<div class="span-4 field-group">
							<label class="field-label">Tipo de Equipo</label>
							<input type="text" class="form-control" th:field="*{tipoEquipo}" maxlength="100">
						</div>
						<div class="span-4 field-group">
							<label class="field-label">Modelo</label>
							<input type="text" class="form-control" th:field="*{modelo}" maxlength="100">
						</div>
						<div class="span-4 field-group">
							<label class="field-label">Serial</label>
							<input type="text" class="form-control" th:field="*{serial}" maxlength="100">
							<div class="text-danger small" th:if="${errorSerial}" th:text="${errorSerial}"></div>
						</div>
						<div class="span-4 field-group">
							<label class="field-label">Sistema Operativo</label>
							<input type="text" class="form-control" th:field="*{sistemaOperativo}" maxlength="100">
						</div>
						<div class="span-4 field-group">
							<label class="field-label">Estado del Equipo</label>
							<select class="form-select" th:field="*{estadoEquipo}">
								<option value="OPERATIVO">OPERATIVO</option>
								<option value="MANTENIMIENTO">MANTENIMIENTO</option>
								<option value="BAJA">BAJA</option>
							</select>
						</div>
						<div class="span-4 field-group">
							<label class="field-label">Marca</label>
							<select class="form-select" th:field="*{fkMarca.idMarca}">
								<option value="0">Seleccione una marca</option>
								<option th:each="m : ${listamarcas}" th:value="${m.idMarca}" th:text="${m.nombre}"></option>
							</select>
						</div>
						<div class="span-4 field-group">
							<label class="field-label">Categoria</label>
							<select class="form-select" th:field="*{fkCategoria.idCategoria}">
								<option value="0">Seleccione una categoria</option>
								<option th:each="c : ${listacategorias}" th:value="${c.idCategoria}" th:text="${c.nombre}"></option>
							</select>
						</div>
						<div class="span-4 field-group">
							<label class="field-label">Activo</label>
							<select class="form-select" th:field="*{estado}">
								<option th:value="true">Si</option>
								<option th:value="false">No</option>
							</select>
						</div>
						<div class="span-12 field-group">
							<label class="field-label">Observacion</label>
							<textarea class="form-control" rows="4" th:field="*{observacionEquipo}"></textarea>
						</div>
					</div>
				</div>

				<div class="surface-card page-panel">
					<div class="content-card-header">
						<div>
							<h2 class="content-card-title">Hardware, red y licencias</h2>
						</div>
					</div>
					<div class="form-grid">
						<div class="span-4 field-group">
							<label class="field-label">Procesador</label>
							<input type="text" class="form-control" th:field="*{procesador}" maxlength="100">
						</div>
						<div class="span-4 field-group">
							<label class="field-label">RAM (GB)</label>
							<input type="number" class="form-control" th:field="*{memoriaRamGb}">
						</div>
						<div class="span-4 field-group">
							<label class="field-label">Almacenamiento (GB)</label>
							<input type="number" class="form-control" th:field="*{capacidadAlmacenamientoGb}">
						</div>
						<div class="span-6 field-group">
							<label class="field-label">IP</label>
							<input type="text" class="form-control" th:field="*{ip}">
							<div class="text-danger small" th:if="${errorIp}" th:text="${errorIp}"></div>
						</div>
						<div class="span-6 field-group">
							<label class="field-label">MAC</label>
							<input type="text" class="form-control" th:field="*{mac}">
							<div class="text-danger small" th:if="${errorMac}" th:text="${errorMac}"></div>
						</div>
						<div class="span-3 field-group">
							<label class="field-label">Windows Activado</label>
							<select class="form-select" th:field="*{licenciaWindowsActivada}">
								<option th:value="${null}">-- Seleccione --</option>
								<option th:value="true">Si</option>
								<option th:value="false">No</option>
							</select>
						</div>
						<div class="span-3 field-group">
							<label class="field-label">Activo Fijo</label>
							<select class="form-select" th:field="*{etiquetaActivoFijo}">
								<option th:value="${null}">-- Seleccione --</option>
								<option th:value="true">Si</option>
								<option th:value="false">No</option>
							</select>
						</div>
						<div class="span-3 field-group">
							<label class="field-label">Unido a Dominio</label>
							<select class="form-select" th:field="*{unionDominio}">
								<option th:value="${null}">-- Seleccione --</option>
								<option th:value="true">Si</option>
								<option th:value="false">No</option>
							</select>
						</div>
						<div class="span-3 field-group">
							<label class="field-label">Fecha de Compra</label>
							<input type="date" class="form-control" name="fechaCompra" th:value="${#temporals.format(equipo.fechaCompra, 'yyyy-MM-dd')}">
						</div>
						<div class="span-6 field-group">
							<label class="field-label">Tipo Licencia Office</label>
							<input type="text" class="form-control" th:field="*{tipoLicenciaOffice}" maxlength="50">
						</div>
						<div class="span-6 field-group">
							<label class="field-label">Version Office</label>
							<input type="text" class="form-control" th:field="*{versionOffice}" maxlength="150">
						</div>
						<div class="span-4 field-group">
							<label class="field-label">Precio de Compra</label>
							<input type="number" step="0.01" class="form-control" th:field="*{precioCompra}">
						</div>
					</div>
				</div>
			</form>
		</div>
	</div>
</body>
</html>
