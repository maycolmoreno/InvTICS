<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Equipos</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Activos TI', subtitle='Inventario empresarial de equipos con acceso directo al expediente del activo.')}"></div>

        <div class="cui-command-bar">
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <a th:href="@{/equipos/reporte-equipo}" class="cui-btn cui-btn-secondary">
                    <i class="feather-download" aria-hidden="true"></i>
                    <span>Exportar</span>
                </a>
                <a th:href="@{/importar}" class="cui-btn cui-btn-secondary">
                    <i class="feather-upload" aria-hidden="true"></i>
                    <span>Importar</span>
                </a>
            </div>
            <a th:href="@{/equipos/nuevo-equipo}" class="cui-btn cui-btn-primary">
                <i class="feather-plus" aria-hidden="true"></i>
                <span>Nuevo equipo</span>
            </a>
        </div>

        <section class="cui-kpi-grid">
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Total equipos', value=${totalElementos != null ? totalElementos : #lists.size(listarequipos)}, meta='Inventario registrado', icon='feather-monitor', tone='primary')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Activos visibles', value=${#lists.size(listarequipos.?[estado == true])}, meta='Pagina actual', icon='feather-check-circle', tone='success')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Con novedad', value=${#lists.size(listarequipos.?[estadoEquipo != null and (#strings.toLowerCase(estadoEquipo).contains('mantenimiento') or #strings.toLowerCase(estadoEquipo).contains('falla') or #strings.toLowerCase(estadoEquipo).contains('repar'))])}, meta='Mantenimiento o reparacion', icon='feather-alert-triangle', tone='warning')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Inactivos', value=${#lists.size(listarequipos.?[estado == false])}, meta='Fuera de uso operativo', icon='feather-x-circle', tone='danger')}"></div>
        </section>

        <section class="cui-data-grid" id="assetsGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Gestion de activos</p>
                    <h2>Listado de equipos</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>

            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar por codigo, serial, marca, modelo o estado...', exportHref=@{/equipos/reporte-equipo/excel})}"></div>

            <div class="cui-grid-filters">
                <select class="form-select" data-cui-grid-filter data-filter-key="estado" data-cui-filter-persist>
                    <option value="">Todos los estados</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                    <option value="novedad">Con novedad</option>
                </select>
            </div>

            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>Codigo</th>
                            <th>Categoria</th>
                            <th>Marca / Modelo</th>
                            <th>Serial</th>
                            <th>Estado</th>
                            <th>MAC</th>
                            <th>Compra</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${listarequipos == null or #lists.isEmpty(listarequipos)}">
                            <td colspan="8">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-monitor', title='Sin equipos', message='No hay equipos registrados en el inventario.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="equipo : ${listarequipos}"
                            data-cui-grid-row
                            th:with="categoria=${equipo.fkCategoria != null ? equipo.fkCategoria.nombre : 'Equipo'},
                                     marca=${equipo.fkMarca != null ? equipo.fkMarca.nombre : '-'},
                                     estadoTexto=${equipo.estadoEquipo != null and !#strings.isEmpty(equipo.estadoEquipo) ? equipo.estadoEquipo : (equipo.estado ? 'Activo' : 'Inactivo')},
                                     estadoFiltro=${!equipo.estado ? 'inactivo' : ((#strings.contains(#strings.toLowerCase(estadoTexto), 'repar') or #strings.contains(#strings.toLowerCase(estadoTexto), 'mantenimiento') or #strings.contains(#strings.toLowerCase(estadoTexto), 'falla')) ? 'novedad' : 'activo')},
                                     busqueda=${(equipo.codigoSap ?: '') + ' ' + (equipo.serial ?: '') + ' ' + (equipo.modelo ?: '') + ' ' + marca + ' ' + categoria + ' ' + estadoTexto}"
                            th:attr="data-search=${#strings.toLowerCase(busqueda)},data-estado=${estadoFiltro}">
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${equipo.codigoSap != null and !#strings.isEmpty(equipo.codigoSap) ? equipo.codigoSap : 'Sin codigo'}">Codigo</span>
                                    <span class="cui-row-subtitle" th:text="${'ID ' + equipo.idEquipo}">ID</span>
                                </div>
                            </td>
                            <td th:text="${categoria}">Categoria</td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${marca}">Marca</span>
                                    <span class="cui-row-subtitle" th:text="${equipo.modelo != null and !#strings.isEmpty(equipo.modelo) ? equipo.modelo : '-'}">Modelo</span>
                                </div>
                            </td>
                            <td th:text="${equipo.serial != null and !#strings.isEmpty(equipo.serial) ? equipo.serial : '-'}">Serial</td>
                            <td>
                                <span class="cui-badge"
                                      th:classappend="${estadoFiltro == 'inactivo'} ? ' cui-badge-dado-de-baja' : (${estadoFiltro == 'novedad'} ? ' cui-badge-en-reparacion' : ' cui-badge-asignado')"
                                      th:text="${estadoTexto}">Estado</span>
                            </td>
                            <td th:text="${equipo.mac != null and !#strings.isEmpty(equipo.mac) ? equipo.mac : '-'}">MAC</td>
                            <td th:text="${equipo.fechaCompra != null ? #temporals.format(equipo.fechaCompra, 'dd/MM/yyyy') : '-'}">-</td>
                            <td>
                                <div class="cui-action-cell">
                                    <a th:href="@{/activos/equipos/{id}/expediente(id=${equipo.idEquipo})}" class="btn btn-outline-primary btn-sm">
                                        Expediente
                                    </a>
                                    <div class="dropdown cui-action-menu">
                                        <button type="button" class="btn btn-light cui-icon-btn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Mas acciones">
                                            <i class="feather-more-vertical" aria-hidden="true"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-end">
                                            <a class="dropdown-item" th:href="@{/equipos/editar-equipo/{id}(id=${equipo.idEquipo})}">
                                                <i class="feather-edit-2" aria-hidden="true"></i>
                                                Editar
                                            </a>
                                            <a class="dropdown-item" th:href="@{/mantenimiento/nuevo(equipoId=${equipo.idEquipo})}">
                                                <i class="feather-wrench" aria-hidden="true"></i>
                                                Crear mantenimiento
                                            </a>
                                            <button type="button"
                                                    class="dropdown-item text-danger"
                                                    data-bs-toggle="modal"
                                                    data-bs-target="#modalToggleEquipo"
                                                    th:attr="data-id=${equipo.idEquipo},data-estado=${equipo.estado}">
                                                <i th:class="${equipo.estado} ? 'feather-trash-2' : 'feather-check-circle'" aria-hidden="true"></i>
                                                <span th:text="${equipo.estado ? 'Desactivar' : 'Activar'}">Cambiar estado</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay equipos que coincidan con los filtros aplicados.')}"></div>
                </div>
            </div>

            <div th:replace="~{fragments/grids/pagination :: pagination(rutaBase='/equipos')}"></div>
        </section>

        <div class="modal fade" id="modalToggleEquipo" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Confirmar cambio de estado</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body" id="textoModalToggle">Esta seguro?</div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                        <form id="formEstadoEquipo" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="idEquipo" id="idEquipoToggle">
                            <button type="submit" class="btn" id="btnToggle">Confirmar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var modalToggle = document.getElementById("modalToggleEquipo");
            if (!modalToggle) {
                return;
            }

            modalToggle.addEventListener("show.bs.modal", function (event) {
                var button = event.relatedTarget;
                var id = button.getAttribute("data-id");
                var estado = button.getAttribute("data-estado") === "true";
                var form = document.getElementById("formEstadoEquipo");
                var texto = document.getElementById("textoModalToggle");
                var btn = document.getElementById("btnToggle");

                document.getElementById("idEquipoToggle").value = id;

                if (estado) {
                    form.action = "/equipos/eliminar-equipo";
                    texto.textContent = "Esta seguro de desactivar este equipo?";
                    btn.textContent = "Si, desactivar";
                    btn.className = "btn btn-outline-danger";
                } else {
                    form.action = "/equipos/activar-equipo";
                    texto.textContent = "Esta seguro de activar este equipo?";
                    btn.textContent = "Si, activar";
                    btn.className = "btn btn-primary";
                }
            });
        });
    </script>
</th:block>
</body>
</html>
