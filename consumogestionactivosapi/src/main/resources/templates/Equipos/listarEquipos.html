<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Activos TI</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Activos TI', subtitle='Inventario empresarial de equipos con acceso directo al expediente del activo.')}"></div>

        <div class="cui-command-bar">
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <a th:href="@{/importar}" class="cui-btn cui-btn-secondary">
                    <i class="feather-upload" aria-hidden="true"></i>
                    <span>Importar</span>
                </a>
            </div>
            <a th:href="@{/equipos/nuevo-equipo}" class="cui-btn cui-btn-primary">
                <i class="feather-plus" aria-hidden="true"></i>
                <span>Nuevo equipo</span>
            </a>
        </div>

        <section class="cui-data-grid" id="assetsGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Gestion de activos</p>
                    <h2>Listado de equipos</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>

            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar por codigo, serial, marca, modelo o estado...', exportHref=@{/equipos/reporte-equipo/excel})}"></div>

            <div class="cui-grid-filters">
                <select class="form-select" data-cui-grid-filter data-filter-key="estado" data-cui-filter-persist>
                    <option value="">Todos los estados</option>
                    <option value="en_bodega">En bodega</option>
                    <option value="asignado">Asignado</option>
                    <option value="en_reparacion">En reparación</option>
                    <option value="en_transito">En tránsito</option>
                    <option value="dado_de_baja">Dado de baja</option>
                </select>
            </div>

            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>Código</th>
                            <th>Categoría</th>
                            <th>Marca / Modelo</th>
                            <th>Serial</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${listarequipos == null or #lists.isEmpty(listarequipos)}">
                            <td colspan="6">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-monitor', title='Sin equipos', message='No hay equipos registrados en el inventario.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="equipo : ${listarequipos}"
                            data-cui-grid-row
                            th:with="categoria=${equipo.fkCategoria != null ? equipo.fkCategoria.nombre : 'Equipo'},
                                     marca=${equipo.fkMarca != null ? equipo.fkMarca.nombre : '-'},
                                     estadoEquipo=${equipo.estadoEquipo != null and !#strings.isEmpty(equipo.estadoEquipo) ? equipo.estadoEquipo : (equipo.estado ? 'EN_BODEGA' : 'DADO_DE_BAJA')},
                                     estadoFiltro=${#strings.toLowerCase(estadoEquipo)},
                                     estadoLabel=${estadoFiltro == 'asignado' ? 'Asignado' : (estadoFiltro == 'en_bodega' ? 'En bodega' : (estadoFiltro == 'en_reparacion' ? 'En reparación' : (estadoFiltro == 'en_transito' ? 'En tránsito' : (estadoFiltro == 'dado_de_baja' ? 'Dado de baja' : estadoEquipo))))},
                                     busqueda=${(equipo.codigoSap ?: '') + ' ' + (equipo.serial ?: '') + ' ' + (equipo.modelo ?: '') + ' ' + marca + ' ' + categoria + ' ' + estadoEquipo}"
                            th:attr="data-search=${#strings.toLowerCase(busqueda)},data-estado=${estadoFiltro},data-equipo-id=${equipo.idEquipo},data-equipo-label=${(equipo.codigoSap ?: 'Sin codigo') + ' · ' + (equipo.modelo ?: 'Sin modelo')}">
                            <td>
                                <div class="cui-row-stack">
                                    <span class="inv-code" th:text="${equipo.codigoSap != null and !#strings.isEmpty(equipo.codigoSap) ? equipo.codigoSap : 'Sin código'}">Codigo</span>
                                    <span class="cui-row-subtitle" th:text="${'ID ' + equipo.idEquipo}">ID</span>
                                </div>
                            </td>
                            <td th:text="${categoria}">Categoria</td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${marca}">Marca</span>
                                    <span class="cui-row-subtitle" th:text="${equipo.modelo != null and !#strings.isEmpty(equipo.modelo) ? equipo.modelo : '-'}">Modelo</span>
                                </div>
                            </td>
                            <td>
                                <span class="inv-serial" th:text="${equipo.serial != null and !#strings.isEmpty(equipo.serial) ? equipo.serial : '—'}">—</span>
                            </td>
                            <td>
                                <span class="cui-badge"
                                      th:classappend="${estadoFiltro == 'asignado' ? ' cui-badge-asignado' : (estadoFiltro == 'en_bodega' ? ' cui-badge-en-bodega' : (estadoFiltro == 'en_reparacion' ? ' cui-badge-en-reparacion' : (estadoFiltro == 'en_transito' ? ' cui-badge-en-transito' : (estadoFiltro == 'dado_de_baja' ? ' cui-badge-dado-de-baja' : ' cui-badge-muted'))))}"
                                      th:text="${estadoLabel}">Estado</span>
                            </td>
                            <td>
                                <div class="cui-action-cell">
                                    <a th:href="@{/activos/equipos/{id}/expediente(id=${equipo.idEquipo})}" class="cui-btn cui-btn-sm cui-btn-primary">
                                        Expediente
                                    </a>
                                    <button th:if="${equipo.estado}"
                                            type="button"
                                            class="cui-icon-btn"
                                            onclick="equipoAbrirTrasladar(this)"
                                            data-cui-drawer-open="#drawerTrasladarEquipo"
                                            aria-label="Trasladar activo">
                                        <i class="feather-truck" aria-hidden="true"></i>
                                    </button>
                                    <div class="dropdown cui-action-menu">
                                        <button type="button" class="cui-icon-btn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Mas acciones">
                                            <i class="feather-more-vertical" aria-hidden="true"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-end">
                                            <a class="dropdown-item" th:href="@{/equipos/editar-equipo/{id}(id=${equipo.idEquipo})}">
                                                <i class="feather-edit-2" aria-hidden="true"></i>
                                                Editar
                                            </a>
                                            <a class="dropdown-item" th:href="@{/mantenimiento/nuevo(equipoId=${equipo.idEquipo})}">
                                                <i class="feather-wrench" aria-hidden="true"></i>
                                                Crear mantenimiento
                                            </a>
                                            <button type="button"
                                                    class="dropdown-item text-danger"
                                                    data-bs-toggle="modal"
                                                    data-bs-target="#modalToggleEquipo"
                                                    th:attr="data-id=${equipo.idEquipo},data-estado=${equipo.estado}">
                                                <i th:class="${equipo.estado} ? 'feather-trash-2' : 'feather-check-circle'" aria-hidden="true"></i>
                                                <span th:text="${equipo.estado ? 'Desactivar' : 'Activar'}">Cambiar estado</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay equipos que coincidan con los filtros aplicados.')}"></div>
                </div>
            </div>

            <div th:replace="~{fragments/grids/pagination :: pagination(rutaBase='/equipos')}"></div>
        </section>

        <div class="modal fade" id="modalToggleEquipo" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Confirmar cambio de estado</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <div class="modal-body" id="textoModalToggle">¿Esta seguro?</div>
                    <div class="modal-footer">
                        <button type="button" class="cui-btn cui-btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <form id="formEstadoEquipo" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="idEquipo" id="idEquipoToggle">
                            <button type="submit" class="cui-btn" id="btnToggle">Confirmar</button>
                        </form>
                    </div>
                </div>
            </div>
        <!-- Drawer: Trasladar equipo desde listado -->
        <aside class="cui-drawer" id="drawerTrasladarEquipo" aria-hidden="true" aria-label="Trasladar equipo">
            <div class="cui-drawer-header">
                <div>
                    <div class="fw-bold">Trasladar activo</div>
                    <div class="small text-muted">Mover equipo a otra bodega</div>
                </div>
                <button type="button" class="cui-icon-btn" data-cui-drawer-close aria-label="Cerrar panel">
                    <i class="feather-x"></i>
                </button>
            </div>
            <div class="cui-drawer-body">
                <form th:action="@{/inventario/traslados/activos}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="equipoId" id="eq-list-equipo-id">
                    <div class="col-12">
                        <label class="form-label text-muted small">Equipo</label>
                        <div class="form-control bg-light fw-semibold" id="eq-list-equipo-label">—</div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Bodega destino <span class="text-danger">*</span></label>
                        <select class="form-select" name="bodegaDestinoId" required>
                            <option value="">Seleccione bodega destino</option>
                            <option th:each="b : ${bodegas}"
                                    th:value="${b.idBodega}"
                                    th:text="${b.nombre}">Bodega</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observacion</label>
                        <textarea class="form-control" name="observacion" rows="3"></textarea>
                    </div>
                    <div class="col-12 d-flex justify-content-end gap-2">
                        <button type="button" class="cui-btn cui-btn-secondary" data-cui-drawer-close>Cancelar</button>
                        <button class="cui-btn cui-btn-primary" type="submit">
                            <i class="feather-truck" aria-hidden="true"></i>
                            <span>Trasladar</span>
                        </button>
                    </div>
                </form>
            </div>
        </aside>

        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        window.equipoAbrirTrasladar = function (btn) {
            var row = btn.closest('tr');
            var idEl    = document.getElementById('eq-list-equipo-id');
            var labelEl = document.getElementById('eq-list-equipo-label');
            if (idEl)    idEl.value          = row.dataset.equipoId    || '';
            if (labelEl) labelEl.textContent = row.dataset.equipoLabel || '—';
        };

        document.addEventListener("DOMContentLoaded", function () {
            var modalToggle = document.getElementById("modalToggleEquipo");
            if (!modalToggle) return;

            modalToggle.addEventListener("show.bs.modal", function (event) {
                var button = event.relatedTarget;
                var id     = button.getAttribute("data-id");
                var estado = button.getAttribute("data-estado") === "true";
                var form   = document.getElementById("formEstadoEquipo");
                var texto  = document.getElementById("textoModalToggle");
                var btn    = document.getElementById("btnToggle");

                document.getElementById("idEquipoToggle").value = id;

                if (estado) {
                    form.action      = "/equipos/eliminar-equipo";
                    texto.textContent = "¿Esta seguro de desactivar este equipo?";
                    btn.textContent  = "Si, desactivar";
                    btn.className    = "cui-btn cui-btn-danger";
                } else {
                    form.action      = "/equipos/activar-equipo";
                    texto.textContent = "¿Esta seguro de activar este equipo?";
                    btn.textContent  = "Si, activar";
                    btn.className    = "cui-btn cui-btn-primary";
                }
            });
        });
    </script>
</th:block>
</body>
</html>
