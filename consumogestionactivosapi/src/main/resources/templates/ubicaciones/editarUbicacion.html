<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
<meta charset="utf-8">
<title>Editar Ubicacion</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
<div layout:fragment="contenidopaginas">
  <form th:action="@{/ubicaciones}" th:object="${ubicacion}" method="post">
    <div class="page-shell admin-form-shell">
      <section class="operations-strip">
        <div class="operations-copy">
          <div class="eyebrow">Edicion De Ubicacion</div>
          <h1 class="operations-title">Actualizar sede operativa</h1>
        </div>
        <div class="operations-badges">
          <div class="operations-badge"><i class="feather-map"></i><span>Geografia consistente</span></div>
          <div class="operations-badge"><i class="feather-activity"></i><span>Estado operativo</span></div>
        </div>
      </section>

      <section class="admin-form-grid">
        <article class="admin-form-card">
          <h2 class="admin-form-card-title">Ficha de ubicacion</h2>

          <input type="hidden" th:field="*{idUbicacion}">

          <div class="form-grid">
            <div>
              <label class="field-label">Nombre</label>
              <input type="text" class="form-control" placeholder="Ej. Agencia Norte" th:field="*{nombre}" maxlength="100">
              <div class="text-danger small mt-1" th:if="${errorNombre}" th:text="${errorNombre}"></div>
            </div>
            <div>
              <label class="field-label">Agencia</label>
              <input type="text" class="form-control" placeholder="Codigo o alias interno" th:field="*{agencia}" maxlength="100">
              <div class="text-danger small mt-1" th:if="${errorAgencia}" th:text="${errorAgencia}"></div>
            </div>
            <div>
              <label class="field-label">Departamento</label>
              <div class="d-flex gap-2">
                <select id="cbdepartamentos" class="form-select" th:field="*{fkDepartamento.idDepartamento}">
                  <option value="0">Seleccione un departamento</option>
                  <option th:each="dep : ${listadepartamento}" th:value="${dep.idDepartamento}" th:text="${dep.nombre}"></option>
                </select>
                <button type="button" class="btn btn-outline-primary btn-sm" title="Crear departamento" data-bs-toggle="modal" data-bs-target="#modalCrearDepartamento"><i class="feather-plus"></i></button>
              </div>
              <div class="text-danger small mt-1" th:if="${errorDepartamento}" th:text="${errorDepartamento}"></div>
            </div>
            <div>
              <label class="field-label">Provincia</label>
              <input type="text" class="form-control" placeholder="Provincia" th:field="*{provincia}" maxlength="100">
            </div>
            <div>
              <label class="field-label">Ciudad</label>
              <input type="text" class="form-control" placeholder="Ciudad" th:field="*{ciudad}" maxlength="100">
            </div>
            <div>
              <label class="field-label">Parroquia</label>
              <input type="text" class="form-control" placeholder="Parroquia" th:field="*{parroquia}" maxlength="150">
            </div>
            <div>
              <label class="field-label">Direccion</label>
              <input type="text" class="form-control" placeholder="Direccion de referencia" th:field="*{direccion}" maxlength="255">
            </div>
          </div>
        </article>

        <article class="admin-form-card">
          <h2 class="admin-form-card-title">Coordenadas y disponibilidad</h2>

          <div class="form-grid">
            <div>
              <label class="field-label">Latitud</label>
              <input type="text" class="form-control" placeholder="Ej. -0.1807" th:field="*{latitud}" maxlength="50" id="inputLatitud">
            </div>
            <div>
              <label class="field-label">Longitud</label>
              <input type="text" class="form-control" placeholder="Ej. -78.4678" th:field="*{longitud}" maxlength="50" id="inputLongitud">
            </div>
            <div class="span-2">
              <label class="field-label">Enlace de coordenada</label>
              <input type="text" class="form-control" placeholder="URL de Google Maps u otra referencia" th:field="*{linkCoordenada}" maxlength="500">
            </div>
          </div>

          <div id="mapContainer" class="map-panel mt-4"></div>

          <div class="switch-card mt-4">
            <div>
              <div class="fw-semibold">Ubicacion activa</div>
              <div class="switch-card-copy">Si se desactiva, dejara de estar disponible para nuevos registros y flujos operativos.</div>
            </div>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="estadoSwitch" th:field="*{estado}">
              <label class="form-check-label ms-2" for="estadoSwitch">Activa</label>
            </div>
          </div>
        </article>
      </section>

      <div class="action-footer">
        <div class="d-flex gap-2 flex-wrap">
          <a th:href="@{/ubicaciones}" class="btn btn-light px-4 py-3">Volver</a>
          <button type="submit" class="btn btn-primary px-4 py-3">
            <i class="feather-save me-2"></i>Guardar cambios
          </button>
        </div>
      </div>
    </div>
  </form>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Modal Crear Departamento -->
  <div class="modal fade" id="modalCrearDepartamento" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Nuevo Departamento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="modalDepNombre" maxlength="100" /></div>
          <div class="text-danger small" id="modalDepError"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary btn-sm" id="btnCrearDep">Crear</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var latInput = document.getElementById('inputLatitud');
      var lngInput = document.getElementById('inputLongitud');
      var map;
      var marker;

      function initMap(lat, lng) {
        if (!map) {
          map = L.map('mapContainer').setView([lat, lng], 15);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
          }).addTo(map);
          map.on('click', function(e) {
            latInput.value = e.latlng.lat.toFixed(6);
            lngInput.value = e.latlng.lng.toFixed(6);
            updateMarker(e.latlng.lat, e.latlng.lng);
          });
        } else {
          map.setView([lat, lng], 15);
        }
        updateMarker(lat, lng);
        setTimeout(function() { map.invalidateSize(); }, 120);
      }

      function updateMarker(lat, lng) {
        if (marker) {
          map.removeLayer(marker);
        }
        marker = L.marker([lat, lng]).addTo(map);
      }

      function tryShowMap() {
        var lat = parseFloat(latInput.value);
        var lng = parseFloat(lngInput.value);
        if (isNaN(lat) || isNaN(lng)) {
          lat = -0.1807;
          lng = -78.4678;
        }
        initMap(lat, lng);
      }

      latInput.addEventListener('change', tryShowMap);
      lngInput.addEventListener('change', tryShowMap);
      tryShowMap();

      // Modal crear departamento
      document.querySelectorAll('.modal').forEach(function(m) { document.body.appendChild(m); });
      document.getElementById('btnCrearDep').addEventListener('click', function () {
        var n = document.getElementById('modalDepNombre').value.trim();
        if (!n) { document.getElementById('modalDepError').textContent = 'El nombre es obligatorio'; return; }
        var btn = this;
        btn.disabled = true;
        fetch('/api/relaciones/departamentos', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nombre: n }) })
        .then(function (r) {
          if (r.status === 409) return r.json().then(function (d) { throw new Error(d.error || 'Ya existe'); });
          if (!r.ok) return r.json().then(function (d) { throw new Error(d.error || 'Error'); });
          return r.json();
        })
        .then(function (data) {
          var sel = document.getElementById('cbdepartamentos');
          var opt = new Option(data.nombre, data.idDepartamento, true, true);
          sel.appendChild(opt);
          bootstrap.Modal.getInstance(document.getElementById('modalCrearDepartamento')).hide();
          document.getElementById('modalDepNombre').value = '';
          document.getElementById('modalDepError').textContent = '';
        })
        .catch(function (e) { document.getElementById('modalDepError').textContent = e.message; })
        .finally(function () { btn.disabled = false; });
      });
    });
  </script>
</div>
</body>
</html>
