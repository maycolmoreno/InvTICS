<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <meta charset="utf-8">
    <title>Acta de Baja</title>
</head>
<body>
<div layout:fragment="contenidopaginas" class="itam-page">
    <div class="main-content">
        <div class="itam-shell">

            <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

            <div class="itam-hero">
                <div>
                    <p class="itam-eyebrow">Inventario operativo</p>
                    <h1 class="itam-title">Acta de Baja</h1>
                    <p class="itam-subtitle">Documento de trazabilidad del cierre de ciclo de vida del activo.</p>
                </div>
                <div class="itam-actions">
                    <a th:href="@{/custodias/acta-baja/pdf}" class="cui-btn cui-btn-secondary">
                        <i class="feather-download"></i>
                        <span>Descargar PDF</span>
                    </a>
                    <a th:href="${returnUrl}" class="cui-btn">
                        <i class="feather-arrow-left"></i>
                        <span>Volver</span>
                    </a>
                </div>
            </div>

            <section class="itam-panel">
                <div class="itam-panel-head">
                    <h2 class="itam-panel-title">Detalle de baja</h2>
                    <span class="cui-badge cui-badge-danger">BAJA</span>
                </div>
                <div class="itam-panel-body">

                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <p class="itam-item-meta mb-1">Fecha de baja</p>
                            <p class="itam-item-title" th:text="${fechaBaja}">—</p>
                        </div>
                        <div class="col-md-3" th:if="${motivoBaja != null and !#strings.isEmpty(motivoBaja)}">
                            <p class="itam-item-meta mb-1">Motivo</p>
                            <p class="itam-item-title" th:text="${motivoBaja}">—</p>
                        </div>
                        <div class="col-md-6">
                            <p class="itam-item-meta mb-1">Observación</p>
                            <p class="itam-item-title" th:text="${!#strings.isEmpty(observacionBaja) ? observacionBaja : '—'}">—</p>
                        </div>
                    </div>

                    <div th:if="${equiposBaja == null or #lists.isEmpty(equiposBaja)}" class="itam-empty-state">
                        <i class="feather-inbox"></i>
                        <p>Sin equipos registrados en esta baja.</p>
                    </div>

                    <div class="table-responsive" th:unless="${equiposBaja == null or #lists.isEmpty(equiposBaja)}">
                        <table class="table cui-table mb-0">
                            <thead>
                                <tr>
                                    <th>Código CRESIO</th>
                                    <th>Modelo</th>
                                    <th>Serial</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="e : ${equiposBaja}">
                                    <td th:text="${e.codigoCresio ?: e.codigoSap ?: '#' + e.idEquipo}">—</td>
                                    <td th:text="${e.modelo ?: '—'}">—</td>
                                    <td th:text="${e.serial ?: '—'}">—</td>
                                    <td>
                                        <span class="cui-badge cui-badge-danger">BAJA</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </section>

        </div>
    </div>
</div>
</body>
</html>
