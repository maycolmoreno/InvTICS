<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <title>Reporte de custodias</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <div th:replace="~{fragments/shell/page-header :: pageHeader(title='Reporte de custodias', subtitle='Consulta documental de custodias, responsables y activos asociados.')}"></div>

        <div class="cui-command-bar">
            <a th:href="@{/reportes}" class="cui-btn cui-btn-secondary">
                <i class="feather-arrow-left" aria-hidden="true"></i>
                <span>Reportes</span>
            </a>
            <a class="cui-btn cui-btn-primary"
               th:href="@{/custodias/reporte/excel(custodioId=${custodioSeleccionado}, equipoId=${equipoSeleccionado})}">
                <i class="feather-download" aria-hidden="true"></i>
                <span>Descargar Excel</span>
            </a>
        </div>

        <section class="cui-data-grid" id="custodyReportGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Auditoria documental</p>
                    <h2>Custodias</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>

            <form th:action="@{/custodias/reporte}" method="get" class="cui-data-grid-toolbar">
                <div class="cui-search-control">
                    <i class="feather-search" aria-hidden="true"></i>
                    <input type="search" class="form-control" data-cui-grid-search placeholder="Buscar por custodio, cedula, activo o serial..." autocomplete="off">
                </div>
                <div class="cui-toolbar-actions">
                    <select class="form-select" name="custodioId" onchange="this.form.submit()">
                        <option value="" th:selected="${custodioSeleccionado == null || custodioSeleccionado == 0}">Todos los custodios</option>
                        <option th:each="c : ${listaCustodios}" th:value="${c.idCustodio}" th:text="${c.nombre}" th:selected="${custodioSeleccionado != null && custodioSeleccionado == c.idCustodio}"></option>
                    </select>
                    <select class="form-select" name="equipoId" onchange="this.form.submit()">
                        <option value="" th:selected="${equipoSeleccionado == null || equipoSeleccionado == 0}">Todos los equipos</option>
                        <option th:each="e : ${listaEquipos}" th:value="${e.idEquipo}" th:text="${e.codigoSap + ' - ' + e.modelo}" th:selected="${equipoSeleccionado != null && equipoSeleccionado == e.idEquipo}"></option>
                    </select>
                </div>
            </form>

            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>Custodio</th>
                            <th>Periodo</th>
                            <th>Activo</th>
                            <th>Modelo / Serial</th>
                            <th>Observacion</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${listaCustodias == null or #lists.isEmpty(listaCustodias)}">
                            <td colspan="5">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-clipboard', title='Sin custodias', message='No hay registros para los filtros seleccionados.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="c : ${listaCustodias}"
                            data-cui-grid-row
                            th:with="custodioNombre=${c.fkCustodio != null ? c.fkCustodio.nombre : '-'},
                                     cedula=${c.fkCustodio != null ? c.fkCustodio.cedula : '-'},
                                     codigo=${c.fkEquipo != null ? c.fkEquipo.codigoSap : '-'},
                                     tipo=${c.fkEquipo != null and c.fkEquipo.fkCategoria != null ? c.fkEquipo.fkCategoria.nombre : '-'},
                                     modelo=${c.fkEquipo != null ? c.fkEquipo.modelo : '-'},
                                     serial=${c.fkEquipo != null ? c.fkEquipo.serial : '-'},
                                     busqueda=${custodioNombre + ' ' + cedula + ' ' + codigo + ' ' + tipo + ' ' + modelo + ' ' + serial + ' ' + (c.observacion ?: '')}"
                            th:attr="data-search=${#strings.toLowerCase(busqueda)}">
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${custodioNombre}">Custodio</span>
                                    <span class="cui-row-subtitle" th:text="${cedula}">Cedula</span>
                                </div>
                            </td>
                            <td>
                                <span th:text="${c.fechaInicio ?: '-'}">Inicio</span>
                                <span> -> </span>
                                <span th:text="${c.fechaFin ?: 'Vigente'}">Fin</span>
                            </td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${codigo}">Codigo</span>
                                    <span class="cui-row-subtitle" th:text="${tipo}">Tipo</span>
                                </div>
                            </td>
                            <td>
                                <div class="cui-row-stack">
                                    <span class="cui-row-title" th:text="${modelo}">Modelo</span>
                                    <span class="cui-row-subtitle" th:text="${serial}">Serial</span>
                                </div>
                            </td>
                            <td th:text="${c.observacion ?: '-'}">Observacion</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay custodias que coincidan con la busqueda visual.')}"></div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
