<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">
<head>
    <meta charset="utf-8">
    <title>Usuarios</title>
</head>
<body>
<div layout:fragment="contenidopaginas">
    <div class="cui-page">
        <section class="cui-admin-header d-flex align-items-start justify-content-between gap-3 flex-wrap">
            <div>
                <p class="cui-eyebrow">Gobierno de accesos</p>
                <h1>Usuarios</h1>
                <p>Consola empresarial para administrar cuentas, roles y disponibilidad.</p>
            </div>
            <a th:href="@{/usuarios/nuevo-usuario}" class="cui-btn cui-btn-primary">
                <i class="feather-plus-circle" aria-hidden="true"></i>
                <span>Nuevo usuario</span>
            </a>
        </section>

        <section class="cui-kpi-grid">
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Total usuarios', value=${#lists.size(listarusuarios)}, meta='Cuentas registradas', icon='feather-users', tone='primary')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Activos', value=${#lists.size(listarusuarios.?[estado])}, meta='Cuentas habilitadas', icon='feather-user-check', tone='success')}"></div>
            <div th:replace="~{fragments/components/kpi-card :: kpiCard(label='Inactivos', value=${#lists.size(listarusuarios.?[!estado])}, meta='Cuentas deshabilitadas', icon='feather-user-x', tone='danger')}"></div>
        </section>

        <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${errorEliminar}">
            <strong>Error:</strong> <span th:text="${errorEliminar}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>

        <section class="cui-data-grid" id="usersAdminGrid" data-cui-grid>
            <div class="cui-data-grid-header">
                <div>
                    <p class="cui-eyebrow">Administracion</p>
                    <h2>Listado de usuarios</h2>
                </div>
                <div class="cui-data-grid-meta" data-cui-grid-count>0 registros</div>
            </div>
            <div th:replace="~{fragments/components/data-grid-toolbar :: toolbar(searchPlaceholder='Buscar usuario, correo, rol o departamento...', exportHref=null)}"></div>
            <div class="cui-grid-filters">
                <select class="form-select" data-cui-grid-filter data-filter-key="estado" data-cui-filter-persist>
                    <option value="">Todos los estados</option>
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
            <div class="cui-data-grid-body">
                <div class="table-responsive">
                    <table class="table cui-table">
                        <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>Identificacion</th>
                            <th>Rol</th>
                            <th>Departamento</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(listarusuarios)}">
                            <td colspan="6">
                                <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-users', title='Sin usuarios', message='No hay usuarios registrados.')}"></div>
                            </td>
                        </tr>
                        <tr th:each="usuario : ${listarusuarios}"
                            data-cui-grid-row
                            th:with="rol=${usuario.fkRol != null ? usuario.fkRol.nombre : 'Sin rol'},
                                     departamento=${usuario.fkDepartamento != null ? usuario.fkDepartamento.nombre : 'Sin departamento'},
                                     estadoFiltro=${usuario.estado ? 'activo' : 'inactivo'},
                                     busqueda=${(usuario.nombre ?: '') + ' ' + (usuario.correo ?: '') + ' ' + (usuario.cedula ?: '') + ' ' + rol + ' ' + departamento}"
                            th:attr="data-search=${#strings.toLowerCase(busqueda)},data-estado=${estadoFiltro}">
                            <td>
                                <div class="cui-person-cell">
                                    <span class="cui-admin-avatar" th:text="${#strings.toUpperCase(usuario.nombre != null and usuario.nombre.length() >= 2 ? usuario.nombre.substring(0,2) : (usuario.nombre != null ? usuario.nombre : 'US'))}">US</span>
                                    <div class="cui-row-stack">
                                        <span class="cui-row-title" th:text="${usuario.nombre}">Nombre</span>
                                        <span class="cui-row-subtitle" th:text="${usuario.correo}">correo@empresa.com</span>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${usuario.cedula}">0000000000</td>
                            <td><span class="cui-badge cui-badge-info" th:text="${rol}">Rol</span></td>
                            <td th:text="${departamento}">Departamento</td>
                            <td>
                                <span class="cui-badge" th:classappend="${usuario.estado} ? ' cui-badge-asignado' : ' cui-badge-dado-de-baja'" th:text="${usuario.estado ? 'Activo' : 'Inactivo'}">Estado</span>
                            </td>
                            <td>
                                <div class="cui-action-cell">
                                    <a th:href="@{/usuarios/editar-usuario/{id}(id=${usuario.idUsuario})}" class="btn btn-outline-primary btn-sm">Editar</a>
                                    <div class="dropdown cui-action-menu">
                                        <button type="button" class="btn btn-light cui-icon-btn" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Mas acciones">
                                            <i class="feather-more-vertical" aria-hidden="true"></i>
                                        </button>
                                        <div class="dropdown-menu dropdown-menu-end">
                                            <form th:if="${usuario.estado}" th:action="@{/usuarios/eliminar/{id}(id=${usuario.idUsuario})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <button type="submit" class="cui-document-action text-danger" data-cui-confirm="Seguro que deseas desactivar este usuario?">
                                                    <i class="feather-user-minus" aria-hidden="true"></i>
                                                    Desactivar
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div hidden data-cui-empty-state>
                    <div th:replace="~{fragments/components/empty-state :: empty(icon='feather-search', title='Sin resultados', message='No hay usuarios que coincidan con la busqueda visual.')}"></div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
