spring.application.name=consumogestionactivosapi
server.port=8081

api.base-url=${API_BASE_URL:http://localhost:8083/api}

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB
server.tomcat.max-part-count=100

# ===== Configuracion de correo (Gmail SMTP) =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ronald.moreno.cresio@gmail.com}
spring.mail.password=${MAIL_PASSWORD:gfmm ldbi jhxk sopa }
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Nombre que aparece como remitente
app.mail.from-name=CRESIO - Gestion de Activos

# ===== Configuracion JWT =====
# Secret key para firmar JWT - Cambiar en producción (minimo 256 bits)
jwt.secret=${JWT_SECRET:tu-clave-secreta-super-larga-y-segura-minimo-256-bits-por-favor-cambiar}
# Tiempo de expiración del access token en milisegundos (900000ms = 15 minutos)
jwt.expiration.access-token=${JWT_EXPIRATION_ACCESS:900000}
# Tiempo de expiración del refresh token en milisegundos (604800000ms = 7 días)
jwt.expiration.refresh-token=${JWT_EXPIRATION_REFRESH:604800000}
