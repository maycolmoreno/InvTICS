spring.application.name=consumogestionactivosapi
server.port=8081

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

api.base-url=${API_BASE_URL:http://localhost:8084/api}
api.connect-timeout=${API_CONNECT_TIMEOUT:5}
api.read-timeout=${API_READ_TIMEOUT:30}
app.setup.enabled=${SETUP_ENABLED:true}

# ===== Multipart (formularios con archivos) =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB

# ===== Tomcat: limite de partes multipart =====
server.tomcat.max-part-count=200

# ===== Configuracion JWT =====
# Secret key para firmar JWT - Cambiar en producciĂ³n (minimo 256 bits)
jwt.secret=${JWT_SECRET:cGxhY2Vob2xkZXItc2VjcmV0LWtleS1mb3ItZGV2LW9ubHktMzI=}
# Tiempo de expiraciĂ³n del access token en milisegundos (900000ms = 15 minutos)
jwt.expiration.access-token=${JWT_EXPIRATION_ACCESS:900000}
# Tiempo de expiraciĂ³n del refresh token en milisegundos (604800000ms = 7 dĂ­as)
jwt.expiration.refresh-token=${JWT_EXPIRATION_REFRESH:604800000}

# ===== ConfiguraciĂ³n de correo SMTP =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ronald.moreno.cresio@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ttsy tgfi pgrw xmlf}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
