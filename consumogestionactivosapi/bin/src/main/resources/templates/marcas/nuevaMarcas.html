<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">
<head>
<meta charset="utf-8">
<title>Marcas</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">
	
	 

		<form th:action="@{/marcas}" th:object="${nuevamarca}" method="post">

 <div th:if="${error}" class="alert alert-danger mb-3">
        <span th:text="${error}"></span>
    </div>
			<!-- HEADER -->
			<div class="page-header">
				<div class="page-header-left d-flex align-items-center">
					<div class="page-header-title">
						<h5 class="m-b-10">CREAR MARCAS</h5>
					</div>
				</div>
			</div>


			<div class="card">
				<div class="card-body">


					<input type="hidden" th:field="*{idMarca}" />

					<!-- NOMBRE -->
					<div class="mb-4">
						<label class="form-label"> NOMBRE <span
							class="text-danger">*</span>
						</label> <input type="text" class="form-control"
							placeholder="Ingrese el nombre de la marca" th:field="*{nombre}"
							required minlength="2" maxlength="100"
							title="Ingrese el nombre de la marca">
					</div>
				

					<!-- ESTADO -->
					<div class="mb-4">
						<div class="form-check form-switch form-switch-sm ps-5">
							<input class="form-check-input c-pointer" type="checkbox"
								id="estadoSwitch" th:field="*{estado}"> <label
								class="form-check-label fw-500 text-dark c-pointer"
								for="estadoSwitch"> ACTIVO </label>
						</div>
					</div>

					<!-- BOTONES -->
					<div class="d-flex justify-content-end mt-4">
						<div class="d-flex align-items-center gap-2">
							<button type="submit" class="btn btn-primary">
								<i class="feather-save me-2"></i> Guardar
							</button>

							<a th:href="@{/marcas}" class="btn btn-danger"> Cancelar </a>
						</div>
					</div>

				</div>
			</div>

		</form>

	</div>
</body>
</html>
