<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"

      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">


<head>
<title>Marcas</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">

		<div class="page-header">
			<div class="page-header-left d-flex align-items-center">
				<div class="page-header-title">
					<h5 class="m-b-10">Listar Marcas</h5>
				</div>
			</div>
		</div>

		<div class="main-content">
			<div class="row">
				<div class="col-lg-12">
					<div class="card stretch stretch-full">
						<div class="card-body p-0">
							<div class="table-responsive">

								<table class="table table-hover">
									<thead>
										<tr>
											<th scope="col">ID_MARCA</th>
											<th scope="col">Nombre</th>
											<th scope="col">Estado</th>
											<th scope="col" class="text-end">Acciones</th>
										</tr>
									</thead>

									<tbody>
										<tr th:each="marca : ${listarmarcas}">
											<td th:text="${marca.idMarca}"></td>
											<td th:text="${marca.nombre}"></td>

											<td>
												<!-- Activo -->
												<div th:if="${marca.estado}"
													class="badge bg-soft-success text-success">Activo</div> <!-- Inactivo -->
												<div th:unless="${marca.estado}"
													class="badge bg-soft-danger text-danger">Inactivo</div>
											</td>

											<td class="text-end">
												<div class="hstack gap-2 justify-content-end">


													<a
														th:href="@{/marcas/editarMarcas/{id}(id=${marca.idMarca})}"
														class="avatar-text avatar-md text-primary" title="Editar">
														<i class="feather feather-edit"></i>
													</a>

													<form th:if="${marca.estado}"
														th:action="@{/marcas/eliminar/{id}(id=${marca.idMarca})}"
														method="post" style="display: inline;"
														onsubmit="return confirm('¿Seguro que deseas eliminar esta marca?');">

														<button type="submit"
															class="avatar-text avatar-md text-danger bg-transparent"
															title="Eliminar">
															<i class="feather feather-trash-2"></i>
														</button>
													</form>
												</div>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
