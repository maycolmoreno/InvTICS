<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultra.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>

<title>Cargos</title>

</head>

<body>
	<div layout:fragment="contenidopaginas">
		<div class="page-header">
			<div class="page-header-left d-flex align-items-center">
				<div class="page-header-title">
					<h5 class="m-b-10">Cargos</h5>
				</div>
				<ul class="breadcrumb">
					<li class="breadcrumb-item"><a th:href="@{/cargos}">Home</a></li>
					<li class="breadcrumb-item">Cargos</li>
				</ul>
			</div>
			<div class="page-header-right ms-auto">
				<div class="page-header-right-items">
					<div
						class="d-flex align-items-center gap-2 page-header-right-items-wrapper">
						<a th:href="@{/cargos/nuevo-cargo}"
							class="btn btn-primary"> <i class="feather-plus me-2"></i> <span>Nuevo
								Cargo</span>
						</a>
					</div>
				</div>
				<div class="d-md-none d-flex align-items-center">
					<a href="javascript:void(0)" class="page-header-right-open-toggle">
						<i class="feather-align-right fs-20"></i>
					</a>
				</div>
			</div>
		</div>

		<div class="main-content">
			<div class="row">
				<div class="col-lg-12">
					<div class="card stretch stretch-full">
						<div class="card-body p-0">
							<div class="table-responsive">
								<table class="table table-hover" id="proposalList">
									<thead>
										<tr>
											<th>ID</th>
											<th>NOMBRE</th>
											<th>ESTADO</th>
											<th class="text-end">ACCIONES</th>
										</tr>
									</thead>
									<tbody>
										<tr th:each="cargos : ${listacargo}"
											class="single-item">
											<td class="fw-bold" th:text="${cargos.idCargo}"></td>
											<td th:text="${cargos.nombre}"></td>
											<td>
												<!-- Activo -->
												<div th:if="${cargos.estado}"
													class="badge bg-soft-success text-success">Activo</div> <!-- Inactivo -->
												<div th:unless="${cargos.estado}"
													class="badge bg-soft-danger text-danger">Inactivo</div>
											</td>
											<td>
												<div class="hstack gap-2 justify-content-end">
													<a
														th:href="@{/cargos/editar-cargo/{id}(id=${cargos.idCargo})}"
														class="avatar-text avatar-md"> <i
														class="feather feather-edit"></i>
													</a> <a th:if="${cargos.estado}" href="javascript:void(0)" class="avatar-text avatar-md"
														data-bs-toggle="modal"
														data-bs-target="#modalEliminarCargo"
														th:attr="data-id=${cargos.idCargo}"> <i
														class="feather feather-trash-2"></i>
													</a>
												</div>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!-- Modal Eliminar (Lógico) -->
		<div class="modal fade" id="modalEliminarCargo" tabindex="-1"
			aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">

					<div class="modal-header">
						<h5 class="modal-title">Confirmar</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>

					<div class="modal-body">¿Está seguro de realizar este
						proceso? Esta acción desactivará el cargo.</div>

					<div class="modal-footer">
						<!-- NO -->
						<button type="button" class="btn btn-light"
							data-bs-dismiss="modal">No</button>

						<!-- SI (envía POST) -->
						<form th:action="@{/cargos/eliminar-cargo}" method="post">
							<input type="hidden" name="idCargo" id="idCargoEliminar">
							<button type="submit" class="btn btn-danger">Sí,
								desactivar</button>
						</form>
					</div>

				</div>
			</div>
		</div>

		<script>
			// Cuando se abre el modal, toma el id del botón que lo abrió y lo pone en el hidden
			const modalEliminar = document
					.getElementById('modalEliminarCargo');
			modalEliminar.addEventListener('show.bs.modal', function(event) {
				const button = event.relatedTarget; // el <a> que disparó el modal
				const id = button.getAttribute('data-id');
				document.getElementById('idCargoEliminar').value = id;
			});
		</script>

		<script>
			document.addEventListener("DOMContentLoaded",
					function() {
						const modal = document
								.getElementById("modalEliminarCargo");
						if (modal && modal.parentElement !== document.body) {
							document.body.appendChild(modal); // ✅ lo saca del contenedor del layout
						}
					});
		</script>

	</div>

</body>

</html>
