<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantilla/plantillaui}">


<head>
    <meta charset="utf-8">
    <title>Proveedores</title>
</head>

<body>

<div layout:fragment="contenidopaginas">

 <form th:action="@{/proveedores/actualizar/{id}(id=${nuevoproveedor.idProveedor})}"
      th:object="${nuevoproveedor}" method="post">
 
  <div th:if="${error}" class="alert alert-danger mb-3">
        <span th:text="${error}"></span>
    </div>

        <div class="page-header">
            <div class="page-header-left d-flex align-items-center">
                <div class="page-header-title">
                    <h5 class="m-b-10">EDITAR PROVEEDOR</h5>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="card stretch stretch-full">
                <div class="card-body">

                    <!-- ID oculto -->
                    <input type="hidden" th:field="*{idProveedor}" />

                    <!-- Error opcional -->
                    <div class="alert alert-danger" role="alert"
                         th:if="${errorProveedor}" th:text="${errorProveedor}"></div>

                    <!-- RUC -->
                    <div class="mb-4">
                        <label class="form-label">RUC</label>
                        <input type="text" class="form-control"
                               th:field="*{ruc}"
                               placeholder="Ingrese el RUC">
                    </div>

                    <!-- Nombre -->
                    <div class="mb-4">
                        <label class="form-label">NOMBRE <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               th:field="*{nombre}" required
                               placeholder="Ingrese el nombre del proveedor">
                    </div>

                    <!-- Dirección -->
                    <div class="mb-4">
                        <label class="form-label">DIRECCIÓN <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               th:field="*{direccion}" required
                               placeholder="Ingrese la dirección">
                    </div>

                    <!-- Teléfono -->
                    <div class="mb-4">
                        <label class="form-label">TELÉFONO <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               th:field="*{telefono}" required
                               placeholder="Ingrese el teléfono">
                    </div>

                    <!-- Correo -->
                    <div class="mb-4">
                        <label class="form-label">CORREO <span class="text-danger">*</span></label>
                        <input type="email" class="form-control"
                               th:field="*{correo}" required
                               placeholder="Ingrese el correo">
                    </div>

                    <!-- Estado -->
                    <div class="mb-4">
                        <div class="form-check form-switch form-switch-sm ps-5">
                            <input class="form-check-input c-pointer" type="checkbox"
                                   id="estadoSwitch"
                                   th:field="*{estado}">
                            <label class="form-check-label fw-500 text-dark c-pointer"
                                   for="estadoSwitch">ACTIVO</label>
                        </div>
                    </div>

                    <!-- Botones -->
                    <div class="d-flex justify-content-end mt-4">
                        <div class="d-flex align-items-center gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="feather-save me-2"></i>
                                Guardar
                            </button>
                            <a th:href="@{/proveedores}" class="btn btn-danger">
                                Cancelar
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
</form>
</div>
</body>
</html>
