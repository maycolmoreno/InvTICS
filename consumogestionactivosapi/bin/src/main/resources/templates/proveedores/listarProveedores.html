<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultra.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<title>Proveedores</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">

		<div class="page-header">
			<div class="page-header-left d-flex align-items-center">
				<div class="page-header-title">
					<h5 class="m-b-10">LISTAR PROVEEDORES</h5>
				</div>
			</div>
		</div>

		<div class="main-content">
			<div class="row">
				<div class="col-lg-12">
					<div class="card stretch stretch-full">
						<div class="card-body p-0">
							<div class="table-responsive">

								<table class="table table-hover">
									<thead>
										<tr>
											<th scope="col">ID_Proveedores</th>
											<th scope="col">Ruc</th>
											<th scope="col">Nombre</th>
											<th scope="col">Dirección</th>
											<th scope="col">Teléfono</th>
											<th scope="col">Correo</th>
											<th scope="col">Estado</th>
											<th scope="col" class="text-end">Acciones</th>
										</tr>
									</thead>

									<tbody>
										<tr th:each="proveedor : ${listarproveedores}">
											<td th:text="${proveedor.idProveedor}"></td>
											<td th:text="${proveedor.ruc}"></td>
											<td th:text="${proveedor.nombre}"></td>
											<td th:text="${proveedor.direccion}"></td>
											<td th:text="${proveedor.telefono}"></td>
											<td th:text="${proveedor.correo}"></td>


											<td>
												<!-- Activo -->
												<div th:if="${proveedor.estado}"
													class="badge bg-soft-success text-success">Activo</div> <!-- Inactivo -->
												<div th:unless="${proveedor.estado}"
													class="badge bg-soft-danger text-danger">Inactivo</div>
											</td>
											<td class="text-end">
												<div class="hstack gap-2 justify-content-end">


													<a
														th:href="@{/proveedores/editar/{id}(id=${proveedor.idProveedor})}"
														class="avatar-text avatar-md text-primary" title="Editar">
														<i class="feather feather-edit"></i>
													</a>

													<form th:if="${proveedor.estado}"
														th:action="@{/proveedores/eliminar/{id}(id=${proveedor.idProveedor})}"
														method="post" style="display: inline;"
														onsubmit="return confirm('¿Seguro que deseas eliminar este proveedor?');">

														<button type="submit"
															class="avatar-text avatar-md text-danger bg-transparent"
															title="Eliminar">
															<i class="feather feather-trash-2"></i>
														</button>
													</form>
												</div>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
