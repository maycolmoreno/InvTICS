<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<meta charset="utf-8">
<title>Nuevo Equipo</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">

		<form th:action="@{/equipos}" th:object="${equipo}" method="post">

			<div class="page-header">
				<div class="page-header-left d-flex align-items-center">
					<div class="page-header-title">
						<h5 class="m-b-10">Equipos</h5>
					</div>
					<ul class="breadcrumb">
						<li class="breadcrumb-item"><a th:href="@{/equipos}">Home</a></li>
						<li class="breadcrumb-item">Crear</li>
					</ul>
				</div>

				<div class="page-header-right ms-auto">
					<button type="submit" class="btn btn-primary">
						<i class="feather-save me-2"></i> <span>Guardar</span>
					</button>
				</div>
			</div>

			<div class="main-content">
				<div class="card stretch stretch-full">
					<div class="card-body">

						<input type="hidden" th:field="*{idEquipo}" />

						<!-- =========================
               DATOS GENERALES
          ========================== -->
						<div class="row">
							<div class="col-md-4 mb-4">
								<label class="form-label">Código SAP</label> <input
									maxlength="20" type="text" class="form-control"
									th:field="*{codigoSap}" placeholder="Código SAP" />
								<div class="text-danger small" th:if="${errorCodigo}">
									<span th:text="${errorCodigo}"></span>
								</div>
							</div>

							<div class="col-md-4 mb-4">
								<label class="form-label">Tipo de equipo <span
									class="text-danger">*</span></label> <input type="text"
									class="form-control" th:field="*{tipoEquipo}" maxlength="100"
									placeholder="Ej: Laptop" />
								<div class="text-danger small" th:if="${errorTipoEquipo}">
									<span th:text="${errorTipoEquipo}"></span>
								</div>
							</div>

							<div class="col-md-4 mb-4">
								<label class="form-label">Modelo <span
									class="text-danger">*</span></label> <input type="text"
									class="form-control" th:field="*{modelo}" maxlength="100"
									placeholder="Ej: ThinkPad" />
								<div class="text-danger small" th:if="${errorModelo}">
									<span th:text="${errorModelo}"></span>
								</div>
							</div>

							<div class="col-md-4 mb-4">
								<label class="form-label">Serial <span
									class="text-danger">*</span></label> <input type="text"
									class="form-control" th:field="*{serial}" maxlength="100"
									placeholder="Serial" />
								<div class="text-danger small" th:if="${errorSerial}">
									<span th:text="${errorSerial}"></span>
								</div>
							</div>

							<div class="col-md-4 mb-4">
								<label class="form-label">Procesador</label> <input type="text"
									class="form-control" th:field="*{procesador}" maxlength="100"
									placeholder="Procesador" />
							</div>
						</div>

						<!-- =========================
               HARDWARE
          ========================== -->
						<div class="row">
							<div class="col-md-3 mb-4">
								<label class="form-label">RAM (GB)</label> <input type="number"
									class="form-control" th:field="*{memoriaRamGb}"
									placeholder="Ej: 16" />
							</div>

							<div class="col-md-3 mb-4">
								<label class="form-label">Almacenamiento (GB)</label> <input
									type="number" class="form-control"
									th:field="*{capacidadAlmacenamientoGb}" placeholder="Ej: 512" />
							</div>

							<div class="col-md-3 mb-4">
								<label class="form-label">Sistema Operativo</label> <input
									type="text" class="form-control" th:field="*{sistemaOperativo}"
									maxlength="100" placeholder="Windows 11" />
							</div>
						</div>

						<!-- =========================
               LICENCIAS / DOMINIO
          ========================== -->
						<div class="row">
							<div class="col-md-3 mb-4">
								<label class="form-label">Licencia Windows activada</label> <select
									class="form-control" th:field="*{licenciaWindowsActivada}">
									<option th:value="${null}">-- Seleccione --</option>
									<option th:value="true">Sí</option>
									<option th:value="false">No</option>
								</select>
							</div>

							<div class="col-md-3 mb-4">
								<label class="form-label">Etiqueta Activo Fijo</label> <select
									class="form-control" th:field="*{etiquetaActivoFijo}">
									<option th:value="${null}">-- Seleccione --</option>
									<option th:value="true">Sí</option>
									<option th:value="false">No</option>
								</select>
							</div>

							<div class="col-md-3 mb-4">
								<label class="form-label">Tipo licencia Office</label> <input
									type="text" class="form-control" maxlength="50"
									th:field="*{tipoLicenciaOffice}" placeholder="Ej: 365 / 2019" />
							</div>

							<div class="col-md-3 mb-4">
								<label class="form-label">Versión Office</label> <input
									type="text" class="form-control" maxlength="150"
									th:field="*{versionOffice}" placeholder="Ej: ProPlus" />
							</div>

							<div class="col-md-3 mb-4">
								<label class="form-label">Unión a dominio</label> <select
									class="form-control" th:field="*{unionDominio}">
									<option th:value="${null}">-- Seleccione --</option>
									<option th:value="true">Sí</option>
									<option th:value="false">No</option>
								</select>
							</div>
						</div>

						<!-- =========================
               RED
          ========================== -->
						<div class="row">
							<div class="col-md-4 mb-4">
								<label class="form-label">IP</label> <input type="text"
									class="form-control" th:field="*{ip}"
									placeholder="192.168.1.10" />
								<div class="text-danger small" th:if="${errorIp}">
									<span th:text="${errorIp}"></span>
								</div>
							</div>

							<div class="col-md-4 mb-4">
								<label class="form-label">MAC</label> <input type="text"
									class="form-control" th:field="*{mac}"
									placeholder="AA:BB:CC:DD:EE:FF" />
								<div class="text-danger small" th:if="${errorMac}">
									<span th:text="${errorMac}"></span>
								</div>
							</div>
						</div>

						<!-- =========================
               COMPRA
          ========================== -->
						<div class="row">
							<div class="col-md-3 mb-4">
								<label class="form-label">Fecha compra</label> <input
									type="date" class="form-control" th:field="*{fechaCompra}" />
							</div>

							<div class="col-md-3 mb-4">
								<label class="form-label">Precio compra</label> <input
									type="number" step="0.01" class="form-control"
									th:field="*{precioCompra}" placeholder="0.00" />
							</div>

							<div class="col-md-3 mb-4">
								<label class="form-label">Estado equipo</label> <input
									type="text" class="form-control" th:field="*{estadoEquipo}"
									placeholder="Ej: Operativo" />
							</div>
						</div>

						<div class="mb-4">
							<label class="form-label">Observación</label>
							<textarea class="form-control" rows="3"
								th:field="*{observacionEquipo}"></textarea>
						</div>

						<!-- =========================
               COMBOS OBLIGATORIOS (FK)
          ========================== -->
						<div class="row">

							<div class="col-md-3 mb-4">
								<label class="form-label">Marca <span
									class="text-danger">*</span></label> <select class="form-control"
									th:field="*{fkMarca.idMarca}">
									<option value="0">Seleccione una marca</option>
									<option th:each="m : ${listamarcas}" th:value="${m.idMarca}"
										th:text="${m.nombre}"></option>
								</select>
								<div class="text-danger small" th:if="${errorMarca}">
									<span th:text="${errorMarca}"></span>
								</div>
							</div>

							<div class="col-md-3 mb-4">
								<label class="form-label">Proveedor <span
									class="text-danger">*</span></label> <select class="form-control"
									th:field="*{fkProveedor.idProveedor}">
									<option value="0">Seleccione un proveedor</option>
									<option th:each="p : ${listaproveedores}"
										th:value="${p.idProveedor}" th:text="${p.nombre}"></option>
								</select>
								<div class="text-danger small" th:if="${errorProveedor}">
									<span th:text="${errorProveedor}"></span>
								</div>
							</div>

							<div class="col-md-3 mb-4">
								<label class="form-label">Categoría <span
									class="text-danger">*</span></label> <select class="form-control"
									th:field="*{fkCategoria.idCategoria}">
									<option value="0">Seleccione una categoría</option>
									<option th:each="c : ${listacategorias}"
										th:value="${c.idCategoria}" th:text="${c.nombre}"></option>
								</select>
								<div class="text-danger small" th:if="${errorCategoria}">
									<span th:text="${errorCategoria}"></span>
								</div>
							</div>
						</div>

					

					</div>
				</div>
			</div>

		</form>

	</div>
</body>
</html>
