<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<meta charset="utf-8">
<title>Editar Equipo</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">

		<div class="page-header">
			<div class="page-header-left d-flex align-items-center">
				<div class="page-header-title">
					<h5 class="m-b-10">Equipos</h5>
				</div>
				<ul class="breadcrumb">
					<li class="breadcrumb-item"><a th:href="@{/equipos}">Home</a></li>
					<li class="breadcrumb-item">Editar</li>
				</ul>
			</div>

			<div class="page-header-right ms-auto">
				<a href="javascript:void(0);" class="btn btn-primary"
					onclick="document.getElementById('frmEquipo').submit();"> <i
					class="feather-save me-2"></i> Guardar
				</a>
			</div>
		</div>

		<div class="main-content">
			<div class="card stretch stretch-full">
				<div class="card-body">

					<form id="frmEquipo"
						th:action="@{/equipos}" th:object="${equipo}" method="post">

						<h6 class="mb-3">Información General</h6>
						<div class="row">
						<input type="hidden" th:field="*{idEquipo}">
							<div class="col-md-4 mb-3">
								<label class="form-label">Código SAP *</label> <input
									type="text" class="form-control" th:field="*{codigoSap}"
									maxlength="20">
								<div class="text-danger small" th:if="${errorCodigo}">
									<span th:text="${errorCodigo}"></span>
								</div>
							</div>

							<div class="col-md-4 mb-3">
								<label class="form-label">Tipo de Equipo *</label> <input
									type="text" class="form-control" th:field="*{tipoEquipo}"
									maxlength="100">
							</div>

							<div class="col-md-4 mb-3">
								<label class="form-label">Modelo *</label> <input type="text"
									class="form-control" th:field="*{modelo}" maxlength="100">
							</div>
						</div>

						<div class="row">
							<div class="col-md-4 mb-3">
								<label class="form-label">Serial *</label> <input type="text"
									class="form-control" th:field="*{serial}" maxlength="100">
								<div class="text-danger small" th:if="${errorSerial}">
									<span th:text="${errorSerial}"></span>
								</div>
							</div>

							<div class="col-md-4 mb-3">
								<label class="form-label">Sistema Operativo</label> <input
									type="text" class="form-control" th:field="*{sistemaOperativo}"
									maxlength="100">
							</div>

							<div class="col-md-4 mb-3">
								<label class="form-label">Estado del Equipo</label> <select
									class="form-control" th:field="*{estadoEquipo}">
									<option value="OPERATIVO">OPERATIVO</option>
									<option value="MANTENIMIENTO">MANTENIMIENTO</option>
									<option value="BAJA">BAJA</option>
								</select>
							</div>
						</div>

						<h6 class="mt-4 mb-3">Hardware</h6>
						<div class="row">
							<div class="col-md-4 mb-3">
								<label class="form-label">Procesador</label> <input type="text"
									class="form-control" th:field="*{procesador}" maxlength="100">
							</div>

							<div class="col-md-4 mb-3">
								<label class="form-label">RAM (GB)</label> <input type="number"
									class="form-control" th:field="*{memoriaRamGb}">
							</div>

							<div class="col-md-4 mb-3">
								<label class="form-label">Almacenamiento (GB)</label> <input
									type="number" class="form-control"
									th:field="*{capacidadAlmacenamientoGb}">
							</div>
						</div>

						<h6 class="mt-4 mb-3">Red</h6>
						<div class="row">
							<div class="col-md-6 mb-3">
								<label class="form-label">IP</label> <input type="text"
									class="form-control" th:field="*{ip}">
								<div class="text-danger small" th:if="${errorIp}">
									<span th:text="${errorIp}"></span>
								</div>
							</div>
							<div class="col-md-6 mb-3">
								<label class="form-label">MAC</label> <input type="text"
									class="form-control" th:field="*{mac}">
								<div class="text-danger small" th:if="${errorMac}">
									<span th:text="${errorMac}"></span>
								</div>
							</div>
						</div>

						<h6 class="mt-4 mb-3">Licencias</h6>
						<div class="row">
							<div class="col-md-4 form-check form-switch ps-5 mb-3">
								<input class="form-check-input" type="checkbox"
									th:field="*{licenciaWindowsActivada}"> <label
									class="form-check-label">Windows Activado</label>
							</div>

							<div class="col-md-4 form-check form-switch ps-5 mb-3">
								<input class="form-check-input" type="checkbox"
									th:field="*{etiquetaActivoFijo}"> <label
									class="form-check-label">Activo Fijo</label>
							</div>

							<div class="col-md-4 form-check form-switch ps-5 mb-3">
								<input class="form-check-input" type="checkbox"
									th:field="*{unionDominio}"> <label
									class="form-check-label">Unido a Dominio</label>
							</div>
						</div>

						<div class="row">
							<div class="col-md-6 mb-3">
								<label class="form-label">Tipo Licencia Office</label> <input
									type="text" class="form-control"
									th:field="*{tipoLicenciaOffice}" maxlength="50">
							</div>
							<div class="col-md-6 mb-3">
								<label class="form-label">Versión Office</label> <input
									type="text" class="form-control" th:field="*{versionOffice}"
									maxlength="150">
							</div>
						</div>

						<h6 class="mt-4 mb-3">Compra</h6>
						<div class="row">
							<div class="col-md-6 mb-3">
								<label class="form-label">Fecha de Compra</label> <input
									type="date" class="form-control" name="fechaCompra" th:value="${#temporals.format(equipo.fechaCompra, 'yyyy-MM-dd')}">
							</div>
							<div class="col-md-6 mb-3">
								<label class="form-label">Precio de Compra</label> <input
									type="number" step="0.01" class="form-control"
									th:field="*{precioCompra}">
							</div>
						</div>

						<div class="mb-3">
							<label class="form-label">Observación</label>
							<textarea class="form-control" rows="3"
								th:field="*{observacionEquipo}"></textarea>
						</div>

						<h6 class="mt-4 mb-3">Relaciones</h6>
						<div class="row">

							<div class="col-md-3 mb-3">
								<label class="form-label">Marca</label> <select
									class="form-control" th:field="*{fkMarca.idMarca}">
									<option value="0">Seleccione una marca</option>
									<option th:each="m : ${listamarcas}" th:value="${m.idMarca}"
										th:text="${m.nombre}"></option>
								</select>
							</div>

							<div class="col-md-3 mb-3">
								<label class="form-label">Categoría</label> <select
									class="form-control" th:field="*{fkCategoria.idCategoria}">
									<option value="0">Seleccione una categoria</option>
									<option th:each="c : ${listacategorias}" th:value="${c.idCategoria}"
										th:text="${c.nombre}"></option>
								</select>
							</div>

							<div class="col-md-3 mb-3">
								<label class="form-label">Proveedor</label> <select
									class="form-control" th:field="*{fkProveedor.idProveedor}">
									<option value="0">Seleccione un proveedor</option>
									<option th:each="p : ${listaproveedores}"
										th:value="${p.idProveedor}" th:text="${p.nombre}"></option>
								</select>
							</div>
						</div>

						<div class="form-check form-switch ps-5 mt-4">
							<input class="form-check-input" type="checkbox"
								th:field="*{estado}"> <label class="form-check-label">Activo</label>
						</div>

					</form>

				</div>
			</div>
		</div>

	</div>
</body>
</html>
