<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
<title>Custodios</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">

		<!-- HEADER -->
		<div class="page-header">
			<div class="page-header-left d-flex align-items-center">
				<div class="page-header-title">
					<h5 class="m-b-10">Custodios</h5>
				</div>
				<ul class="breadcrumb">
					<li class="breadcrumb-item"><a th:href="@{/custodios}">Home</a></li>
					<li class="breadcrumb-item">Custodios</li>
				</ul>
			</div>

			<div class="page-header-right ms-auto">
				<div class="page-header-right-items">
					<div
						class="d-flex align-items-center gap-2 page-header-right-items-wrapper">
						<a th:href="@{/custodios/nuevo-custodio}" class="btn btn-primary">
							<i class="feather-plus me-2"></i> <span>Nuevo Custodio</span>
						</a>
					</div>
				</div>
			</div>
		</div>

		<!-- TABLE -->
		<div class="main-content">
			<div class="row">
				<div class="col-lg-12">
					<div class="card stretch stretch-full">
						<div class="card-body p-0">
							<div class="table-responsive">
								<table class="table table-hover" id="proposalList">
									<thead>
										<tr>
											<th>ID</th>
											<th>Nombre</th>
											<th>Cédula</th>
											<th>Correo</th>
											<th>Teléfono</th>
											<th>Fecha Ingreso</th>
											<th>Departamento</th>
											<th>Cargo</th>
											<th>Estado</th>
											<th class="text-end">Acciones</th>
										</tr>
									</thead>

									<tbody>
										<tr th:each="custodio : ${listarcustodios}"
											class="single-item">
											<td class="fw-bold" th:text="${custodio.idCustodio}"></td>
											<td th:text="${custodio.nombre} ?: '-'"></td>
											<td th:text="${custodio.cedula} ?: '-'"></td>
											<td th:text="${custodio.correo} ?: '-'"></td>
											<td th:text="${custodio.telefono} ?: '-'"></td>
											<td th:text="${custodio.fechaIngreso} ?: '-'"></td>
											<td th:text="${custodio.fkDepartamento.nombre}"></td>
											<td th:text="${custodio.fkCargo.nombre}"></td>
											<td>
												<div th:if="${custodio.estado}"
													class="badge bg-soft-success text-success">Activo</div>
												<div th:unless="${custodio.estado}"
													class="badge bg-soft-danger text-danger">Inactivo</div>
											</td>

											<td>
												<div class="hstack gap-2 justify-content-end">

													<!-- EDITAR (dejas como lo tengas) -->
													<a
														th:href="@{/custodios/editar-custodio/{id}(id=${custodio.idCustodio})}"
														class="avatar-text avatar-md"> <i
														class="feather feather-edit"></i>
													</a>

													<!-- BOTÓN QUE ABRE MODAL (sirve para activar y desactivar) -->
													<button type="button" class="avatar-text avatar-md"
														data-bs-toggle="modal"
														data-bs-target="#modalToggleCustodio"
														th:attr="data-id=${custodio.idCustodio}, data-estado=${custodio.estado}">
														<!-- ícono cambia según estado -->
														<i class="feather"
															th:classappend="${custodio.estado} ? ' feather-trash-2 text-danger' : ' feather-check-circle text-success'"></i>
													</button>

												</div>
											</td>
										</tr>
									</tbody>

								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- MODAL -->
		<div class="modal fade" id="modalToggleCustodio" tabindex="-1"
			aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">

					<div class="modal-header">
						<h5 class="modal-title">Confirmar</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>

					<div class="modal-body" id="textoModalToggleCustodio">¿Está
						seguro?</div>

					<div class="modal-footer">
						<button type="button" class="btn btn-light"
							data-bs-dismiss="modal">No</button>

						<!-- OJO: aquí NO dejamos action fijo, lo cambia el JS -->
						<form id="formToggleCustodio" method="post">
							<input type="hidden" name="idCustodio" id="idCustodioToggle">
							<button type="submit" class="btn" id="btnToggleCustodio">Sí</button>
						</form>
					</div>

				</div>
			</div>
		</div>

		<!-- SCRIPTS -->
		<script>
			const modalToggleCustodio = document
					.getElementById('modalToggleCustodio');

			modalToggleCustodio
					.addEventListener(
							'show.bs.modal',
							function(event) {
								const button = event.relatedTarget;

								const id = button.getAttribute('data-id');
								const estadoActual = button
										.getAttribute('data-estado') === 'true';

								// set id hidden
								document.getElementById('idCustodioToggle').value = id;

								// referencia form y botón
								const form = document
										.getElementById('formToggleCustodio');
								const btn = document
										.getElementById('btnToggleCustodio');

								// cambia texto y action según estado
								if (estadoActual) {
									document
											.getElementById('textoModalToggleCustodio').innerText = "¿Está seguro de DESACTIVAR este custodio?";
									form.action = "/custodios/eliminar-custodio"; // ✅ TU NOMBRE
									btn.innerText = "Sí, desactivar";
									btn.className = "btn btn-danger";
								} else {
									document
											.getElementById('textoModalToggleCustodio').innerText = "¿Está seguro de ACTIVAR este custodio?";
									form.action = "/custodios/activar-custodio"; // ✅ TU NOMBRE
									btn.innerText = "Sí, activar";
									btn.className = "btn btn-success";
								}
							});

			// por si el layout mete el modal dentro de un contenedor
			document.addEventListener("DOMContentLoaded", function() {
				const modal = document.getElementById("modalToggleCustodio");
				if (modal && modal.parentElement !== document.body) {
					document.body.appendChild(modal);
				}
			});
		</script>

	</div>
</body>
</html>
