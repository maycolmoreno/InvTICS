<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{plantilla/plantillaui}">

<head>
<meta charset="utf-8">
<title>Roles</title>
</head>

<body>
    <div layout:fragment="contenidopaginas">
    
        <form th:action="@{/roles}" th:object="${nuevorol}" method="post">
        
        <div class="page-header">
            <div class="page-header-left d-flex align-items-center">
                <div class="page-header-title">
                    <h5 class="m-b-10">EDITAR ROL</h5>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="card stretch stretch-full">
                <div class="card-body">
                
                    <input type="hidden" th:field="*{idRol}" />
                    
                    <div class="alert alert-danger" role="alert" th:if="${errorNombre}" th:text="${errorNombre}"></div>
                    
                    <div class="mb-4">
                        <label class="form-label">NOMBRE <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{nombre}" required>
                            <option value="">Seleccione un rol</option>
                            <option value="Administrador">Administrador</option>
                            <option value="Tecnico">Técnico</option>
                            <option value="Auditor">Auditor</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <div class="form-check form-switch form-switch-sm ps-5">
                            <input class="form-check-input c-pointer" type="checkbox"
                                   id="estadoSwitch"
                                   th:field="*{estado}">
                            <label class="form-check-label fw-500 text-dark c-pointer"
                                   for="estadoSwitch">ACTIVO</label>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-end mt-4">
                        <div class="d-flex align-items-center gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="feather-save me-2"></i>
                                Guardar
                            </button>
                            <a th:href="@{/roles}" class="btn btn-danger">
                                Cancelar
                            </a>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
        
        </form>
    </div>

</body>

</html>
