<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{plantilla/plantillaui}">

<head>
	<title>Custodias</title>
</head>

<body>
	<div layout:fragment="contenidopaginas">

		<!-- HEADER -->
		<div class="page-header">
			<div class="page-header-left d-flex align-items-center">
				<div class="page-header-title">
					<h5 class="m-b-10">Custodias</h5>
				</div>
				<ul class="breadcrumb">
					<li class="breadcrumb-item"><a th:href="@{/custodias}">Home</a></li>
					<li class="breadcrumb-item">Custodias</li>
				</ul>
			</div>

			<div class="page-header-right ms-auto">
				<div class="page-header-right-items">
					<div class="d-flex align-items-center gap-2 page-header-right-items-wrapper">

						<a th:href="@{/custodias/nueva-custodia}" class="btn btn-primary">
							<i class="feather-plus me-2"></i>
							<span>Nueva Custodia</span>
						</a>

					</div>
				</div>

				<div class="d-md-none d-flex align-items-center">
					<a href="javascript:void(0)" class="page-header-right-open-toggle">
						<i class="feather-align-right fs-20"></i>
					</a>
				</div>

			</div>
		</div>

		<!-- TABLE -->
		<div class="main-content">
			<div class="row">
				<div class="col-lg-12">

					<div class="card stretch stretch-full">
						<div class="card-body p-0">
							<div class="table-responsive">

								<table class="table table-hover" id="proposalList">
									<thead>
										<tr>
											<th>ID</th>
											<th>Equipo</th>
											<th>Custodio</th>
											<th>Fecha Inicio</th>
											<th>Fecha Fin</th>
											<th>Observación</th>
											<th>Estado</th>
											<th class="text-end">Acciones</th>
										</tr>
									</thead>

									<tbody>
										<tr th:each="c : ${listacustodias}" class="single-item">
											<td th:text="${c.idCustodiaEquipo}"></td>

											<td th:text="${c.fkEquipo != null ? (c.fkEquipo.codigoSap + ' - ' + c.fkEquipo.tipoEquipo) : '-'}"></td>

											<td th:text="${c.fkCustodio != null ? (c.fkCustodio.nombre + ' - ' + c.fkCustodio.cedula) : '-'}"></td>

											<td th:text="${c.fechaInicio}"></td>
											<td th:text="${c.fechaFin} ?: '-'"></td>

											<td th:text="${c.observacion} ?: '-'"></td>

											<td>
												<div th:if="${c.estado}" class="badge bg-soft-success text-success">Activo</div>
												<div th:unless="${c.estado}" class="badge bg-soft-danger text-danger">Inactivo</div>
											</td>

											<td>
												<div class="hstack gap-2 justify-content-end">

													<!-- EDITAR -->
													<a th:href="@{/custodias/editar-custodia/{id}(id=${c.idCustodiaEquipo})}"
														class="avatar-text avatar-md">
														<i class="feather feather-edit"></i>
													</a>

													<!-- TOGGLE (ACTIVAR / DESACTIVAR) -->
													<button type="button" class="avatar-text avatar-md"
														data-bs-toggle="modal"
														data-bs-target="#modalToggleCustodia"
														th:attr="data-id=${c.idCustodiaEquipo}, data-estado=${c.estado}">
														<i class="feather"
															th:classappend="${c.estado} ? ' feather-trash-2 text-danger' : ' feather-check-circle text-success'"></i>
													</button>

												</div>
											</td>

										</tr>
									</tbody>

								</table>

							</div>
						</div>
					</div>

				</div>
			</div>
		</div>

		<!-- MODAL TOGGLE -->
		<div class="modal fade" id="modalToggleCustodia" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">

					<div class="modal-header">
						<h5 class="modal-title">Confirmar</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>

					<div class="modal-body" id="textoModalToggleCustodia">¿Está seguro?</div>

					<div class="modal-footer">
						<button type="button" class="btn btn-light" data-bs-dismiss="modal">No</button>

						<form id="formToggleCustodia" method="post">
							<input type="hidden" name="idCustodiaEquipo" id="idCustodiaToggle">
							<button type="submit" class="btn" id="btnToggleCustodia">Sí</button>
						</form>
					</div>

				</div>
			</div>
		</div>

		<!-- SCRIPTS -->
		<script>
			const modalToggleCustodia = document.getElementById('modalToggleCustodia');

			modalToggleCustodia.addEventListener('show.bs.modal', function(event) {
				const button = event.relatedTarget;

				const id = button.getAttribute('data-id');
				const estadoActual = button.getAttribute('data-estado') === 'true';

				document.getElementById('idCustodiaToggle').value = id;

				const form = document.getElementById('formToggleCustodia');
				const btn = document.getElementById('btnToggleCustodia');

				if (estadoActual) {
					document.getElementById('textoModalToggleCustodia').innerText =
						"¿Está seguro de DESACTIVAR esta custodia?";
					form.action = "/custodias/eliminar-custodia";
					btn.innerText = "Sí, desactivar";
					btn.className = "btn btn-danger";
				} else {
					document.getElementById('textoModalToggleCustodia').innerText =
						"¿Está seguro de ACTIVAR esta custodia?";
					form.action = "/custodias/activar-custodia";
					btn.innerText = "Sí, activar";
					btn.className = "btn btn-success";
				}
			});

			document.addEventListener("DOMContentLoaded", function() {
				const modal = document.getElementById("modalToggleCustodia");
				if (modal && modal.parentElement !== document.body) {
					document.body.appendChild(modal);
				}
			});
		</script>

	</div>
</body>

</html>
