services:
  postgres:
    image: postgres:16
    container_name: gestionactivos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cresio4
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: .r4e3w2q1
    ports:
      - "5433:5432"
    volumes:
      - postgres_cresio4_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cresio4"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestionactivos-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/cresio4
      DB_USERNAME: postgres
      DB_PASSWORD: .r4e3w2q1
      ACTAS_BASE_PATH: /app/data/actas
      MANTENIMIENTO_STORAGE_PATH: /app/data/mantenimientos
    ports:
      - "8083:8083"
    volumes:
      - ./data:/app/data
      - ./templates:/app/templates

volumes:
  postgres_cresio4_data:
