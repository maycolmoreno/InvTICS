# ===== Sincronizacion de empleados (fuente JSON externa) =====
# Definir UNA fuente: URL HTTP o ruta de archivo en disco. Sin fuente, el
# scheduler no actua y solo funciona la sincronizacion manual (POST del JSON).
empleados.sync.url=${EMPLEADOS_SYNC_URL:}
empleados.sync.archivo=${EMPLEADOS_SYNC_ARCHIVO:}
empleados.sync.cron=${EMPLEADOS_SYNC_CRON:0 30 6 * * *}
# Credenciales de sesion si la fuente URL exige login (usuario/clave + cookie).
# Dejar vacio si la URL es publica o no requiere autenticacion.
empleados.sync.usuario=${EMPLEADOS_SYNC_USUARIO:}
empleados.sync.contrasena=${EMPLEADOS_SYNC_CONTRASENA:}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB

# ===== Tomcat: limite de partes multipart =====
